<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Africa Village | Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        :root { 
            --primary: #2563eb; 
            --primary-hover: #1d4ed8;
            --bg: #f8fafc; 
            --card-bg: #ffffff;
            --text-main: #0f172a; 
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 24px; 
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 32px; 
        }

        .card { 
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: var(--radius); 
            box-shadow: var(--shadow); 
            border: 1px solid var(--border);
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { 
            padding: 12px 16px; 
            background: #f1f5f9; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            color: var(--text-muted);
            border-bottom: 2px solid var(--border);
        }
        td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 0.875rem; }

        /* Status Badges */
        .status-badge { 
            padding: 4px 12px; 
            border-radius: 9999px; 
            font-size: 0.7rem; 
            font-weight: 700; 
            text-transform: uppercase;
        }
        .pending { background: #fef3c7; color: #92400e; }
        .approved { background: #ecfdf5; color: #065f46; }
        .rejected { background: #fef2f2; color: #991b1b; }

        /* Modal */
        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(4px); 
            z-index: 100; 
            overflow-y: auto;
            padding: 20px;
        }
        .modal-content { 
            background: white; 
            max-width: 900px; 
            margin: 20px auto; 
            padding: 32px; 
            border-radius: var(--radius); 
            position: relative; 
        }
        
        .info-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 24px; 
            margin-top: 20px;
        }
        .info-group h4 { margin: 0 0 12px 0; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .info-item { font-size: 0.85rem; margin-bottom: 8px; color: var(--text-muted); }
        .info-item span { font-weight: 600; color: var(--text-main); }

        .doc-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 15px; 
            margin-top: 20px; 
        }
        .doc-item { border: 1px solid var(--border); padding: 10px; border-radius: 8px; text-align: center; }
        .doc-item img { width: 100%; height: 120px; object-fit: cover; border-radius: 4px; background: #f8fafc; }

        .btn { 
            padding: 8px 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            border: none; 
            font-weight: 600; 
            transition: 0.2s; 
        }
        .btn-view { background: var(--primary); color: white; }
        .btn-download { background: #f1f5f9; color: var(--text-main); width: 100%; margin-top: 8px; font-size: 0.75rem; border: 1px solid var(--border); text-decoration: none; display: inline-block;}
        .close-modal { position: absolute; right: 20px; top: 20px; cursor: pointer; font-size: 1.5rem; }

        @media (max-width: 768px) { .header { flex-direction: column; align-items: flex-start; gap: 10px; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Loan Applications</h1>
        <button onclick="fetchApplications()" class="btn btn-view">Refresh List</button>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Applicant Name</th>
                    <th>Amount (ETB)</th>
                    <th>Duration</th>
                    <th>Total Repayable</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="appTableBody">
                <tr><td colspan="6" style="text-align:center">Loading applications...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="detailsModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h2 id="modalName">Review Application</h2>
        <div id="modalDetails" class="info-grid"></div>
        
        <h3 style="margin-top:30px">Submitted Documents</h3>
        <div class="doc-grid" id="modalDocs"></div>
    </div>
</div>

<script>
    let currentApplications = [];

    async function fetchApplications() {
        const { data, error } = await _supabase
            .from('loan_applications')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            alert("Error: " + error.message);
            return;
        }

        currentApplications = data;
        const tbody = document.getElementById('appTableBody');
        
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">No applications found.</td></tr>';
            return;
        }

        tbody.innerHTML = data.map((app, index) => `
            <tr>
                <td><strong>${app.first_name} ${app.father_name}</strong></td>
                <td>${Number(app.loan_amount).toLocaleString()}</td>
                <td>${app.loan_duration} Days</td>
                <td>${Number(app.total_repayable).toLocaleString()} ETB</td>
                <td><span class="status-badge ${app.status}">${app.status}</span></td>
                <td><button onclick="viewDetails(${index})" class="btn btn-view">Review</button></td>
            </tr>
        `).join('');
    }

    async function viewDetails(index) {
        const app = currentApplications[index];
        const modalDetails = document.getElementById('modalDetails');
        const modalDocs = document.getElementById('modalDocs');
        
        modalDetails.innerHTML = `
            <div class="info-group">
                <h4>Personal & Residence</h4>
                <div class="info-item"><span>Full Name:</span> ${app.first_name} ${app.father_name}</div>
                <div class="info-item"><span>Nationality:</span> ${app.nationality || 'N/A'}</div>
                <div class="info-item"><span>Region/City:</span> ${app.res_region || ''}, ${app.res_city || ''}</div>
                <div class="info-item"><span>Phones:</span> ${app.phone_number}, ${app.phone_number_2 || 'N/A'}</div>
            </div>
            <div class="info-group">
                <h4>Employment</h4>
                <div class="info-item"><span>Organization:</span> ${app.org_name}</div>
                <div class="info-item"><span>Job Title:</span> ${app.job_title || 'N/A'}</div>
                <div class="info-item"><span>Monthly Net:</span> ${Number(app.net_salary || 0).toLocaleString()} ETB</div>
            </div>
            <div class="info-group">
                <h4>Loan Summary</h4>
                <div class="info-item"><span>Request:</span> ${Number(app.loan_amount).toLocaleString()} ETB</div>
                <div class="info-item"><span>Total Due:</span> ${Number(app.total_repayable).toLocaleString()} ETB</div>
                <div class="info-item"><span>National ID:</span> ${app.national_id_number}</div>
            </div>
        `;

        const docList = [
            { label: 'Personal Photo', path: app.personal_photo },
            { label: 'Digital Signature', path: app.digital_signature },
            { label: 'National ID (F)', path: app.nat_id_front },
            { label: 'National ID (B)', path: app.nat_id_back },
            { label: 'Employee ID (F)', path: app.emp_id_front },
            { label: 'Employee ID (B)', path: app.emp_id_back },
            { label: 'Employment Letter', path: app.employment_letter }
        ];

        modalDocs.innerHTML = "Generating secure links...";

        const docCards = await Promise.all(docList.map(async (doc) => {
            if (!doc.path) return '';
            const { data, error } = await _supabase.storage.from('kyc-docs').createSignedUrl(doc.path, 600);
            const url = error ? '#' : data.signedUrl;
            return `
                <div class="doc-item">
                    <p style="font-size:0.7rem; margin:0 0 8px 0"><strong>${doc.label}</strong></p>
                    <img src="${url}" onerror="this.src='https://via.placeholder.com/150?text=No+Preview'">
                    <a href="${url}" target="_blank" class="btn-download">View Full File</a>
                </div>
            `;
        }));

        modalDocs.innerHTML = docCards.join('');
        document.getElementById('detailsModal').style.display = "block";
    }

    function closeModal() {
        document.getElementById('detailsModal').style.display = "none";
    }

    // Initialize
    fetchApplications();
</script>
</body>
</html>

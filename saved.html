<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Saved Items | Golem</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="golem-header">
        <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">GOLEM</div>
        <div style="flex-grow: 1;"></div>
        <a href="index.html" class="nav-item-box bg-home">
            <i class="fas fa-arrow-left"></i>
            <p>Back</p>
        </a>
    </header>

    <main class="container">
        <div class="wishlist-header" style="margin: 30px 0; display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <h1 style="font-weight: 700; font-size: 1.8rem;">❤️ My Wishlist</h1>
                <p style="color: #666; font-size: 0.9rem;">Your favorite furniture pieces in one place.</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button onclick="clearAllSaved()" style="background:none; border:none; color:#ff4b2b; cursor:pointer; font-weight: 600;">
                    <i class="fas fa-trash-alt"></i> Clear All
                </button>
            </div>
        </div>

        <div id="savedGrid" class="masonry-wrapper">
            <div id="emptyState" style="text-align:center; padding: 100px 20px; color: #888; grid-column: 1 / -1;">
                <i class="fas fa-heart-broken fa-3x" style="margin-bottom: 15px; color: #ddd;"></i>
                <p>You haven't saved any items yet.</p>
                <a href="index.html" class="contact-btn" style="display:inline-flex; margin-top:15px; background: var(--primary-color); width: auto; padding: 10px 30px;">Start Shopping</a>
            </div>
        </div>

        <div id="savedSummary" class="saved-summary-box" style="display: none;">
            <div class="summary-details">
                <h3 style="font-weight: 700; margin-bottom: 5px;">Order Summary</h3>
                <p style="color: #666;">Items: <span id="totalItems" style="font-weight: 600; color: #333;">0</span></p>
                <p class="total-price-row">Total: <span id="totalPrice">0</span> ETB</p>
            </div>
            <div class="summary-actions">
                <button onclick="sendOrder('telegram')" class="order-btn tg-btn">
                    <i class="fab fa-telegram"></i> Order via Telegram
                </button>
                <button onclick="sendOrder('whatsapp')" class="order-btn wa-btn" style="background: var(--whatsapp-green);">
                    <i class="fab fa-whatsapp"></i> Order via WhatsApp
                </button>
                <button onclick="shareWhitelist()" class="order-btn" style="background: #6c5ce7; color: white;">
    <i class="fas fa-share-alt"></i> Share List
</button>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
     <script>
   // --- 1. Load Data ---
async function loadSavedItems() {
    const savedIds = JSON.parse(localStorage.getItem('golem_saved')) || [];
    const grid = document.getElementById('savedGrid');
    const empty = document.getElementById('emptyState');
    const summary = document.getElementById('savedSummary');

    if (savedIds.length === 0) {
        grid.innerHTML = ""; 
        grid.appendChild(empty);
        empty.style.display = 'block';
        summary.style.display = 'none';
        return;
    }



    // 3. Fetch ONLY the saved items, but maintain the Golem Sorting Order
    const { data, error } = await _supabase
        .from('products')
        .select('*')
        .in('id', savedIds)
        .order('created_at', { ascending: false });

    if (error) {
        console.error("Whitelist Load Error:", error.message);
        return;
    }

    if (data) {
        empty.style.display = 'none';
        summary.style.display = 'block';
        renderSaved(data);
        calculateTotal(data);
    }
}

// --- 2. Render Cards ---
function renderSaved(items) {
    const grid = document.getElementById('savedGrid');
    grid.innerHTML = items.map(p => `
        <div class="product-card">
            <button class="remove-btn" onclick="removeItem('${p.id}')">
                <i class="fas fa-times"></i>
            </button>
            <div class="card-img-container" onclick="location.href='checkout.html?id=${p.id}'">
                <img src="${p.image}" alt="${p.name}">
            </div>
            <div class="product-info">
                <h3 class="product-title">${p.name}</h3>
                <p class="product-price">${p.price.toLocaleString()} ETB</p>
            </div>
        </div>
    `).join('');
}

// --- 3. Calculations ---
function calculateTotal(items) {
    const total = items.reduce((sum, item) => sum + parseInt(item.price), 0);
    document.getElementById('totalItems').innerText = items.length;
    document.getElementById('totalPrice').innerText = total.toLocaleString();
}

// --- 4. Fixed Order Logic (Separates WhatsApp and Telegram) ---
async function sendOrder(platform) {
    const total = document.getElementById('totalPrice').innerText;
    const items = Array.from(document.querySelectorAll('.product-title')).map(el => el.innerText);
    
    // 1. Ask for Customer Info
    const customerName = prompt("Please enter your Full Name:");
    if (!customerName) return; // Cancel if no name

    const customerPhone = prompt("Please enter your Phone Number (e.g., 09...):");
    if (!customerPhone) return; // Cancel if no phone

    // 2. BOT CONFIG
    const BOT_TOKEN = "8557174379:AAHjA_5WAIxIR8uq4mjZOhd1EfdKvgI2s7o";
    const CHAT_ID = "6792892909";

    // 3. Format Message for Telegram
    let message = `🔔 *NEW ORDER RECEIVED*\n`;
    message += `────────────────\n`;
    message += `👤 *Customer:* ${customerName}\n`;
    message += `📞 *Phone:* ${customerPhone}\n`;
    message += `────────────────\n`;
    message += `📦 *Items:*\n`;
    items.forEach((name) => message += `• ${name}\n`);
    message += `\n💰 *Total Value:* ${total} ETB\n`;
    message += `────────────────\n`;
    message += `🚀 *Source:* Golem Web`;

    if (platform === 'telegram') {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    chat_id: CHAT_ID, 
                    text: message, 
                    parse_mode: 'Markdown' 
                })
            });
            if (response.ok) {
                alert(`Thank you ${customerName}! Your order has been sent to our bot.`);
            }
        } catch (error) {
            alert("❌ Connection error. Please try again.");
        }
    } else if (platform === 'whatsapp') {
        // For WhatsApp, we use the same message but remove Markdown stars (*) for readability
        const waNumber = "251900000000"; 
        const waMessage = window.encodeURIComponent(message.replace(/\*/g, ''));
        window.open(`https://wa.me/${waNumber}?text=${waMessage}`, '_blank');
    }
}
         
// --- 6. Utils ---
function removeItem(id) {
    const card = document.querySelector(`button[onclick="removeItem('${id}')"]`).closest('.product-card');
    card.style.opacity = '0';
    setTimeout(() => {
        let saved = JSON.parse(localStorage.getItem('golem_saved')) || [];
        saved = saved.filter(savedId => savedId !== id);
        localStorage.setItem('golem_saved', JSON.stringify(saved));
        loadSavedItems();
    }, 300);
}

window.clearAllSaved = function() {
    if (confirm("Are you sure you want to remove all saved items?")) {
        localStorage.removeItem('golem_saved'); 
        const summary = document.getElementById('savedSummary');
        if (summary) summary.style.display = 'none';
        loadSavedItems();
    }
};

document.addEventListener('DOMContentLoaded', loadSavedItems);
    </script>
</body>
</html>

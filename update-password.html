<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | Golem</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f8f9fa; margin: 0; font-family: sans-serif;">

    <div class="auth-card" style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center;">
        <div style="background: #e7f1ff; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
            <i class="fas fa-key" style="color: #007bff; font-size: 1.5rem;"></i>
        </div>
        
        <h2 style="margin-bottom: 10px; color: #333;">Secure Your Account</h2>
        <p style="color: #666; font-size: 0.9rem; margin-bottom: 25px;">Almost there! Please enter a strong new password to regain access.</p>
        
        <form id="updatePasswordForm">
            <div style="position: relative; margin-bottom: 20px; text-align: left;">
                <label style="font-size: 0.8rem; font-weight: bold; color: #555; display: block; margin-bottom: 8px;">New Password</label>
                <div style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #aaa;"></i>
                    <input type="password" id="newPassword" placeholder="Min. 6 characters" required 
                           style="width: 100%; padding: 12px 12px 12px 40px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; transition: border-color 0.3s;">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="auth-submit" 
                    style="width: 100%; background: #007bff; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: background 0.3s;">
                Update Password
            </button>
        </form>

        <div id="statusMsg" style="margin-top: 15px; font-size: 0.85rem; display: none;"></div>
    </div>

    <script src="config.js"></script>
    <script>
        const form = document.getElementById('updatePasswordForm');
        const passwordInput = document.getElementById('newPassword');
        const submitBtn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMsg');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const newPassword = passwordInput.value;

            // Simple validation
            if (newPassword.length < 6) {
                showStatus("Password must be at least 6 characters.", "red");
                return;
            }

            // UI feedback
            submitBtn.innerText = "Updating...";
            submitBtn.disabled = true;

            // The Magic: This updates the user associated with the reset token in the URL
            const { error } = await _supabase.auth.updateUser({ 
                password: newPassword 
            });

            if (error) {
                showStatus("Error: " + error.message, "red");
                submitBtn.innerText = "Update Password";
                submitBtn.disabled = false;
            } else {
                showStatus("Success! Password updated. Redirecting...", "green");
                
                // Give them a moment to read the success message
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
        };

        function showStatus(text, color) {
            statusMsg.innerText = text;
            statusMsg.style.color = color;
            statusMsg.style.display = 'block';
        }
    </script>

</body>
</html>

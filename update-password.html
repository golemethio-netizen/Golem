<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password | Golem</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh; background: #f4f7f6; margin: 0;">

    <div class="auth-card" style="background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center;">
        <h2 style="color: #28a745; margin-bottom: 10px;">Set New Password</h2>
        <p style="color: #666; font-size: 0.9rem; margin-bottom: 25px;">Please enter your new secure password below.</p>
        
        <form id="updateForm">
            <div style="position: relative; margin-bottom: 20px;">
                <input type="password" id="newPassword" placeholder="New Password (min 6 chars)" required 
                       style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
                <i class="fas fa-eye" id="togglePass" style="position: absolute; right: 15px; top: 15px; cursor: pointer; color: #aaa;"></i>
            </div>
            
            <button type="submit" class="main-btn" style="width: 100%; background: #28a745; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold;">
                Update Password
            </button>
        </form>
    </div>

    <script src="config.js"></script>
    <script>
        // Toggle Password Visibility
        document.getElementById('togglePass').onclick = function() {
            const passInput = document.getElementById('newPassword');
            const type = passInput.type === 'password' ? 'text' : 'password';
            passInput.type = type;
            this.classList.toggle('fa-eye-slash');
        };

        // Handle Password Update
        document.getElementById('updateForm').onsubmit = async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;

            if (newPassword.length < 6) {
                alert("Password must be at least 6 characters long.");
                return;
            }

            const { error } = await _supabase.auth.updateUser({ password: newPassword });
            
            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("Password updated successfully! You can now sign in.");
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>

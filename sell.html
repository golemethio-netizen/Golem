<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell an Item | Golem</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #f8f9fa;">

    <header class="golem-header">
        <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">GOLEM</div>
        <a href="index.html" class="signin-btn" style="text-decoration: none;">Cancel</a>
    </header>

    <main class="container" style="max-width: 600px; padding: 20px;">
        <div class="form-card" style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">

<div id="profileSection" style="background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; display: flex; align-items: center; gap: 20px; border: 1px solid #eee;">
    <div style="position: relative;">
        <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=333&color=fff" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #f4f7f6;">
        <label for="avatarUpload" style="position: absolute; bottom: 0; right: 0; background: #333; color: white; width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer;">
            <i class="fas fa-camera"></i>
        </label>
        <input type="file" id="avatarUpload" hidden accept="image/*">
    </div>
    <div style="flex: 1;">
        <h2 id="userName" style="margin: 0; font-size: 1.4rem;">Loading...</h2>
        <p id="userRole" style="margin: 2px 0; color: #666; font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;"></p>
        <p id="userJoined" style="margin: 5px 0 0; color: #999; font-size: 0.8rem;"><i class="fas fa-calendar-alt"></i> Joined: --</p>
    </div>
    <button onclick="openEditProfile()" style="background: #f4f7f6; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 600;">
        <i class="fas fa-user-edit"></i> Edit
    </button>
</div>
            
            <h2 style="margin-bottom: 10px;">Post New Listing</h2>
            <p style="color: #666; margin-bottom: 25px;">Fill in the details to reach thousands of buyers.</p>

            <form id="sellForm">
                <div class="input-group-sell">
                    <label><i class="fas fa-camera"></i> Upload Product Photo</label>
                    <img id="imagePreview" src="#" alt="Preview" style="display:none; width:100%; border-radius:10px; margin-top:10px; margin-bottom:10px;">
                    <input type="file" id="prodFile" accept="image/*" required style="border: 2px dashed #ddd; padding: 20px; text-align: center; width: 100%;">
                </div>

                <div class="input-group-sell">
                    <label><i class="fas fa-tag"></i> Item Name</label>
                    <input type="text" id="prodName" placeholder="e.g., iPhone 15 Pro Max" required>
                </div>

                <div style="display: flex; gap: 15px;">
                  <div class="input-group-sell" style="flex: 1;">
    <label><i class="fas fa-star"></i> Condition</label>
    <select id="status_condition" required>
        <option value="New">New</option>
        <option value="Used">Used</option>
        <option value="Refurbished">Refurbished</option>
        <option value="Damage">Damage / For Parts</option>
        <option value="We work on order">We work on order (Custom)</option>
    </select>
</div>
                    <div class="input-group-sell" style="flex: 1;">
                        <label><i class="fas fa-money-bill-wave"></i> Price (ETB)</label>
                        <input type="number" id="prodPrice" placeholder="0.00" required>
                    </div>
                </div>

                <div class="input-group-sell">
                    <label><i class="fas fa-list"></i> Category</label>
                    <select id="prodCategory" required>
                        <option value="" disabled selected>Select Category</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Furniture">Furniture</option>
                        <option value="Fashion">Fashion</option>
                        <option value="Vehicles">Vehicles</option>
                        <option value="Property">Property</option>
                        <option value="Home Supplies">Home Supplies</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="input-group-sell">
                    <label><i class="fas fa-align-left"></i> Description</label>
                    <textarea id="prodDesc" rows="4" placeholder="Describe the item condition, specs, etc..." required></textarea>
                </div>

                <div class="input-group-sell">
                    <label><i class="fas fa-phone"></i> Contact Phone</label>
                    <input type="text" id="prodPhone" placeholder="0911..." required>
                </div>

                <button type="submit" id="submitBtn" class="auth-submit" style="width: 100%; margin-top: 20px;">
                    Publish Listing
                </button>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                if (user.user_metadata.phone_number) {
                    document.getElementById('prodPhone').value = user.user_metadata.phone_number;
                }
            } else {
                alert("Please log in to sell items.");
                window.location.href = 'index.html';
            }
        });

        // 1. IMAGE PREVIEW
        document.getElementById('prodFile').onchange = evt => {
            const [file] = evt.target.files;
            if (file) {
                const preview = document.getElementById('imagePreview');
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
            }
        };

        // 2. SUBMIT FORM
        const sellForm = document.getElementById('sellForm');
        sellForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const fileInput = document.getElementById('prodFile');
            
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) return alert("Please sign in first.");

            btn.innerText = "Processing Listing...";
            btn.disabled = true;

            try {
                // A. Upload Image
                const file = fileInput.files[0];
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}.${fileExt}`;
                const filePath = `${user.id}/${fileName}`;

                let { error: uploadError } = await _supabase.storage
                    .from('product-images')
                    .upload(filePath, file);

                if (uploadError) throw uploadError;

                // B. Get Public URL
                const { data: { publicUrl } } = _supabase.storage
                    .from('product-images')
                    .getPublicUrl(filePath);

                // C. Prepare Data (Matching your Admin Panel expectations)
                const productData = {
                    name: document.getElementById('prodName').value,
                    status_condition: document.getElementById('status_condition').value,
                    price: parseFloat(document.getElementById('prodPrice').value),
                    category: document.getElementById('prodCategory').value,
                    description: document.getElementById('prodDesc').value,
                    image: publicUrl,
                    seller_phone: document.getElementById('prodPhone').value,
                    seller_name: user.user_metadata?.full_name || "Verified Seller",
                    user_id: user.id,
                    status: 'pending' 
                };

                // D. Insert into Database
          // D. Insert into Database
// D. Insert into Database
            const { error: dbError } = await _supabase
                .from('products')
                .insert([{
                    name: document.getElementById('prodName').value,
                    status_condition: document.getElementById('status_condition').value,
                    price: parseFloat(document.getElementById('prodPrice').value),
                    category: document.getElementById('prodCategory').value,
                    description: document.getElementById('prodDesc').value,
                    image: publicUrl,
                    seller_phone: document.getElementById('prodPhone').value,
                    seller_name: user.user_metadata?.full_name || user.email.split('@')[0] || "Seller",
                    user_id: user.id,
                    status: 'pending' 
                }]);

            if (dbError) throw dbError;

            // --- TELEGRAM NOTIFICATION FOR ADMIN ---
            const telegramMessage = `🔔 *NEW LISTING PENDING*\n\n` +
                `📦 *Item:* ${document.getElementById('prodName').value}\n` +
                `💰 *Price:* ${document.getElementById('prodPrice').value} ETB\n` +
                `📞 *Seller:* ${document.getElementById('prodPhone').value}\n` +
                `📂 *Category:* ${document.getElementById('prodCategory').value}\n\n` +
                `👉 _Login to Admin Panel to Approve_`;

            try {
                await fetch(`https://api.telegram.org/bot${GolemConfig.botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: GolemConfig.chatId,
                        text: telegramMessage,
                        parse_mode: 'Markdown'
                    })
                });
            } catch (tgErr) {
                console.error("Telegram notification failed:", tgErr);
            }

            alert("Success! Your item is now pending admin approval.");
            window.location.href = `index.html?posted=${encodeURIComponent(document.getElementById('prodName').value)}`;

        } catch (error) {
            console.error("Submission error:", error);
            alert("❌ Error: " + (error.message || "Could not post item."));
        } finally {
            btn.innerText = "Publish Listing";
            btn.disabled = false;
        }
    }); // This closes the event listener



window.onload = async () => {
    await checkAdmin(); // or checkSeller()
    loadUserProfile(); // <--- Add this
    loadStats();
    // ... rest of your code
};


document.getElementById('avatarUpload').onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const { data: { user } } = await _supabase.auth.getUser();
    const fileExt = file.name.split('.').pop();
    const filePath = `avatars/${user.id}.${fileExt}`;

    // Upload to 'product-images' bucket (or create a 'profiles' bucket)
    const { error: uploadError } = await _supabase.storage
        .from('product-images') 
        .upload(filePath, file, { upsert: true });

    if (uploadError) return alert("Upload failed");

    const { data: { publicUrl } } = _supabase.storage
        .from('product-images')
        .getPublicUrl(filePath);

    // Update the profile table
    await _supabase.from('profiles').update({ avatar_url: publicUrl }).eq('id', user.id);
    
    document.getElementById('userAvatar').src = publicUrl;
    alert("Profile photo updated!");
};
        
</script>

    <style>
        .input-group-sell { margin-bottom: 15px; }
        .input-group-sell label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 5px; color: #444; }
        .input-group-sell input, .input-group-sell select, .input-group-sell textarea {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 1rem;
        }
        .auth-submit { background: #333; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .auth-submit:hover { background: #000; }
        .auth-submit:disabled { background: #ccc; }
    </style>




    <div id="editProfileModal" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:2000; align-items:center; justify-content:center;">
    <div style="background:white; padding:30px; border-radius:20px; width:90%; max-width:400px; position:relative;">
        <button onclick="closeEditProfile()" style="position:absolute; top:15px; right:15px; background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
        
        <h2 style="margin-bottom:10px;">Edit Profile</h2>
        <p style="color:#666; font-size:0.9rem; margin-bottom:20px;">Update your public information for Golem.</p>
        
        <div class="input-group-sell">
            <label><i class="fas fa-user"></i> Full Name</label>
            <input type="text" id="editFullName" placeholder="Enter your name">
        </div>
        
        <div class="input-group-sell">
            <label><i class="fas fa-phone"></i> Contact Phone</label>
            <input type="text" id="editPhone" placeholder="09...">
        </div>

        <button onclick="saveProfileChanges()" id="saveProfileBtn" class="auth-submit" style="width: 100%; margin-top: 10px;">
            Save Changes
        </button>
    </div>
</div>
</body>
</html>

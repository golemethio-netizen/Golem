<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell an Item | WanaGebya</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/9422/9422566.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .input-group-sell { margin-bottom: 15px; }
        .input-group-sell label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 5px; color: #444; }
        .input-group-sell input, .input-group-sell select, .input-group-sell textarea {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 1rem;
        }
        .auth-submit { background: #333; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 20px;}
        .auth-submit:hover { background: #000; }
        .auth-submit:disabled { background: #ccc; cursor: not-allowed; opacity: 0.7; }
        #dynamicFields { margin-top: 15px; padding: 15px; background: #fdf2f0; border-radius: 8px; display: none; border: 1px solid #f9731633; }
    </style>
</head>
<body style="background: #f8f9fa; display: none;" id="sellPageBody">

    <header class="golem-header">
        <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">WanaGebya</div>
        <a href="index.html" class="signin-btn" style="text-decoration: none;">Cancel</a>
    </header>

    <main class="container" style="max-width: 600px; padding: 20px;">
        <div class="form-card" style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
            <h2 style="margin-bottom: 10px;">Post New Listing</h2>
            <p style="color: #666; margin-bottom: 25px;">Fill in the details to reach thousands of buyers.</p>

            <form id="sellForm">
                <div class="input-group-sell">
                    <label><i class="fas fa-camera"></i> Product Photo (Max 5MB)</label>
                    <div style="text-align: center;">
                        <img id="imagePreview" src="#" alt="Preview" style="display:none; width:100%; max-height: 300px; object-fit: cover; border-radius:10px; margin: 10px 0; border: 1px solid #eee;">
                    </div>
                    <input type="file" id="prodFile" accept="image/*" required style="border: 2px dashed #ddd; padding: 20px; text-align: center; width: 100%; cursor: pointer;">
                </div>

                <div class="input-group-sell">
                    <label><i class="fas fa-tag"></i> Item Name</label>
                    <input type="text" id="prodName" placeholder="e.g., Luxury Wardrobe" required>
                </div>

                <div style="display: flex; gap: 15px;">
                    <div class="input-group-sell" style="flex: 1;">
                        <label><i class="fas fa-star"></i> Condition</label>
                        <select id="status_condition" required>
                            <option value="New">New</option>
                            <option value="Used">Used</option>
                            <option value="Refurbished">Refurbished</option>
                            <option value="Damage">Damage / For Parts</option>
                            <option value="Custom Order">We work on order</option>
                        </select>
                    </div>
                    <div class="input-group-sell" style="flex: 1;">
                        <label><i class="fas fa-money-bill-wave"></i> Price (ETB)</label>
                        <input type="number" id="prodPrice" placeholder="0.00" required>
                    </div>
                </div>

                <div class="input-group-sell">
                    <label><i class="fas fa-list"></i> Category</label>
                    <select id="prodCategory" onchange="handleCategoryChange(this.value)" required>
                        <option value="" disabled selected>Select Category</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Furniture">Furniture</option>
                        <option value="Fashion">Fashion</option>
                        <option value="Vehicles">Vehicles</option>
                        <option value="Property">Property</option>
                        <option value="Home Supplies">Home Supplies</option>
                        <option value="Services">Services</option>
                        <option value="Jobs">Jobs</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div id="dynamicFields">
                    <h4 style="font-size: 11px; text-transform: uppercase; margin-bottom: 10px; color: #e8321a; letter-spacing: 1px;">Specific Specifications</h4>
                    <div id="dynamicInputsGrid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
                </div>

                <div class="input-group-sell">
                    <label><i class="fas fa-align-left"></i> General Description</label>
                    <textarea id="prodDesc" rows="4" placeholder="Describe the item general details..." required></textarea>
                </div>

                <div class="input-group-sell">
                    <label><i class="fas fa-phone"></i> Contact Phone</label>
                    <input type="text" id="prodPhone" placeholder="0911..." required>
                </div>

                <div class="input-group-sell">
                    <label><i class="fas fa-map-marker-alt"></i> Region</label>
                    <select id="prodRegion" onchange="window.toggleDistricts(this.value)" required>
                        <option value="" disabled selected>Select Region</option>
                        <option value="Addis Ababa">Addis Ababa</option>
                        <option value="Oromia">Oromia</option>
                        <option value="Amhara">Amhara</option>
                        <option value="Tigray">Tigray</option>
                        <option value="Other">Other Region</option>
                    </select>
                </div>

                <div class="input-group-sell" id="districtWrapper" style="display: none;">
                    <label><i class="fas fa-city"></i> Sub-City</label>
                    <select id="prodDistrict">
                        <option value="" disabled selected>Select Sub-City</option>
                        <option value="Bole">Bole</option>
                        <option value="Kirkos">Kirkos</option>
                        <option value="Arada">Arada</option>
                        <option value="Yeka">Yeka</option>
                        <option value="Nifas Silk">Nifas Silk</option>
                    </select>
                </div>

                <button type="submit" id="submitBtn" class="auth-submit">Publish Listing</button>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        let currentUserName = "Unknown Seller";

        // Configuration for dynamic fields
        const categoryConfigs = {
            "Services": [
                { id: "exp", label: "Experience", placeholder: "e.g. 5+ Years" },
                { id: "resp", label: "Response", placeholder: "e.g. Under 2hrs" }
            ],
            "Furniture": [
                { id: "subCat", label: "Type", type: "select", options: ["Main Gate", "Kitchen Cabinet", "Cupboard", "Sofa", "Other"] },
                { id: "material", label: "Material", placeholder: "e.g. MDF / Wood" },
                { id: "dim", label: "Dimensions", placeholder: "e.g. 200x180cm" }
            ]
        };

        function handleCategoryChange(val) {
            const container = document.getElementById('dynamicFields');
            const grid = document.getElementById('dynamicInputsGrid');
            grid.innerHTML = ''; 
            
            if (categoryConfigs[val]) {
                container.style.display = 'block';
                categoryConfigs[val].forEach(field => {
                    const div = document.createElement('div');
                    div.innerHTML = `<label style="font-size:11px; margin-bottom:2px; display:block; color:#777;">${field.label}</label>`;
                    
                    if (field.type === 'select') {
                        const sel = document.createElement('select');
                        sel.className = "extra-field-input";
                        sel.setAttribute('data-label', field.label);
                        field.options.forEach(opt => sel.innerHTML += `<option value="${opt}">${opt}</option>`);
                        div.appendChild(sel);
                    } else {
                        const inp = document.createElement('input');
                        inp.className = "extra-field-input";
                        inp.setAttribute('data-label', field.label);
                        inp.placeholder = field.placeholder;
                        div.appendChild(inp);
                    }
                    grid.appendChild(div);
                });
            } else {
                container.style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }
            document.getElementById('sellPageBody').style.display = 'block';
            const { data: profile } = await _supabase.from('profiles').select('full_name, phone').eq('id', user.id).single();
            if (profile) {
                currentUserName = profile.full_name || user.email.split('@')[0];
                if (profile.phone) document.getElementById('prodPhone').value = profile.phone;
            }
        });

        // Image Preview
        document.getElementById('prodFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const preview = document.getElementById('imagePreview');
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => { preview.src = e.target.result; preview.style.display = 'block'; };
                reader.readAsDataURL(file);
            }
        });

        // FORM SUBMISSION
        document.getElementById('sellForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const fileInput = document.getElementById('prodFile');
            const { data: { user } } = await _supabase.auth.getUser();

            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                // 1. Collect Extra Specs
                let extraSpecsText = "";
                const extras = document.querySelectorAll('.extra-field-input');
                extras.forEach(el => {
                    extraSpecsText += `\n- ${el.getAttribute('data-label')}: ${el.value}`;
                });

                const finalDescription = document.getElementById('prodDesc').value + (extraSpecsText ? "\n\n--- Specs ---" + extraSpecsText : "");

                // 2. Upload Image
                const file = fileInput.files[0];
                const fileName = `${user.id}/${Date.now()}-${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
                const { error: uploadError } = await _supabase.storage.from('product-images').upload(fileName, file);
                if (uploadError) throw uploadError;
                const { data: { publicUrl } } = _supabase.storage.from('product-images').getPublicUrl(fileName);

                // 3. Database Insert
                const region = document.getElementById('prodRegion').value;
                const district = document.getElementById('prodDistrict').value;
                const locationStr = (region === 'Addis Ababa' && district) ? `${district}, ${region}` : region;

                const { error: dbError } = await _supabase.from('products').insert([{
                    user_id: user.id,
                    name: document.getElementById('prodName').value,
                    price: parseFloat(document.getElementById('prodPrice').value),
                    status_condition: document.getElementById('status_condition').value,
                    category: document.getElementById('prodCategory').value,
                    description: finalDescription,
                    location: locationStr,
                    image: publicUrl,
                    seller_phone: document.getElementById('prodPhone').value,
                    status: 'pending' 
                }]);

                if (dbError) throw dbError;

                alert("🎉 Success! Your listing is pending review.");
                window.location.href = "my-items.html";

            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false;
                btn.innerText = "Publish Listing";
            }
        });

        window.toggleDistricts = (region) => {
            document.getElementById('districtWrapper').style.display = (region === 'Addis Ababa') ? 'block' : 'none';
        };
    </script>
</body>
</html>

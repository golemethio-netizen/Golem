<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell an Item | WanaGebya</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/9422/9422566.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .input-group-sell { margin-bottom: 15px; }
        .input-group-sell label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 5px; color: #444; }
        .input-group-sell input,
        .input-group-sell select,
        .input-group-sell textarea {

        /* ── Subcategory chip selector ── */
        .sell-subcat-chip {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 6px 14px; border-radius: 20px;
            border: 1.5px solid #c8e6c9;
            background: white; color: #0A291A;
            font-size: 0.8rem; font-weight: 600;
            cursor: pointer; font-family: inherit;
            transition: all 0.15s; white-space: nowrap;
        }
        .sell-subcat-chip:hover  { background: #f0f7f4; border-color: #0A291A; }
        .sell-subcat-chip.active { background:#F5A623; color:#1a1a1a; border-color: #0A291A; }
            width: 100%; padding: 12px; border: 1px solid #ddd;
            border-radius: 8px; font-family: inherit; font-size: 1rem;
        }
        .auth-submit {
            background:#F5A623; color:#1a1a1a; border: none; padding: 15px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
            transition: 0.3s; width: 100%; margin-top: 20px;
        }
        .auth-submit:hover { background: #e09400; color: #1a1a1a; }
        .auth-submit:disabled { background: #ccc; cursor: not-allowed; opacity: 0.7; }

        /* ── Dynamic fields container ── */
        #dynamicFields {
            margin-top: 15px; padding: 0;
            background: transparent; border-radius: 8px;
            display: none;
        }

        /* ── Section header inside dynamic block ── */
        .dyn-section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 700;
            color: #F5A623;
            padding: 10px 14px;
            background: #fff4f2;
            border: 1px solid #f9731633;
            border-radius: 10px 10px 0 0;
            border-bottom: none;
        }

        .dyn-section-header i { font-size: 13px; }

        /* ── Dynamic inputs grid ── */
        #dynamicInputsGrid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 16px;
            background: #fdf8f7;
            border: 1px solid #f9731633;
            border-radius: 0 0 10px 10px;
        }

        /* Full-width field inside grid */
        .dyn-full { grid-column: 1 / -1; }

        /* Generic field label inside dynamic grid */
        .dyn-label {
            font-size: 11.5px;
            font-weight: 600;
            margin-bottom: 4px;
            display: block;
            color: #555;
        }

        .dyn-input, .extra-field-input {
            width: 100%;
            padding: 9px 11px;
            border: 1px solid #ddd;
            border-radius: 7px;
            font-family: inherit;
            font-size: 13px;
            background: white;
            color: #222;
            transition: border-color 0.15s;
        }

        .dyn-input:focus, .extra-field-input:focus {
            border-color: #F5A623;
            outline: none;
            box-shadow: 0 0 0 3px rgba(232,50,26,0.08);
        }

        /* ── Tag-style pill selector ── */
        .pill-group {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-top: 2px;
        }

        .pill {
            padding: 5px 13px;
            border-radius: 20px;
            border: 1.5px solid #ddd;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            background: white;
            color: #555;
            transition: all 0.15s;
            user-select: none;
        }

        .pill:hover { border-color: #F5A623; color: #F5A623; }
        .pill.selected { background: #F5A623; color: white; border-color: #F5A623; }

        /* ── Icon badge for category ── */
        .cat-icon-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: #fff4f2; border: 1px solid #f9731633;
            border-radius: 20px; padding: 4px 12px;
            font-size: 12px; font-weight: 600; color: #F5A623;
            margin-bottom: 10px;
        }

        /* salary range row */
        .salary-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .salary-row input { flex: 1; }
        .salary-row span { font-size: 13px; color: #888; white-space: nowrap; }

        /* tag hint text */
        .dyn-hint {
            font-size: 11px; color: #aaa; margin-top: 4px;
        }
    </style>
</head>
<body style="background: #f8f9fa; display: none;" id="sellPageBody">

    <header class="golem-header">
        <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">WanaGebya</div>
        <a href="index.html" class="signin-btn" style="text-decoration: none;" data-am="ይቅር">Cancel</a>
    </header>

    <main class="container" style="max-width: 600px; padding: 20px;">
        <div class="form-card" style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
            <h2 style="margin-bottom: 10px;">Post New Listing</h2>
            <p style="color: #666; margin-bottom: 25px;"><span data-am="ዝርዝሮችን ይሙሉ ለሺዎች ገዢዎች ያቅርቡ።">Fill in the details to reach thousands of buyers.</span></p>

            <form id="sellForm">

                <!-- Photo -->
                <div class="input-group-sell">
                    <label><i class="fas fa-camera"></i> Product Photo (Max 5MB)</label>
                    <div style="text-align: center;">
                        <img id="imagePreview" src="#" alt="Preview"
                             style="display:none; width:100%; max-height:300px; object-fit:cover; border-radius:10px; margin:10px 0; border:1px solid #eee;">
                    </div>
                    <input type="file" id="prodFile" accept="image/*" required
                           style="border:2px dashed #ddd; padding:20px; text-align:center; width:100%; cursor:pointer;">
                </div>

                <!-- Name -->
                <div class="input-group-sell">
                    <label><i class="fas fa-tag"></i> Item / Listing Title</label>
                    <input type="text" id="prodName" placeholder="your product or service Name" data-am-placeholder="የምርትዎ ወይም አገልግሎትዎ ስም" required>
                </div>

                <!-- Condition + Price -->
                <div style="display:flex; gap:15px;">
                    <div class="input-group-sell" style="flex:1;">
                        <label><i class="fas fa-star"></i> Condition</label>
                        <select id="status_condition" required>
                            <option value="New">New</option>
                            <option value="Used">Used</option>
                            <option value="Refurbished">Refurbished</option>
                            <option value="Damage">Damage / For Parts</option>
                            <option value="Custom Order">We work on order</option>
                        </select>
                    </div>
                    <div class="input-group-sell" style="flex:1;">
                        <label><i class="fas fa-money-bill-wave"></i> Price / Salary (ETB)</label>
                        <input type="number" id="prodPrice" placeholder="0.00" style="color:#e53935; font-weight:700;" required>
                    </div>
                </div>

                <!-- STOCK MANAGEMENT -->
                <div style="background:#f8f9ff;border:1.5px solid #d0d0ff;border-radius:12px;padding:16px;margin-bottom:15px;">
                    <div style="font-weight:700;color:#0A291A;font-size:0.88rem;margin-bottom:12px;"><i class="fas fa-boxes"></i> <span data-am="የክምችት አስተዳደር">Stock Management</span></div>
                    <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;">
                        <!-- Stock Status -->
                        <div class="input-group-sell" style="flex:1;min-width:140px;margin:0;">
                            <label style="font-size:0.82rem;"><i class="fas fa-toggle-on"></i> Stock Status</label>
                            <select id="prodStockStatus" onchange="toggleSellQtyField(this.value)"
                                style="border-radius:8px;padding:10px;border:1.5px solid #d0d0ff;width:100%;outline:none;">
                                <option value="in_stock">✅ In Stock</option>
                                <option value="out_of_stock">❌ Out of Stock</option>
                                <option value="limited">⚠️ Limited Stock</option>
                            </select>
                        </div>
                        <!-- Quantity -->
                        <div class="input-group-sell" id="sellQtyWrapper" style="flex:1;min-width:120px;margin:0;">
                            <label style="font-size:0.82rem;"><i class="fas fa-hashtag"></i> Quantity Available</label>
                            <input type="number" id="prodQuantity" min="0" placeholder="e.g. 10"
                                style="border-radius:8px;padding:10px;border:1.5px solid #d0d0ff;width:100%;outline:none;box-sizing:border-box;">
                        </div>
                    </div>
                    <div id="sellStockPreview" style="margin-top:10px;font-size:0.8rem;color:#2ed573;font-weight:700;">
                        <i class="fas fa-check-circle"></i> Item will show as In Stock to buyers.
                    </div>
                </div>

                <!-- Category -->
                <div class="input-group-sell">
                    <label><i class="fas fa-list"></i> Category</label>
                    <select id="prodCategory" onchange="handleCategoryChange(this.value)" required>
                        <option value="" disabled selected>Loading categories…</option>
                    </select>
                </div>

                <!-- Subcategory chips (shown when category has subcategories) -->
                <div class="input-group-sell" id="subCatWrapper" style="display:none;">
                    <label><i class="fas fa-sitemap"></i> Subcategory <span style="font-weight:400;color:#aaa;font-size:0.78rem;">(optional)</span></label>
                    <input type="hidden" id="prodSubcategory" value="">
                    <div id="subCatChips" style="display:flex;flex-wrap:wrap;gap:7px;margin-top:6px;"></div>
                </div>

                <!-- ── Dynamic Spec Fields ── -->
                <div id="dynamicFields">
                    <div class="dyn-section-header" id="dynSectionHeader">
                        <i class="fas fa-sliders-h"></i>
                        <span id="dynSectionLabel">Specific Specifications</span>
                    </div>
                    <div id="dynamicInputsGrid"></div>
                </div>

                <!-- Description -->
                <div class="input-group-sell">
                    <label><i class="fas fa-align-left"></i> General Description</label>
                    <textarea id="prodDesc" rows="4" placeholder="Describe the item or listing in detail..." data-am-placeholder="እቃውን ወይም ማስታወቂያውን በዝርዝር ይግለጹ..." required></textarea>
                </div>

                <!-- Phone -->
                <div class="input-group-sell">
                    <label><i class="fas fa-phone"></i> Contact Phone</label>
                    <input type="text" id="prodPhone" placeholder="0911..." data-am-placeholder="0911..." required>
                </div>

                <!-- Region -->
                <div class="input-group-sell">
                 <label><i class="fas fa-map-marker-alt"></i> Region</label>
    <select id="prodRegion" onchange="handleRegionChange(this.value)" required>
        <option value="" disabled selected>Select Region</option>
        <option value="Addis Ababa">Addis Ababa</option>
        <option value="Oromia">Oromia</option>
        <option value="Amhara">Amhara</option>
        <option value="Tigray">Tigray</option>
        <option value="Sidama">Sidama</option>
        <option value="South Ethiopia">South Ethiopia</option>
        <option value="Other">Other Region</option>
    </select>
</div>

                <!-- Sub-City -->
               <div class="input-group-sell" id="locationWrapper" style="display:none;">
    <label id="locationLabel"><i class="fas fa-city"></i> Area / Sub-City</label>
    <div id="locationInputContainer">
        </div>
</div>

                <button type="submit" id="submitBtn" class="auth-submit" data-am="ያትሙ">Publish Listing</button>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
    let currentUserName = "Unknown Seller";

    /* ══════════════════════════════════════════════
       CATEGORY CONFIG — HTML builders per category
    ══════════════════════════════════════════════ */
    const categoryRenderers = {

        /* ── JOBS ── */
        Jobs: () => `
            <div class="dyn-full">
                <span class="cat-icon-badge"><i class="fas fa-briefcase"></i> Job / Vacancy Details</span>
            </div>

            <div>
                <label class="dyn-label">Job Title</label>
                <input class="dyn-input extra-field-input" data-label="Job Title" placeholder="e.g. Senior Accountant" data-am-placeholder="ለምሳሌ ከፍተኛ ሂሳብ ባለሙያ">
            </div>

            <div>
                <label class="dyn-label">Company / Organization</label>
                <input class="dyn-input extra-field-input" data-label="Company" placeholder="e.g. ABC Trading PLC" data-am-placeholder="ለምሳሌ ABC ንግድ ሕ/ሽ/ማ">
            </div>

            <div>
                <label class="dyn-label">Job Type</label>
                <select class="dyn-input extra-field-input" data-label="Job Type">
                    <option value="">Select type</option>
                    <option>Full-Time</option>
                    <option>Part-Time</option>
                    <option>Contract</option>
                    <option>Internship</option>
                    <option>Freelance</option>
                    <option>Volunteer</option>
                </select>
            </div>

            <div>
                <label class="dyn-label">Work Location</label>
                <select class="dyn-input extra-field-input" data-label="Work Location">
                    <option value="">Select</option>
                    <option>On-site</option>
                    <option>Remote</option>
                    <option>Hybrid</option>
                </select>
            </div>

            <div>
                <label class="dyn-label">Industry / Sector</label>
                <select class="dyn-input extra-field-input" data-label="Industry">
                    <option value="">Select industry</option>
                    <option>Accounting & Finance</option>
                    <option>IT & Software</option>
                    <option>Engineering</option>
                    <option>Healthcare</option>
                    <option>Education & Teaching</option>
                    <option>Sales & Marketing</option>
                    <option>Construction</option>
                    <option>Logistics & Transport</option>
                    <option>Hotel & Tourism</option>
                    <option>NGO / Development</option>
                    <option>Government</option>
                    <option>Other</option>
                </select>
            </div>

            <div>
                <label class="dyn-label">Experience Required</label>
                <select class="dyn-input extra-field-input" data-label="Experience Required">
                    <option value="">Select</option>
                    <option>No Experience (Fresh)</option>
                    <option>1 Year</option>
                    <option>2 Years</option>
                    <option>3 Years</option>
                    <option>4 Years</option>
                    <option>5+ Years</option>
                    <option>10+ Years</option>
                </select>
            </div>

            <div>
                <label class="dyn-label">Education Level</label>
                <select class="dyn-input extra-field-input" data-label="Education Level">
                    <option value="">Select</option>
                    <option>10th / 12th Grade</option>
                    <option>TVET / Diploma</option>
                    <option>Bachelor's Degree</option>
                    <option>Master's Degree</option>
                    <option>PhD</option>
                    <option>Not Required</option>
                </select>
            </div>

            <div>
                <label class="dyn-label">Gender Preference</label>
                <select class="dyn-input extra-field-input" data-label="Gender Preference">
                    <option value="Any">Any / No Preference</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div>
                <label class="dyn-label">Number of Positions</label>
                <input class="dyn-input extra-field-input" data-label="Positions Available" type="number" min="1" placeholder="e.g. 3">
            </div>

            <div>
                <label class="dyn-label">Application Deadline</label>
                <input class="dyn-input extra-field-input" data-label="Deadline" type="date">
            </div>

            <div class="dyn-full">
                <label class="dyn-label">Salary Range (ETB / month)</label>
                <div class="salary-row">
                    <input class="dyn-input extra-field-input" data-label="Salary Min" type="number" placeholder="Min e.g. 8,000" data-am-placeholder="ዝቅተኛ ለምሳሌ 8,000">
                    <span>—</span>
                    <input class="dyn-input extra-field-input" data-label="Salary Max" type="number" placeholder="Max e.g. 20,000" data-am-placeholder="ከፍተኛ ለምሳሌ 20,000">
                </div>
                <div class="dyn-hint">Leave blank if salary is negotiable</div>
            </div>

            <div class="dyn-full">
                <label class="dyn-label">Key Skills / Requirements</label>
                <div class="pill-group" id="skillPills">
                    ${['MS Office','Excel','Accounting Software','English','Amharic','Driving License','Customer Service','Communication','Leadership','Teamwork','Research'].map(s =>
                        `<span class="pill" onclick="togglePill(this,'skills')">${s}</span>`
                    ).join('')}
                </div>
                <input type="hidden" id="skillsValue" data-label="Key Skills">
                <div class="dyn-hint">Tap to select. You can add more in the description.</div>
            </div>

            <div class="dyn-full">
                <label class="dyn-label">Benefits / Perks</label>
                <div class="pill-group" id="benefitPills">
                    ${['Transportation','Lunch Allowance','Health Insurance','Annual Leave','Pension','Bonus','Training','Housing Allowance'].map(b =>
                        `<span class="pill" onclick="togglePill(this,'benefits')">${b}</span>`
                    ).join('')}
                </div>
                <input type="hidden" id="benefitsValue" data-label="Benefits">
            </div>

            <div class="dyn-full">
                <label class="dyn-label">How to Apply</label>
                <select class="dyn-input extra-field-input" data-label="How to Apply">
                    <option value="">Select method</option>
                    <option>Call / WhatsApp</option>
                    <option>Email CV</option>
                    <option>Walk-in Interview</option>
                    <option>Online Application</option>
                    <option>Telegram</option>
                </select>
            </div>
        `,

        /* ── SERVICES ── */
        Services: () => `
            <div class="dyn-full">
                <span class="cat-icon-badge"><i class="fas fa-tools"></i> Service Details</span>
            </div>

            <div>
                <label class="dyn-label">Service Category</label>
                <select class="dyn-input extra-field-input" data-label="Service Category">
                    <option value="">Select type</option>
                    <optgroup label="Home & Construction">
                        <option>Plumbing</option>
                        <option>Electrical Work</option>
                        <option>Painting</option>
                        <option>Tiling & Flooring</option>
                        <option>Carpentry & Woodwork</option>
                        <option>Cleaning Service</option>
                        <option>Moving & Packing</option>
                        <option>Air Conditioning</option>
                        <option>Welding & Metal Work</option>
                    </optgroup>
                    <optgroup label="IT & Digital">
                        <option>Web Design</option>
                        <option>Graphic Design</option>
                        <option>Computer Repair</option>
                        <option>Phone Repair</option>
                        <option>Network Setup</option>
                        <option>CCTV Installation</option>
                        <option>Software Development</option>
                    </optgroup>
                    <optgroup label="Education & Training">
                        <option>Private Tutoring</option>
                        <option>Language Classes</option>
                        <option>Music Lessons</option>
                        <option>Driving Instruction</option>
                        <option>Skills Training</option>
                    </optgroup>
                    <optgroup label="Business & Professional">
                        <option>Accounting / Bookkeeping</option>
                        <option>Legal Consultation</option>
                        <option>Translation</option>
                        <option>Photography / Videography</option>
                        <option>Event Planning</option>
                        <option>Security Service</option>
                    </optgroup>
                    <optgroup label="Personal & Beauty">
                        <option>Hair Salon / Barbershop</option>
                        <option>Makeup & Styling</option>
                        <option>Massage / Spa</option>
                        <option>Laundry Service</option>
                        <option>Childcare / Babysitting</option>
                        <option>Elder Care</option>
                    </optgroup>
                    <option>Other</option>
                </select>
            </div>

            <div>
                <label class="dyn-label">Provider / Business Name</label>
                <input class="dyn-input extra-field-input" data-label="Provider Name" placeholder="e.g. Kebede Fix-It Services">
            </div>

            <div>
                <label class="dyn-label">Years of Experience</label>
                <select class="dyn-input extra-field-input" data-label="Experience">
                    <option value="">Select</option>
                    <option>Less than 1 Year</option>
                    <option>1–2 Years</option>
                    <option>3–5 Years</option>
                    <option>5–10 Years</option>
                    <option>10+ Years</option>
                </select>
            </div>

            <div>
                <label class="dyn-label">Response Time</label>
                <select class="dyn-input extra-field-input" data-label="Response Time">
                    <option value="">Select</option>
                    <option>Within 1 Hour</option>
                    <option>Same Day</option>
                    <option>Within 24 Hours</option>
                    <option>2–3 Days</option>
                    <option>On Appointment</option>
                </select>
            </div>

            <div>
                <label class="dyn-label">Pricing Model</label>
                <select class="dyn-input extra-field-input" data-label="Pricing Model">
                    <option value="">Select</option>
                    <option>Fixed Price</option>
                    <option>Per Hour</option>
                    <option>Per Day</option>
                    <option>Per Project</option>
                    <option>Negotiable</option>
                    <option>Free Consultation</option>
                </select>
            </div>

            <div>
                <label class="dyn-label">Service Area</label>
                <select class="dyn-input extra-field-input" data-label="Service Area">
                    <option value="">Select</option>
                    <option>Home Visit / On-site</option>
                    <option>At Our Workshop / Office</option>
                    <option>Remote / Online</option>
                    <option>Both On-site & Remote</option>
                </select>
            </div>

            <div>
                <label class="dyn-label">Availability</label>
                <select class="dyn-input extra-field-input" data-label="Availability">
                    <option value="">Select</option>
                    <option>Weekdays Only</option>
                    <option>Weekends Only</option>
                    <option>Every Day</option>
                    <option>Flexible / By Appointment</option>
                    <option>24/7 Emergency</option>
                </select>
            </div>

            <div>
                <label class="dyn-label">Team Size</label>
                <select class="dyn-input extra-field-input" data-label="Team Size">
                    <option value="">Select</option>
                    <option>Individual (Freelancer)</option>
                    <option>2–5 People</option>
                    <option>6–20 People</option>
                    <option>Company (20+)</option>
                </select>
            </div>

            <div class="dyn-full">
                <label class="dyn-label">Skills / Tools Used</label>
                <div class="pill-group" id="skillPills">
                    ${['Licensed','Insured','Certified','Free Estimate','Warranty Given','Materials Included','Equipment Provided','Portfolio Available','References Available'].map(s =>
                        `<span class="pill" onclick="togglePill(this,'skills')">${s}</span>`
                    ).join('')}

        // ── WATERMARK FUNCTION ──
        // Draws the product image on a canvas, adds watermark, returns a watermarked Blob
        async function applyWatermark(file) {
            return new Promise((resolve) => {
                const img = new Image();
                const url = URL.createObjectURL(file);
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width  = img.naturalWidth;
                    canvas.height = img.naturalHeight;
                    const ctx = canvas.getContext('2d');

                    // Draw original image
                    ctx.drawImage(img, 0, 0);

                    // ── Watermark config ──
                    const text     = 'wanagebya.com';
                    const padding  = 14;
                    const fontSize = Math.max(16, Math.round(canvas.width * 0.038));
                    ctx.font       = `bold ${fontSize}px Arial, sans-serif`;
                    ctx.textBaseline = 'bottom';

                    // Measure text for background pill
                    const textW = ctx.measureText(text).width;
                    const boxH  = fontSize + padding;
                    const boxW  = textW + padding * 2;
                    const x     = canvas.width  - boxW - 16;
                    const y     = canvas.height - boxH - 16;

                    // Semi-transparent background pill
                    ctx.globalAlpha = 0.62;
                    ctx.fillStyle   = '#1a1a1a';
                    const r = 8;
                    ctx.beginPath();
                    ctx.moveTo(x + r, y);
                    ctx.lineTo(x + boxW - r, y);
                    ctx.quadraticCurveTo(x + boxW, y, x + boxW, y + r);
                    ctx.lineTo(x + boxW, y + boxH - r);
                    ctx.quadraticCurveTo(x + boxW, y + boxH, x + boxW - r, y + boxH);
                    ctx.lineTo(x + r, y + boxH);
                    ctx.quadraticCurveTo(x, y + boxH, x, y + boxH - r);
                    ctx.lineTo(x, y + r);
                    ctx.quadraticCurveTo(x, y, x + r, y);
                    ctx.closePath();
                    ctx.fill();

                    // Watermark text
                    ctx.globalAlpha = 0.92;
                    ctx.fillStyle   = '#ffffff';
                    ctx.fillText(text, x + padding, y + boxH - padding / 2);

                    // Small logo dot accent
                    ctx.globalAlpha = 1;
                    ctx.fillStyle   = '#0A291A';
                    ctx.beginPath();
                    ctx.arc(x + padding - 6, y + boxH / 2, 4, 0, Math.PI * 2);
                    ctx.fill();

                    URL.revokeObjectURL(url);
                    canvas.toBlob(resolve, 'image/jpeg', 0.88);
                };
                img.src = url;
            });
        }

            wrapper.style.pointerEvents = 'none';
            document.getElementById('prodQuantity').value = '';
            preview.style.color = '#ff4757';
            preview.innerHTML = '<i class="fas fa-times-circle"></i> Item will show as Out of Stock to buyers.';
        } else if (val === 'limited') {
            wrapper.style.opacity = '1';
            wrapper.style.pointerEvents = 'all';
            preview.style.color = '#e67e22';
            preview.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Enter remaining quantity above — buyers will see a urgency badge.';
        } else {
            wrapper.style.opacity = '1';
            wrapper.style.pointerEvents = 'all';
            preview.style.color = '#2ed573';
            preview.innerHTML = '<i class="fas fa-check-circle"></i> Item will show as In Stock to buyers.';
        }
    }
    </script>

    <script>
    // Language persistence
    (function() {
        const lang = localStorage.getItem('wg_lang');
        if (lang === 'am') {
            document.addEventListener('DOMContentLoaded', function() {
                document.querySelectorAll('[data-am]').forEach(el => {
                    const cur = el.innerText.trim();
                    const am = el.getAttribute('data-am');
                    if (am) { el.innerText = am; el.setAttribute('data-am', cur); }
                });
                document.querySelectorAll('[data-am-placeholder]').forEach(el => {
                    el.setAttribute('data-en-placeholder', el.placeholder);
                    el.placeholder = el.getAttribute('data-am-placeholder');
                });
                document.documentElement.lang = 'am';
            });
        }
    })();
    </script>
</body>
</html>

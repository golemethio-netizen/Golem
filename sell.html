<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell an Item | WanaGebya</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/9422/9422566.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .input-group-sell { margin-bottom: 15px; }
        .input-group-sell label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 5px; color: #444; }
        .input-group-sell input,
        .input-group-sell select,
        .input-group-sell textarea {
            width: 100%; padding: 12px; border: 1px solid #ddd;
            border-radius: 8px; font-family: inherit; font-size: 1rem;
        }
        .auth-submit {
            background: #333; color: white; border: none; padding: 15px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
            transition: 0.3s; width: 100%; margin-top: 20px;
        }
        .auth-submit:hover { background: #000; }
        .auth-submit:disabled { background: #ccc; cursor: not-allowed; opacity: 0.7; }

        /* ── Dynamic fields container ── */
        #dynamicFields {
            margin-top: 15px; padding: 0;
            background: transparent; border-radius: 8px;
            display: none;
        }

        /* ── Section header inside dynamic block ── */
        .dyn-section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 700;
            color: #e8321a;
            padding: 10px 14px;
            background: #fff4f2;
            border: 1px solid #f9731633;
            border-radius: 10px 10px 0 0;
            border-bottom: none;
        }

        .dyn-section-header i { font-size: 13px; }

        /* ── Dynamic inputs grid ── */
        #dynamicInputsGrid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 16px;
            background: #fdf8f7;
            border: 1px solid #f9731633;
            border-radius: 0 0 10px 10px;
        }

        /* Full-width field inside grid */
        .dyn-full { grid-column: 1 / -1; }

        /* Generic field label inside dynamic grid */
        .dyn-label {
            font-size: 11.5px;
            font-weight: 600;
            margin-bottom: 4px;
            display: block;
            color: #555;
        }

        .dyn-input, .extra-field-input {
            width: 100%;
            padding: 9px 11px;
            border: 1px solid #ddd;
            border-radius: 7px;
            font-family: inherit;
            font-size: 13px;
            background: white;
            color: #222;
            transition: border-color 0.15s;
        }

        .dyn-input:focus, .extra-field-input:focus {
            border-color: #e8321a;
            outline: none;
            box-shadow: 0 0 0 3px rgba(232,50,26,0.08);
        }

        /* ── Tag-style pill selector ── */
        .pill-group {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-top: 2px;
        }

        .pill {
            padding: 5px 13px;
            border-radius: 20px;
            border: 1.5px solid #ddd;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            background: white;
            color: #555;
            transition: all 0.15s;
            user-select: none;
        }

        .pill:hover { border-color: #e8321a; color: #e8321a; }
        .pill.selected { background: #e8321a; color: white; border-color: #e8321a; }

        /* ── Icon badge for category ── */
        .cat-icon-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: #fff4f2; border: 1px solid #f9731633;
            border-radius: 20px; padding: 4px 12px;
            font-size: 12px; font-weight: 600; color: #e8321a;
            margin-bottom: 10px;
        }

        /* salary range row */
        .salary-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .salary-row input { flex: 1; }
        .salary-row span { font-size: 13px; color: #888; white-space: nowrap; }

        /* tag hint text */
        .dyn-hint {
            font-size: 11px; color: #aaa; margin-top: 4px;
        }
    </style>
</head>
<body style="background: #f8f9fa; display: none;" id="sellPageBody">

    <header class="golem-header">
        <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">WanaGebya</div>
        <a href="index.html" class="signin-btn" style="text-decoration: none;">Cancel</a>
    </header>

    <main class="container" style="max-width: 600px; padding: 20px;">
        <div class="form-card" style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
            <h2 style="margin-bottom: 10px;">Post New Listing</h2>
            <p style="color: #666; margin-bottom: 25px;">Fill in the details to reach thousands of buyers.</p>

            <form id="sellForm">

                <!-- Photo -->
                <div class="input-group-sell">
                    <label><i class="fas fa-camera"></i> Product Photo (Max 5MB)</label>
                    <div style="text-align: center;">
                        <img id="imagePreview" src="#" alt="Preview"
                             style="display:none; width:100%; max-height:300px; object-fit:cover; border-radius:10px; margin:10px 0; border:1px solid #eee;">
                    </div>
                    <input type="file" id="prodFile" accept="image/*" required
                           style="border:2px dashed #ddd; padding:20px; text-align:center; width:100%; cursor:pointer;">
                </div>

                <!-- Name -->
                <div class="input-group-sell">
                    <label><i class="fas fa-tag"></i> Item / Listing Title</label>
                    <input type="text" id="prodName" placeholder="your product or service Name" required>
                </div>

                <!-- Condition + Price -->
                <div style="display:flex; gap:15px;">
                    <div class="input-group-sell" style="flex:1;">
                        <label><i class="fas fa-star"></i> Condition</label>
                        <select id="status_condition" required>
                            <option value="New">New</option>
                            <option value="Used">Used</option>
                            <option value="Refurbished">Refurbished</option>
                            <option value="Damage">Damage / For Parts</option>
                            <option value="Custom Order">We work on order</option>
                        </select>
                    </div>
                    <div class="input-group-sell" style="flex:1;">
                        <label><i class="fas fa-money-bill-wave"></i> Price / Salary (ETB)</label>
                        <input type="number" id="prodPrice" placeholder="0.00" required>
                    </div>
                </div>

                <!-- STOCK MANAGEMENT -->
                <div style="background:#f8f9ff;border:1.5px solid #d0d0ff;border-radius:12px;padding:16px;margin-bottom:15px;">
                    <div style="font-weight:700;color:#6c5ce7;font-size:0.88rem;margin-bottom:12px;"><i class="fas fa-boxes"></i> Stock Management</div>
                    <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;">
                        <!-- Stock Status -->
                        <div class="input-group-sell" style="flex:1;min-width:140px;margin:0;">
                            <label style="font-size:0.82rem;"><i class="fas fa-toggle-on"></i> Stock Status</label>
                            <select id="prodStockStatus" onchange="toggleSellQtyField(this.value)"
                                style="border-radius:8px;padding:10px;border:1.5px solid #d0d0ff;width:100%;outline:none;">
                                <option value="in_stock">✅ In Stock</option>
                                <option value="out_of_stock">❌ Out of Stock</option>
                                <option value="limited">⚠️ Limited Stock</option>
                            </select>
                        </div>
                        <!-- Quantity -->
                        <div class="input-group-sell" id="sellQtyWrapper" style="flex:1;min-width:120px;margin:0;">
                            <label style="font-size:0.82rem;"><i class="fas fa-hashtag"></i> Quantity Available</label>
                            <input type="number" id="prodQuantity" min="0" placeholder="e.g. 10"
                                style="border-radius:8px;padding:10px;border:1.5px solid #d0d0ff;width:100%;outline:none;box-sizing:border-box;">
                        </div>
                    </div>
                    <div id="sellStockPreview" style="margin-top:10px;font-size:0.8rem;color:#00b894;font-weight:700;">
                        <i class="fas fa-check-circle"></i> Item will show as In Stock to buyers.
                    </div>
                </div>

                <!-- Category -->
                <div class="input-group-sell">
                    <label><i class="fas fa-list"></i> Category</label>
                    <select id="prodCategory" onchange="handleCategoryChange(this.value)" required>
                        <option value="" disabled selected>Loading categories…</option>
                    </select>
                </div>

                <!-- Subcategory (shown when category has subcategories) -->
                <div class="input-group-sell" id="subCatWrapper" style="display:none;">
                    <label><i class="fas fa-sitemap"></i> Subcategory</label>
                    <select id="prodSubcategory">
                        <option value="">— Select subcategory (optional) —</option>
                    </select>
                </div>

                <!-- ── Dynamic Spec Fields ── -->
                <div id="dynamicFields">
                    <div class="dyn-section-header" id="dynSectionHeader">
                        <i class="fas fa-sliders-h"></i>
                        <span id="dynSectionLabel">Specific Specifications</span>
                    </div>
                    <div id="dynamicInputsGrid"></div>
                </div>

                <!-- Description -->
                <div class="input-group-sell">
                    <label><i class="fas fa-align-left"></i> General Description</label>
                    <textarea id="prodDesc" rows="4" placeholder="Describe the item or listing in detail..." required></textarea>
                </div>

                <!-- Phone -->
                <div class="input-group-sell">
                    <label><i class="fas fa-phone"></i> Contact Phone</label>
                    <input type="text" id="prodPhone" placeholder="0911..." required>
                </div>

                <!-- Region -->
                <div class="input-group-sell">
                 <label><i class="fas fa-map-marker-alt"></i> Region</label>
    <select id="prodRegion" onchange="handleRegionChange(this.value)" required>
        <option value="" disabled selected>Select Region</option>
        <option value="Addis Ababa">Addis Ababa</option>
        <option value="Oromia">Oromia</option>
        <option value="Amhara">Amhara</option>
        <option value="Tigray">Tigray</option>
        <option value="Sidama">Sidama</option>
        <option value="South Ethiopia">South Ethiopia</option>
        <option value="Other">Other Region</option>
    </select>
</div>

                <!-- Sub-City -->
               <div class="input-group-sell" id="locationWrapper" style="display:none;">
    <label id="locationLabel"><i class="fas fa-city"></i> Area / Sub-City</label>
    <div id="locationInputContainer">
        </div>
</div>

                <button type="submit" id="submitBtn" class="auth-submit">Publish Listing</button>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    /* ══════════════════════════════
       PILL TOGGLE (multi-select tags)
    ══════════════════════════════ */
    function togglePill(el, groupId) {
        el.classList.toggle('selected');
        const group = document.getElementById(groupId + 'Pills');
        const hiddenInput = document.getElementById(groupId + 'Value');
        if (!group || !hiddenInput) return;
        const selected = [...group.querySelectorAll('.pill.selected')].map(p => p.textContent);
        hiddenInput.value = selected.join(', ');
    }

    function handleCategoryChange(val) {
        const container = document.getElementById('dynamicFields');
        const grid = document.getElementById('dynamicInputsGrid');
        const label = document.getElementById('dynSectionLabel');

        grid.innerHTML = '';

        const labelMap = {
            Jobs: 'Job / Vacancy Specifications',
            Services: 'Service Specifications',
            Furniture: 'Furniture Specifications',
        };

        if (categoryRenderers[val]) {
            container.style.display = 'block';
            label.textContent = labelMap[val] || 'Specific Specifications';
            grid.innerHTML = categoryRenderers[val]();
        } else {
            container.style.display = 'none';
        }

        // Load subcategories for this category
        loadSubcategories(val);
    }

    /* ══════════════════════════════
       COLLECT ALL EXTRA SPECS
    ══════════════════════════════ */
    function collectExtraSpecs() {
        let text = "";
        const extras = document.querySelectorAll('.extra-field-input');
        extras.forEach(el => {
            const val = el.value ? el.value.trim() : '';
            if (val) text += `\n- ${el.getAttribute('data-label')}: ${val}`;
        });
        // pill hidden inputs
        ['skillsValue','benefitsValue','paymentValue'].forEach(id => {
            const el = document.getElementById(id);
            if (el && el.value) text += `\n- ${el.getAttribute('data-label')}: ${el.value}`;
        });
        return text;
    }

        document.getElementById('sellPageBody').style.display = 'block';

    // ── Category + Subcategory loader for sell form ────────────
    let _sellCats = [];

    async function loadSellCategories() {
        const sel = document.getElementById('prodCategory');
        try {
            const { data: cats, error } = await _supabase
                .from('categories')
                .select('id, name, subcategories(id, name)')
                .order('sort_order', { ascending: true });

            if (error || !cats || cats.length === 0) {
                // Fallback to hardcoded list
                _injectDefaultSellCats(sel);
                return;
            }
            _sellCats = cats;
            sel.innerHTML = '<option value="" disabled selected>Select Category</option>';
            cats.forEach(c => {
                sel.innerHTML += `<option value="${c.name}">${c.name}</option>`;
            });
            // Always keep "Other" at end
            sel.innerHTML += '<option value="Other">Other</option>';
        } catch(e) {
            _injectDefaultSellCats(sel);
        }
    }

    function _injectDefaultSellCats(sel) {
        sel.innerHTML = `
            <option value="" disabled selected>Select Category</option>
            <option value="Electronics">Electronics</option>
            <option value="Furniture">Furniture</option>
            <option value="Fashion">Fashion</option>
            <option value="Vehicles">Vehicles</option>
            <option value="Property">Property</option>
            <option value="Home Supplies">Home Supplies</option>
            <option value="Services">Services</option>
            <option value="Jobs">Jobs</option>
            <option value="Other">Other</option>`;
    }

    function loadSubcategories(catName) {
        const cat = _sellCats.find(c => c.name === catName);
        const wrapper = document.getElementById('subCatWrapper');
        const subSel  = document.getElementById('prodSubcategory');
        const subs = cat?.subcategories || [];
        if (subs.length === 0) {
            wrapper.style.display = 'none';
            subSel.innerHTML = '';
            return;
        }
        subSel.innerHTML = '<option value="">— Select subcategory (optional) —</option>';
        subs.forEach(s => { subSel.innerHTML += `<option value="${s.name}">${s.name}</option>`; });
        wrapper.style.display = 'block';
    }

    /* Image Preview */
    document.getElementById('prodFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const preview = document.getElementById('imagePreview');
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => { preview.src = e.target.result; preview.style.display = 'block'; };
            reader.readAsDataURL(file);

    });

        // ── WATERMARK FUNCTION ──
        // Draws the product image on a canvas, adds watermark, returns a watermarked Blob
        async function applyWatermark(file) {
            return new Promise((resolve) => {
                const img = new Image();
                const url = URL.createObjectURL(file);
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width  = img.naturalWidth;
                    canvas.height = img.naturalHeight;
                    const ctx = canvas.getContext('2d');

                    // Draw original image
                    ctx.drawImage(img, 0, 0);

                    // ── Watermark config ──
                    const text     = 'wanagebya.com';
                    const padding  = 14;
                    const fontSize = Math.max(16, Math.round(canvas.width * 0.038));
                    ctx.font       = `bold ${fontSize}px Arial, sans-serif`;
                    ctx.textBaseline = 'bottom';

                    // Measure text for background pill
                    const textW = ctx.measureText(text).width;
                    const boxH  = fontSize + padding;
                    const boxW  = textW + padding * 2;
                    const x     = canvas.width  - boxW - 16;
                    const y     = canvas.height - boxH - 16;

                    // Semi-transparent background pill
                    ctx.globalAlpha = 0.62;
                    ctx.fillStyle   = '#1a1a2e';
                    const r = 8;
                    ctx.beginPath();
                    ctx.moveTo(x + r, y);
                    ctx.lineTo(x + boxW - r, y);
                    ctx.quadraticCurveTo(x + boxW, y, x + boxW, y + r);
                    ctx.lineTo(x + boxW, y + boxH - r);
                    ctx.quadraticCurveTo(x + boxW, y + boxH, x + boxW - r, y + boxH);
                    ctx.lineTo(x + r, y + boxH);
                    ctx.quadraticCurveTo(x, y + boxH, x, y + boxH - r);
                    ctx.lineTo(x, y + r);
                    ctx.quadraticCurveTo(x, y, x + r, y);
                    ctx.closePath();
                    ctx.fill();

                    // Watermark text
                    ctx.globalAlpha = 0.92;
                    ctx.fillStyle   = '#ffffff';
                    ctx.fillText(text, x + padding, y + boxH - padding / 2);

                    // Small logo dot accent
                    ctx.globalAlpha = 1;
                    ctx.fillStyle   = '#6c5ce7';
                    ctx.beginPath();
                    ctx.arc(x + padding - 6, y + boxH / 2, 4, 0, Math.PI * 2);
                    ctx.fill();

                    URL.revokeObjectURL(url);
                    canvas.toBlob(resolve, 'image/jpeg', 0.88);
                };
                img.src = url;
            });
        }

   document.getElementById('sellForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const fileInput = document.getElementById('prodFile');
        const { data: { user } } = await _supabase.auth.getUser();

        btn.innerText = "Processing...";
        btn.disabled = true;

        try {
            const extraSpecsText = collectExtraSpecs();
            const finalDescription = document.getElementById('prodDesc').value +
                (extraSpecsText ? "\n\n--- Specs ---" + extraSpecsText : "");

            // Upload image with watermark
            const rawFile = fileInput.files[0];
            btn.innerText = "Adding watermark...";
            const watermarkedBlob = await applyWatermark(rawFile);
            const file = new File([watermarkedBlob], rawFile.name, { type: 'image/jpeg' });
            btn.innerText = "Uploading...";
            const fileName = `${user.id}/${Date.now()}-${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
            const { error: uploadError } = await _supabase.storage.from('product-images').upload(fileName, file);
            if (uploadError) throw uploadError;
            const { data: { publicUrl } } = _supabase.storage.from('product-images').getPublicUrl(fileName);

         const region = document.getElementById('prodRegion').value;
            const district = document.getElementById('prodDistrict').value;
           const locationStr = district ? `${district}, ${region}` : region;

            const stockStatus = document.getElementById('prodStockStatus').value;
            const qtyVal = document.getElementById('prodQuantity').value;

            const { error: dbError } = await _supabase.from('products').insert([{
                user_id: user.id,
                name: document.getElementById('prodName').value,
                price: parseFloat(document.getElementById('prodPrice').value),
                status_condition: document.getElementById('status_condition').value,
                category: document.getElementById('prodCategory').value,
                subcategory: document.getElementById('prodSubcategory')?.value || null,
                description: finalDescription,
                location: locationStr,
                image: publicUrl,
                seller_phone: document.getElementById('prodPhone').value,
                stock_status: stockStatus,
                quantity: qtyVal ? parseInt(qtyVal) : null,
                status: 'pending'
            }]);

            if (dbError) throw dbError;

            alert("🎉 Success! Your listing is pending review.");
            window.location.href = "my-items.html";

        } catch (err) {
            alert("Error: " + err.message);
            btn.disabled = false;
            btn.innerText = "Publish Listing";
        }
    });

    window.toggleDistricts = (region) => {
        document.getElementById('districtWrapper').style.display =
            (region === 'Addis Ababa') ? 'block' : 'none';
    };

    function toggleSellQtyField(val) {
        const wrapper = document.getElementById('sellQtyWrapper');
        const preview = document.getElementById('sellStockPreview');
        if (val === 'out_of_stock') {
            wrapper.style.opacity = '0.4';
            wrapper.style.pointerEvents = 'none';
            document.getElementById('prodQuantity').value = '';
            preview.style.color = '#ff4757';
            preview.innerHTML = '<i class="fas fa-times-circle"></i> Item will show as Out of Stock to buyers.';
        } else if (val === 'limited') {
            wrapper.style.opacity = '1';
            wrapper.style.pointerEvents = 'all';
            preview.style.color = '#e67e22';
            preview.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Enter remaining quantity above — buyers will see a urgency badge.';
        } else {
            wrapper.style.opacity = '1';
            wrapper.style.pointerEvents = 'all';
            preview.style.color = '#00b894';
            preview.innerHTML = '<i class="fas fa-check-circle"></i> Item will show as In Stock to buyers.';
        }
    }

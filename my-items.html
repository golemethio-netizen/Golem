<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Items | Golem Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Status Tag Styling */
        .status-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 12px;
            border-radius: 20px;
            color: white;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            z-index: 2;
        }
        .product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .product-info { padding: 15px; }
        .action-buttons { display: flex; gap: 8px; margin-top: 15px; }
        .edit-btn { flex: 1; padding: 8px; background: #f0f2f5; border: none; border-radius: 5px; cursor: pointer; }
        .delete-btn { padding: 8px; background: #fff1f0; color: #ff4d4f; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body style="background: #f8f9fa;">

    <header class="golem-header">
        <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">GOLEM</div>
        <h2 style="color: white; margin: 0; font-size: 1.2rem;">My Dashboard</h2>
        <a href="index.html" class="signin-btn" style="text-decoration: none;">Back Home</a>
    </header>

    <main class="container" style="padding: 20px;">
        <div class="dashboard-header" style="margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 10px;">
            <h3>Your Posted Items</h3>
            <p style="color: #666;">Manage your listings and track their status.</p>
        </div>

        <div id="myItemsGrid" class="masonry-wrapper">
            <div class="loading-spinner" style="text-align: center; padding: 50px;">
                <i class="fas fa-spinner fa-spin fa-2x"></i> Loading your items...
            </div>
        </div>

        <div id="editModal" class="modal-overlay" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 9999;">
            <div class="modal-content" style="background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 450px;">
                <h2 style="margin-bottom: 20px;"><i class="fas fa-edit"></i> Edit Listing</h2>
                <input type="hidden" id="editId">
                
                <div class="input-group-sell" style="margin-bottom: 15px;">
                    <label style="display:block; font-weight:bold; margin-bottom:5px;">Item Name</label>
                    <input type="text" id="editName" style="width:100%; padding:12px; border:1px solid #ddd; border-radius: 8px;">
                </div>

                <div class="input-group-sell" style="margin-bottom: 15px;">
                    <label style="display:block; font-weight:bold; margin-bottom:5px;">Price (ETB)</label>
                    <input type="number" id="editPrice" style="width:100%; padding:12px; border:1px solid #ddd; border-radius: 8px;">
                </div>

                <div class="input-group-sell" style="margin-bottom: 20px;">
                    <label style="display:block; font-weight:bold; margin-bottom:5px;">Description</label>
                    <textarea id="editDesc" style="width:100%; padding:12px; border:1px solid #ddd; border-radius: 8px; height: 100px; resize: none;"></textarea>
                </div>

                <button onclick="saveChanges()" class="auth-submit" style="width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
                    Update & Resubmit
                </button>
                <button onclick="closeEditModal()" style="width: 100%; margin-top: 10px; background: none; border: none; color: #888; cursor: pointer;">Cancel</button>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) {
                alert("Please sign in to view your items.");
                window.location.href = 'index.html';
                return;
            }
            loadMyItems(user.id);
        });

        async function loadMyItems(userId) {
            const grid = document.getElementById('myItemsGrid');
            const { data: items, error } = await _supabase
                .from('products')
                .select('*')
                .eq('user_id', userId)
                .order('created_at', { ascending: false });

            if (error || !items || items.length === 0) {
                grid.innerHTML = `<div style="text-align:center; padding:50px; grid-column: 1 / -1;">
                    <i class="fas fa-box-open fa-3x" style="color: #ccc;"></i>
                    <p>No items found.</p>
                </div>`;
                return;
            }

            grid.innerHTML = items.map(item => {
                const reasonNote = item.rejection_reason ? 
                    `<p style="color: #dc3545; font-size: 12px; margin-top: 5px;"><b>Reason:</b> ${item.rejection_reason}</p>` : '';

                return `
                    <div class="product-card" id="item-${item.id}">
                        <div class="img-wrapper" style="position:relative; height:180px;">
                            <span class="status-tag" style="background:${getStatusColor(item.status)};">
                                ${item.status}
                            </span>
                            <img src="${item.image}" style="width:100%; height:100%; object-fit:cover;">
                        </div>
                        <div class="product-info">
                            <h3>${item.name}</h3>
                            <p style="color:#007bff; font-weight:bold;">${item.price.toLocaleString()} ETB</p>
                            ${reasonNote}
                            <div class="action-buttons">
                                <button onclick="openEditModal('${item.id}')" class="edit-btn"><i class="fas fa-edit"></i> Edit</button>
                                ${item.status === 'rejected' ? `
                                    <button onclick="contactAdmin('${item.name}')" style="background:#6c757d; color:white; border:none; padding:8px; border-radius:5px; flex:1;">
                                        <i class="fas fa-question-circle"></i> Why?
                                    </button>
                                ` : ''}
                                <button onclick="deleteItem('${item.id}')" class="delete-btn"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getStatusColor(status) {
            switch(status) {
                case 'approved': return '#28a745';
                case 'rejected': return '#dc3545';
                case 'sold': return '#6c757d';
                default: return '#ffc107'; // pending
            }
        }

        window.openEditModal = async function(id) {
            const { data: item } = await _supabase.from('products').select('*').eq('id', id).single();
            if (!item) return;

            document.getElementById('editId').value = item.id;
            document.getElementById('editName').value = item.name;
            document.getElementById('editPrice').value = item.price;
            document.getElementById('editDesc').value = item.description;
            document.getElementById('editModal').style.display = 'flex';
        };

        window.closeEditModal = () => document.getElementById('editModal').style.display = 'none';

        window.saveChanges = async function() {
            const id = document.getElementById('editId').value;
            const updatedData = {
                name: document.getElementById('editName').value,
                price: parseFloat(document.getElementById('editPrice').value),
                description: document.getElementById('editDesc').value,
                status: 'pending', // Resets to pending for admin re-approval
                rejection_reason: null // Clears old rejection reason
            };

            const { error } = await _supabase.from('products').update(updatedData).eq('id', id);
            if (error) alert(error.message);
            else {
                alert("Updated! Back in review.");
                location.reload();
            }
        };

        window.deleteItem = async function(id) {
            if(confirm("Delete this listing permanently?")) {
                const { error } = await _supabase.from('products').delete().eq('id', id);
                if(!error) document.getElementById(`item-${id}`).remove();
            }
        };

        window.contactAdmin = function(itemName) {
            const adminTelegram = "allInOneEthiopia1"; 
            const message = encodeURIComponent(`Hello Admin, I have a question about my rejected item: "${itemName}"`);
            window.open(`https://t.me/${adminTelegram}?text=${message}`, '_blank');
        };
    </script>
</body>
</html>

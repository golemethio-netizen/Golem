<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Items | Golem Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Modern Status Tag Styling */
        .status-tag {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 6px 14px;
            border-radius: 20px;
            color: white;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            letter-spacing: 0.5px;
        }

        /* Dashboard Specific Tweaks */
        .dashboard-header {
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .dashboard-header h3 { font-size: 1.8rem; margin: 0; }
        
        .action-buttons { 
            display: flex; 
            gap: 10px; 
            margin-top: 15px; 
        }
        
        .edit-btn, .delete-btn, .why-btn { 
            flex: 1; 
            padding: 10px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: var(--transition);
        }

        .edit-btn { background: #f1f2f6; color: var(--text-main); }
        .edit-btn:hover { background: #e2e4e9; transform: translateY(-2px); }

        .delete-btn { background: #ffeaa7; color: #d63031; }
        .delete-btn:hover { background: #fab1a0; transform: translateY(-2px); }

        .why-btn { background: #6c5ce7; color: white; }
        .why-btn:hover { background: #5a4bcf; transform: translateY(-2px); }
    </style>
</head>
<body>

    <!-- HEADER (Matches index and profile) -->
    <header class="golem-header">
        <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">WanaGebya</div>
        <div class="nav-container-horizontal">
            <a href="index.html" class="nav-item-box">
                <i class="fas fa-home"></i>
                <p>Shop</p>
            </a>
            <a href="profile.html" class="nav-item-box">
                <i class="fas fa-user"></i>
                <p>Profile</p>
            </a>
            <button onclick="window.handleSignOut()" class="signout-btn" style="margin-left: 10px;">
                <i class="fas fa-sign-out-alt"></i> Sign Out
            </button>
        </div>
    </header>

    <main class="container">
        <div class="dashboard-header">
            <div>
                <h3>Your Posted Items</h3>
                <p style="color: var(--text-muted); margin: 5px 0 0 0;">Manage your listings and track their status.</p>
            </div>
            <button onclick="location.href='sell.html'" class="auth-submit" style="padding: 10px 20px;">
                <i class="fas fa-plus"></i> Post New Item
            </button>
        </div>

        <div id="myItemsGrid" class="masonry-wrapper">
            <div class="loading-spinner" style="text-align: center; padding: 50px; grid-column: 1 / -1; color: var(--primary-color);">
                <i class="fas fa-circle-notch fa-spin fa-2x"></i> 
                <p style="margin-top: 10px; font-weight: 600;">Loading your items...</p>
            </div>
        </div>

        <!-- EDIT MODAL (Matches Modern Style) -->
        <div id="editModal" class="modal-overlay" onclick="if(event.target == this) window.closeEditModal()">
            <div class="modal-content" style="max-width: 500px; padding: 30px;">
                <button type="button" class="close-modal-btn" onclick="window.closeEditModal()">&times;</button>
                <h2 style="margin-bottom: 20px;"><i class="fas fa-edit" style="color: var(--primary-color);"></i> Edit Listing</h2>
                
                <input type="hidden" id="editId">
                
                <div class="input-group">
                    <i class="fas fa-tag"></i>
                    <input type="text" id="editName" placeholder="Item Name" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-money-bill-wave"></i>
                    <input type="number" id="editPrice" placeholder="Price (ETB)" required>
                </div>

                <div class="input-group" style="align-items: flex-start;">
                    <i class="fas fa-align-left" style="margin-top: 5px;"></i>
                    <textarea id="editDesc" placeholder="Item Description" required style="height: 100px; resize: none;"></textarea>
                </div>

                <button onclick="saveChanges()" class="auth-submit" style="width: 100%; margin-top: 15px;">
                    Update & Resubmit
                </button>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) {
                alert("Please sign in to view your items.");
                window.location.href = 'index.html';
                return;
            }
            loadMyItems(user.id);
        });

        async function loadMyItems(userId) {
            const grid = document.getElementById('myItemsGrid');
            const { data: items, error } = await _supabase
                .from('products')
                .select('*')
                .eq('user_id', userId)
                .order('created_at', { ascending: false });

            if (error || !items || items.length === 0) {
                grid.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-box-open fa-3x" style="color: #ccc; margin-bottom: 15px;"></i>
                    <h3 style="margin:0;">No items found</h3>
                    <p style="color: #888;">You haven't posted any items yet.</p>
                    <a href="sell.html" class="shop-btn">Sell an Item</a>
                </div>`;
                return;
            }

            grid.innerHTML = items.map(item => {
                const reasonNote = item.rejection_reason ? 
                    `<div style="background: #fff0f0; border-left: 3px solid #ff4757; padding: 8px; margin-top: 10px; border-radius: 4px;">
                        <span style="color: #ff4757; font-size: 0.8rem; font-weight: bold;">REASON FOR REJECTION:</span>
                        <p style="color: #d63031; font-size: 0.85rem; margin: 2px 0 0 0;">${item.rejection_reason}</p>
                    </div>` : '';

                return `
                    <div class="product-card" id="item-${item.id}">
                        <div class="card-img-container">
                            <span class="status-tag" style="background:${getStatusColor(item.status)};">
                                ${item.status}
                            </span>
                            <img src="${item.image}" alt="${item.name}">
                        </div>
                        
                        <div class="product-info">
                            <h3 class="product-title">${item.name}</h3>
                            <p class="product-price">${item.price.toLocaleString()} ETB</p>
                            ${reasonNote}
                            
                            <div class="action-buttons">
                                <button onclick="openEditModal('${item.id}')" class="edit-btn"><i class="fas fa-edit"></i> Edit</button>
                                ${item.status === 'rejected' ? `
                                    <button onclick="contactAdmin('${item.name}')" class="why-btn">
                                        <i class="fas fa-headset"></i> Support
                                    </button>
                                ` : ''}
                                <button onclick="deleteItem('${item.id}')" class="delete-btn" title="Delete Item"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getStatusColor(status) {
            switch(status) {
                case 'approved': return '#25D366'; // WhatsApp Green
                case 'rejected': return '#ff4757'; // Danger Red
                case 'sold': return '#636e72'; // Muted Grey
                default: return '#f1c40f'; // Pending Yellow
            }
        }

        window.openEditModal = async function(id) {
            const { data: item } = await _supabase.from('products').select('*').eq('id', id).single();
            if (!item) return;

            document.getElementById('editId').value = item.id;
            document.getElementById('editName').value = item.name;
            document.getElementById('editPrice').value = item.price;
            document.getElementById('editDesc').value = item.description;
            
            const modal = document.getElementById('editModal');
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        };

        window.closeEditModal = () => {
            document.getElementById('editModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        };

        window.saveChanges = async function() {
            const id = document.getElementById('editId').value;
            const btn = event.target;
            btn.innerText = "Updating...";
            btn.disabled = true;

            const updatedData = {
                name: document.getElementById('editName').value,
                price: parseFloat(document.getElementById('editPrice').value),
                description: document.getElementById('editDesc').value,
                status: 'pending', // Resets to pending for admin re-approval
                rejection_reason: null // Clears old rejection reason
            };

            const { error } = await _supabase.from('products').update(updatedData).eq('id', id);
            
            if (error) {
                alert(error.message);
                btn.innerText = "Update & Resubmit";
                btn.disabled = false;
            } else {
                alert("Successfully Updated! Your item is back in review.");
                location.reload();
            }
        };

        window.deleteItem = async function(id) {
            if(confirm("Are you sure you want to permanently delete this listing?")) {
                const { error } = await _supabase.from('products').delete().eq('id', id);
                if(!error) {
                    const itemCard = document.getElementById(`item-${id}`);
                    itemCard.style.transform = "scale(0)";
                    setTimeout(() => itemCard.remove(), 300);
                } else {
                    alert("Error deleting item: " + error.message);
                }
            }
        };

        window.contactAdmin = function(itemName) {
            const adminTelegram = "allInOneEthiopia1"; 
            const message = encodeURIComponent(`Hello Admin, I have a question about my rejected item on Golem Marketplace: "${itemName}"`);
            window.open(`https://t.me/${adminTelegram}?text=${message}`, '_blank');
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>My Dashboard - Golem</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav><div class="logo" onclick="location.href='index.html'">GOLEM</div><div id="userMenu"></div></nav>
    <div class="container">
        <h2>📦 My Active Items</h2>
        <div id="myProductGrid" class="product-grid"></div>
        <hr>
        <h2>💰 Sales History (Buyer Clicks)</h2>
        <div id="orderHistory" class="order-list-card"></div>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
    <script>
        async function loadData() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) return window.location.href = "index.html";

            // Load Products
            const { data: prods } = await _supabase.from('products').select('*').eq('user_id', user.id);
            document.getElementById('myProductGrid').innerHTML = prods.map(p => `
                <div class="product-card">
                    <img src="${p.image}">
                    <h3>${p.name}</h3>
                    <button onclick="markSold('${p.id}')">Mark Sold</button>
                </div>
            `).join('');

            // Load Orders
            const { data: ords } = await _supabase.from('orders').select('*').eq('seller_id', user.id);
            document.getElementById('orderHistory').innerHTML = ords.map(o => `
                <div class="order-item">
                    <b>${o.product_name}</b> - Buyer: ${o.buyer_name} (${o.buyer_phone})
                </div>
            `).join('');
        }
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Items | Golem Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="golem-header">
        <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">GOLEM</div>
        <h2 style="color: white; margin: 0;">My Dashboard</h2>
        <a href="index.html" class="signin-btn" style="text-decoration: none;">Back Home</a>
    </header>

    <main class="container" style="padding: 20px;">
        <div class="dashboard-header" style="margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 10px;">
            <h3>Your Posted Items</h3>
            <p style="color: #666;">Manage your listings and track their status.</p>
        </div>

        <div id="myItemsGrid" class="masonry-wrapper">
            <div class="loading-spinner" style="text-align: center; padding: 50px;">
                <i class="fas fa-spinner fa-spin fa-2x"></i> Loading your items...
             </div>
        </div>


<div id="editModal" class="modal-overlay" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000;">
    <div class="modal-content" style="background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px;">
        <h3><i class="fas fa-edit"></i> Edit Your Post</h3>
        <input type="hidden" id="editId">
        
        <div class="input-group-sell" style="margin-top:15px;">
            <label>Item Name</label>
            <input type="text" id="editName" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px;">
        </div>

        <div class="input-group-sell">
            <label>Price (ETB)</label>
            <input type="number" id="editPrice" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px;">
        </div>

        <div class="input-group-sell">
            <label>Description</label>
            <textarea id="editDesc" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px; height:80px;"></textarea>
        </div>

        <button onclick="saveChanges()" class="auth-submit" style="width: 100%; margin-top: 15px; background: #007bff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer;">
            Update Listing
        </button>
        <button onclick="closeEditModal()" style="width: 100%; background: none; border: none; color: #666; margin-top: 10px; cursor: pointer;">Cancel</button>
    </div>
</div>

        
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
   document.addEventListener('DOMContentLoaded', async () => {
    const { data: { user } } = await _supabase.auth.getUser();
    
    if (!user) {
        alert("Please sign in to view your items.");
        window.location.href = 'index.html';
        return;
    }
    
    // Call the correct function
    loadMyItems(user.id);
});

async function loadMyItems(userId) {
    const grid = document.getElementById('myItemsGrid');
    
    // Fetch everything: pending, approved, AND rejected
    const { data: items, error } = await _supabase
        .from('products')
        .select('*')
        .eq('user_id', userId)
        .order('created_at', { ascending: false });

    if (error || !items || items.length === 0) {
        grid.innerHTML = `
            <div style="text-align:center; padding:50px; grid-column: 1 / -1;">
                <i class="fas fa-box-open fa-3x" style="color: #ccc;"></i>
                <p>You haven't posted any items yet.</p>
                <button onclick="location.href='sell.html'" class="signin-btn" style="margin-top:10px; display:inline-block; border:1px solid #007bff; color:#007bff;">Post an Item Now</button>
            </div>`;
        return;
    }

    grid.innerHTML = items.map(item => `
        <div class="product-card" id="item-${item.id}">
            <div class="img-wrapper" style="position:relative;">
                <span class="status-tag ${item.status}" style="position:absolute; top:10px; left:10px; padding:5px 10px; border-radius:5px; font-size:12px; font-weight:bold; text-transform:uppercase; color:white; background:${getStatusColor(item.status)};">
                    ${item.status}
                </span>
                <img src="${item.image}" alt="${item.name}" style="width:100%; height:200px; object-fit:cover; border-radius:10px 10px 0 0;">
            </div>
            <div class="product-info" style="padding:15px;">
                <h3 style="margin-bottom:5px;">${item.name}</h3>
                <p class="price" style="color:#007bff; font-weight:bold; margin-bottom:15px;">${item.price} ETB</p>
                
                <div class="action-buttons" style="display: flex; gap: 10px;">
                    <button onclick="openEditModal('${item.id}')" class="edit-btn" style="flex:1; padding:8px; border-radius:5px; border:1px solid #ddd; background:#f8f9fa; cursor:pointer;">
                        <i class="fas fa-edit"></i> Edit
                    </button>
                    <button onclick="deleteItem('${item.id}')" class="delete-btn" style="flex:1; padding:8px; border-radius:5px; border:none; background:#ff4d4d; color:white; cursor:pointer;">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </div>
            </div>
        </div>
    `).join('');
}

// Helper to color the status tags
function getStatusColor(status) {
    if (status === 'approved') return '#28a745'; // Green
    if (status === 'rejected') return '#dc3545'; // Red
    return '#ffc107'; // Yellow for pending
}

// --- MODAL FUNCTIONS ---

window.openEditModal = async function(id) {
    const { data: item, error } = await _supabase
        .from('products')
        .select('*')
        .eq('id', id)
        .single();

    if (error) return alert("Error loading item details.");

    document.getElementById('editId').value = item.id;
    document.getElementById('editName').value = item.name;
    document.getElementById('editPrice').value = item.price;
    document.getElementById('editDesc').value = item.description;

    document.getElementById('editModal').style.display = 'flex';
};

window.closeEditModal = function() {
    document.getElementById('editModal').style.display = 'none';
};

window.saveChanges = async function() {
    const id = document.getElementById('editId').value;
    const btn = document.querySelector('#editModal .auth-submit');
    
    btn.innerText = "Updating...";
    btn.disabled = true;

    const updatedData = {
        name: document.getElementById('editName').value,
        price: parseFloat(document.getElementById('editPrice').value),
        description: document.getElementById('editDesc').value,
        status: 'pending' 
    };

    const { error } = await _supabase
        .from('products')
        .update(updatedData)
        .eq('id', id);

    if (error) {
        alert("Error updating: " + error.message);
        btn.innerText = "Update Listing";
        btn.disabled = false;
    } else {
        alert("Success! Your item is back in review.");
        location.reload();
    }
};

window.deleteItem = async function(id) {
    if(confirm("Are you sure you want to delete this listing permanently?")) {
        const { error } = await _supabase.from('products').delete().eq('id', id);
        if(!error) {
            const el = document.getElementById(`item-${id}`);
            if(el) el.remove();
        }
    }
};
    </script>



<div id="editModal" class="modal-overlay" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 9999;">
    <div class="modal-content" style="background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
        <h2 style="margin-bottom: 20px;"><i class="fas fa-edit"></i> Edit Listing</h2>
        
        <input type="hidden" id="editId">
        
        <div class="input-group-sell" style="margin-bottom: 15px;">
            <label style="display:block; font-weight:bold; margin-bottom:5px;">Item Name</label>
            <input type="text" id="editName" style="width:100%; padding:12px; border:1px solid #ddd; border-radius: 8px;">
        </div>

        <div class="input-group-sell" style="margin-bottom: 15px;">
            <label style="display:block; font-weight:bold; margin-bottom:5px;">Price (ETB)</label>
            <input type="number" id="editPrice" style="width:100%; padding:12px; border:1px solid #ddd; border-radius: 8px;">
        </div>

        <div class="input-group-sell" style="margin-bottom: 20px;">
            <label style="display:block; font-weight:bold; margin-bottom:5px;">Description</label>
            <textarea id="editDesc" style="width:100%; padding:12px; border:1px solid #ddd; border-radius: 8px; height: 100px; resize: none;"></textarea>
        </div>

        <button onclick="saveChanges()" class="auth-submit" style="width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
            Update & Resubmit for Approval
        </button>
        
        <button onclick="closeEditModal()" style="width: 100%; margin-top: 10px; background: none; border: none; color: #888; cursor: pointer;">Cancel</button>
    </div>
</div>


    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage My Items | Golem</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <nav>
        <div class="logo" onclick="location.href='index.html'">GOLEM</div>
        <div id="userMenu">
            <button onclick="location.href='index.html'" class="filter-btn">Back to Shop</button>
        </div>
    </nav>

    <div class="container">
        <div id="statsSummary">
            </div>

        <div class="header-row">
            <h2>My Listings</h2>
            <button onclick="location.href='submit.html'" class="main-btn" style="width: auto; padding: 10px 20px;">
                ➕ Sell New Item
            </button>
        </div>

        <div id="myItemsGrid" class="product-grid">
            <p class="loading">Loading your items...</p>
        </div>
    </div>

    <footer class="bottom-nav">
        <div class="nav-item" onclick="location.href='index.html'">🏠 Home</div>
        <div class="nav-item active" onclick="location.href='my-items.html'">📦 My Items</div>
        <div class="nav-item" onclick="checkAuthToSell()">➕ Sell</div>
    </footer>

    <script src="config.js"></script>
    <script src="my-items.js"></script>
</body>
</html>

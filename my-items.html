<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/9422/9422566.png">
    <title>My Items | WanaGebya</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Modern Status Tag Styling */
        .status-tag {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 6px 14px;
            border-radius: 20px;
            color: white;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            letter-spacing: 0.5px;
        }

        /* Dashboard Specific Tweaks */
        .dashboard-header {
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .dashboard-header h3 { font-size: 1.8rem; margin: 0; }
        
        .action-buttons { 
            display: flex; 
            gap: 10px; 
            margin-top: 15px; 
        }
        
        .edit-btn, .delete-btn, .why-btn { 
            flex: 1; 
            padding: 10px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: 0.2s;
        }

        .edit-btn { background: #f1f2f6; color: #1a1a1a; }
        .edit-btn:hover { background: #e2e4e9; transform: translateY(-2px); }

        .delete-btn { background: #ffeaa7; color: #d63031; }
        .delete-btn:hover { background: #fab1a0; transform: translateY(-2px); }

        .why-btn { background:#F5A623; color:#1a1a1a; }
        .why-btn:hover { background: #5a4bcf; transform: translateY(-2px); }

        /* Modal specific styling for large forms */
        .modal-content-scrollable {
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
        }
        
        .input-group-sell { margin-bottom: 15px; width: 100%; }
        .input-group-sell label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 5px; color: #444; }
        .input-group-sell input, .input-group-sell select, .input-group-sell textarea {

        /* Subcategory chips */
        .sell-subcat-chip {
            display:inline-flex; align-items:center; gap:5px;
            padding:6px 14px; border-radius:20px;
            border:1.5px solid #c8e6c9; background:white; color:#0A291A;
            font-size:0.8rem; font-weight:600; cursor:pointer;
            font-family:inherit; transition:all 0.15s; white-space:nowrap;
        }
        .sell-subcat-chip:hover  { background:#f0f7f4; border-color:#0A291A; }
        .sell-subcat-chip.active { background:#F5A623; color:#1a1a1a; border-color:#0A291A; }
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 1rem; box-sizing: border-box;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="golem-header">
        <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">WanaGebya</div>
        <div class="nav-container-horizontal">
            <a href="index.html" class="nav-item-box">
                <i class="fas fa-home"></i>
                <p>Shop</p>
            </a>
            <a href="profile.html" class="nav-item-box">
                <i class="fas fa-user"></i>
                <p>Profile</p>
            </a>
            <button onclick="window.handleSignOut()" class="signout-btn" style="margin-left: 10px;">
                <i class="fas fa-sign-out-alt"></i> Sign Out
            </button>
        </div>
    </header>

    <main class="container">
        <div class="dashboard-header">
            <div>
                <h3>Your Posted Items</h3>
                <p style="color: #666; margin: 5px 0 0 0;"><span data-am="ዝርዝሮችዎን ያስተዳድሩ እና ሁኔታቸውን ይከታተሉ።">Manage your listings and track their status.</span></p>
            </div>
            <button onclick="location.href='sell.html'" class="auth-submit" style="padding: 10px 20px;">
                <i class="fas fa-plus"></i> Post New Item
            </button>
        </div>

        <div id="myItemsGrid" class="masonry-wrapper">
            <div class="loading-spinner" style="text-align: center; padding: 50px; grid-column: 1 / -1; color: #0A291A;">
                <i class="fas fa-circle-notch fa-spin fa-2x"></i> 
                <p style="margin-top: 10px; font-weight: 600;">Loading your items...</p>
            </div>
        </div>

        <!-- FULL EDIT MODAL -->
        <div id="editModal" class="modal-overlay" onclick="if(event.target == this) window.closeEditModal()">
            <div class="modal-content modal-content-scrollable" style="max-width: 600px;">
                <button type="button" class="close-modal-btn" onclick="window.closeEditModal()">&times;</button>
                <h2 style="margin-bottom: 20px;"><i class="fas fa-edit" style="color: #0A291A;"></i> <span data-am="ማስታወቂያ አርትዕ">Edit Listing</span></h2>
                
                <form id="editForm" onsubmit="window.saveChanges(event)">
                    <input type="hidden" id="editId">
                    <input type="hidden" id="editCategoryType"> <!-- 'job', 'service', or 'product' -->

                    <!-- Photo -->
                    <div class="input-group-sell">
                        <label><i class="fas fa-camera"></i> Update Photo (Optional)</label>
                        <div style="text-align:center;">
                            <img id="editImagePreview" src="" alt="Current Image" style="width:100%;max-height:220px;object-fit:cover;border-radius:10px;margin:8px 0;border:1px solid #ddd;">
                        </div>
                        <input type="file" id="editFile" accept="image/*" style="border:2px dashed #ddd;padding:10px;width:100%;cursor:pointer;">
                    </div>

                    <!-- Title (label changes based on category) -->
                    <div class="input-group-sell">
                        <label id="editNameLabel"><i class="fas fa-tag"></i> Item Name</label>
                        <input type="text" id="editName" required>
                    </div>

                    <!-- Category (triggers form reshape) -->
                    <div class="input-group-sell">
                        <label><i class="fas fa-list"></i> Category</label>
                        <select id="editCategory" required onchange="reshapeEditForm(this.value); loadEditSubcategories(this.value);">
                            <option value="" disabled>Loading…</option>
                        </select>
                    </div>

                    <!-- Subcategory chips (shown when category has subcategories) -->
                    <div class="input-group-sell" id="editSubCatWrapper" style="display:none;">
                        <label><i class="fas fa-sitemap"></i> Subcategory <span style="font-weight:400;color:#aaa;font-size:0.78rem;">(optional)</span></label>
                        <input type="hidden" id="editSubcategory" value="">
                        <div id="editSubCatChips" style="display:flex;flex-wrap:wrap;gap:7px;margin-top:6px;"></div>
                    </div>

                    <!-- PRODUCT FIELDS (hidden for Jobs/Services) -->
                    <div id="editProductFields">
                        <div style="display:flex;gap:15px;">
                            <div class="input-group-sell" style="flex:1;">
                                <label><i class="fas fa-star"></i> Condition</label>
                                <select id="editCondition">
                                    <option value="New">New</option>
                                    <option value="Used">Used</option>
                                    <option value="Refurbished">Refurbished</option>
                                    <option value="Damage">Damage / For Parts</option>
                                    <option value="We work on order">We work on order</option>
                                </select>
                            </div>
                            <div class="input-group-sell" style="flex:1;">
                                <label id="editPriceLabel"><i class="fas fa-money-bill-wave"></i> Price (ETB)</label>
                                <input type="number" id="editPrice">
                            </div>
                        </div>

                        <!-- STOCK MANAGEMENT (products only) -->
                        <div style="background:#f8f9ff;border:1.5px solid #d0d0ff;border-radius:12px;padding:16px;margin-bottom:14px;">
                            <div style="font-weight:700;color:#0A291A;font-size:0.88rem;margin-bottom:12px;"><i class="fas fa-boxes"></i> <span data-am="የክምችት አስተዳደር">Stock Management</span></div>
                            <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;">
                                <div class="input-group-sell" style="flex:1;min-width:140px;margin:0;">
                                    <label style="font-size:0.82rem;"><i class="fas fa-toggle-on"></i> Stock Status</label>
                                    <select id="editStockStatus" onchange="toggleQtyField(this.value)"
                                        style="border-radius:8px;padding:10px;border:1.5px solid #d0d0ff;width:100%;outline:none;">
                                        <option value="in_stock">✅ In Stock</option>
                                        <option value="out_of_stock">❌ Out of Stock</option>
                                        <option value="limited">⚠️ Limited Stock</option>
                                    </select>
                                </div>
                                <div class="input-group-sell" id="qtyWrapper" style="flex:1;min-width:120px;margin:0;">
                                    <label style="font-size:0.82rem;"><i class="fas fa-hashtag"></i> Quantity</label>
                                    <input type="number" id="editQuantity" min="0" placeholder="e.g. 5" data-am-placeholder="ለምሳሌ 5"
                                        style="border-radius:8px;padding:10px;border:1.5px solid #d0d0ff;width:100%;outline:none;box-sizing:border-box;">
                                </div>
                            </div>
                            <div id="stockPreview" style="margin-top:10px;"></div>
                        </div>
                    </div>

                    <!-- JOB FIELDS (shown only for Jobs) -->
                    <div id="editJobFields" style="display:none;">
                        <div style="background:#f0f8ff;border:1.5px solid #b3d9ff;border-radius:12px;padding:16px;margin-bottom:14px;">
                            <div style="font-weight:700;color:#0088cc;font-size:0.88rem;margin-bottom:12px;"><i class="fas fa-briefcase"></i> Job Details</div>
                            <div style="display:flex;gap:12px;flex-wrap:wrap;">
                                <div class="input-group-sell" style="flex:1;min-width:140px;margin:0 0 10px;">
                                    <label style="font-size:0.82rem;">Job Type</label>
                                    <select id="editJobType" style="border-radius:8px;padding:10px;border:1.5px solid #b3d9ff;width:100%;outline:none;">
                                        <option value="Full Time">Full Time</option>
                                        <option value="Part Time">Part Time</option>
                                        <option value="Contract">Contract</option>
                                        <option value="Internship">Internship</option>
                                        <option value="Freelance">Freelance</option>
                                    </select>
                                </div>
                                <div class="input-group-sell" style="flex:1;min-width:140px;margin:0 0 10px;">
                                    <label style="font-size:0.82rem;">Salary / Month (ETB)</label>
                                    <input type="number" id="editSalary" placeholder="e.g. 15000" data-am-placeholder="ለምሳሌ 15000"
                                        style="border-radius:8px;padding:10px;border:1.5px solid #b3d9ff;width:100%;outline:none;box-sizing:border-box;">
                                </div>
                            </div>
                            <div style="display:flex;gap:12px;flex-wrap:wrap;">
                                <div class="input-group-sell" style="flex:1;min-width:140px;margin:0 0 10px;">
                                    <label style="font-size:0.82rem;">Experience Required</label>
                                    <select id="editExperience" style="border-radius:8px;padding:10px;border:1.5px solid #b3d9ff;width:100%;outline:none;">
                                        <option value="No Experience">No Experience</option>
                                        <option value="0-1 Years">0–1 Years</option>
                                        <option value="1-3 Years">1–3 Years</option>
                                        <option value="3-5 Years">3–5 Years</option>
                                        <option value="5+ Years">5+ Years</option>
                                    </select>
                                </div>
                                <div class="input-group-sell" style="flex:1;min-width:140px;margin:0 0 10px;">
                                    <label style="font-size:0.82rem;">Positions Available</label>
                                    <input type="number" id="editPositions" min="1" placeholder="e.g. 2" data-am-placeholder="ለምሳሌ 2"
                                        style="border-radius:8px;padding:10px;border:1.5px solid #b3d9ff;width:100%;outline:none;box-sizing:border-box;">
                                </div>
                            </div>
                            <div class="input-group-sell" style="margin:0;">
                                <label style="font-size:0.82rem;">Application Deadline</label>
                                <input type="date" id="editDeadline"
                                    style="border-radius:8px;padding:10px;border:1.5px solid #b3d9ff;width:100%;outline:none;box-sizing:border-box;">
                            </div>
                        </div>
                    </div>

                    <!-- SERVICE FIELDS (shown only for Services) -->
                    <div id="editServiceFields" style="display:none;">
                        <div style="background:#f0fff8;border:1.5px solid #a8e6cf;border-radius:12px;padding:16px;margin-bottom:14px;">
                            <div style="font-weight:700;color:#2ed573;font-size:0.88rem;margin-bottom:12px;"><i class="fas fa-concierge-bell"></i> Service Details</div>
                            <div style="display:flex;gap:12px;flex-wrap:wrap;">
                                <div class="input-group-sell" style="flex:1;min-width:140px;margin:0 0 10px;">
                                    <label style="font-size:0.82rem;">Service Rate (ETB)</label>
                                    <input type="number" id="editServiceRate" placeholder="per hour/project" data-am-placeholder="በሰዓት/ፕሮጀክት"
                                        style="border-radius:8px;padding:10px;border:1.5px solid #a8e6cf;width:100%;outline:none;box-sizing:border-box;">
                                </div>
                                <div class="input-group-sell" style="flex:1;min-width:140px;margin:0 0 10px;">
                                    <label style="font-size:0.82rem;">Availability</label>
                                    <select id="editAvailability" style="border-radius:8px;padding:10px;border:1.5px solid #a8e6cf;width:100%;outline:none;">
                                        <option value="Available Now">Available Now</option>
                                        <option value="Weekdays">Weekdays</option>
                                        <option value="Weekends">Weekends</option>
                                        <option value="Flexible">Flexible</option>
                                        <option value="By Appointment">By Appointment</option>
                                    </select>
                                </div>
                            </div>
                            <div class="input-group-sell" style="margin:0;">
                                <label style="font-size:0.82rem;">Service Area</label>
                                <input type="text" id="editServiceArea" placeholder="e.g. Addis Ababa, Bole" data-am-placeholder="ለምሳሌ አዲስ አበባ፣ ቦሌ"
                                    style="border-radius:8px;padding:10px;border:1.5px solid #a8e6cf;width:100%;outline:none;box-sizing:border-box;">
                            </div>
                        </div>
                    </div>


                    <!-- ELECTRONICS SPEC FIELDS (computer + phone) -->
                    <div id="editElectronicsFields" style="display:none;">
                        <div style="background:#f0f7f4;border:1.5px solid #c8e6c9;border-radius:12px;padding:16px;margin-bottom:14px;">
                            <div style="font-weight:700;color:#0A291A;font-size:0.88rem;margin-bottom:12px;">
                                <i id="editElecIcon" class="fas fa-laptop"></i>
                                <span id="editElecLabel">Device Specifications</span>
                            </div>
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">

                                <!-- Shared: Brand -->
                                <div class="input-group-sell" style="margin:0;grid-column:1/-1;">
                                    <label style="font-size:0.82rem;">Brand</label>
                                    <select id="editSpecBrand" style="border-radius:8px;padding:10px;border:1.5px solid #c8e6c9;width:100%;outline:none;">
                                        <option value="">Select Brand</option>
                                        <option>Samsung</option><option>Apple</option><option>Apple (iPhone)</option>
                                        <option>Tecno</option><option>Infinix</option><option>Itel</option>
                                        <option>Nokia</option><option>Huawei</option><option>Xiaomi</option>
                                        <option>Oppo</option><option>Vivo</option><option>Realme</option>
                                        <option>HP</option><option>Dell</option><option>Lenovo</option>
                                        <option>Asus</option><option>Acer</option><option>MSI</option>
                                        <option>Other</option>
                                    </select>
                                </div>

                                <!-- Shared: Model -->
                                <div class="input-group-sell" style="margin:0;grid-column:1/-1;">
                                    <label style="font-size:0.82rem;">Model</label>
                                    <input type="text" id="editSpecModel" placeholder="e.g. MacBook Pro 2023 / Samsung Galaxy A54"
                                        style="border-radius:8px;padding:10px;border:1.5px solid #c8e6c9;width:100%;outline:none;box-sizing:border-box;">
                                </div>

                                <!-- COMPUTER ONLY fields -->
                                <div class="input-group-sell" style="margin:0;" id="editCpuWrap">
                                    <label style="font-size:0.82rem;">Processor / CPU</label>
                                    <input type="text" id="editSpecProcessor" placeholder="e.g. Intel Core i7-12th"
                                        style="border-radius:8px;padding:10px;border:1.5px solid #c8e6c9;width:100%;outline:none;box-sizing:border-box;">
                                </div>
                                <div class="input-group-sell" style="margin:0;" id="editGpuWrap">
                                    <label style="font-size:0.82rem;">Graphics / GPU</label>
                                    <input type="text" id="editSpecGpu" placeholder="e.g. NVIDIA RTX 3060"
                                        style="border-radius:8px;padding:10px;border:1.5px solid #c8e6c9;width:100%;outline:none;box-sizing:border-box;">
                                </div>

                                <!-- PHONE ONLY fields -->
                                <div class="input-group-sell" style="margin:0;" id="editCameraWrap">
                                    <label style="font-size:0.82rem;">Main Camera</label>
                                    <select id="editSpecCamera" style="border-radius:8px;padding:10px;border:1.5px solid #c8e6c9;width:100%;outline:none;">
                                        <option value="">Select</option>
                                        <option>8 MP</option><option>12 MP</option><option>16 MP</option>
                                        <option>48 MP</option><option>50 MP</option><option>64 MP</option>
                                        <option>108 MP</option><option>200 MP</option>
                                        <option>Dual Camera</option><option>Triple Camera</option><option>Quad Camera</option>
                                    </select>
                                </div>
                                <div class="input-group-sell" style="margin:0;" id="editNetworkWrap">
                                    <label style="font-size:0.82rem;">Network</label>
                                    <select id="editSpecNetwork" style="border-radius:8px;padding:10px;border:1.5px solid #c8e6c9;width:100%;outline:none;">
                                        <option value="">Select</option>
                                        <option>2G / 3G</option><option>4G LTE</option>
                                        <option>5G</option><option>4G + WiFi Calling</option>
                                    </select>
                                </div>
                                <div class="input-group-sell" style="margin:0;" id="editSimWrap">
                                    <label style="font-size:0.82rem;">SIM Slots</label>
                                    <select id="editSpecSim" style="border-radius:8px;padding:10px;border:1.5px solid #c8e6c9;width:100%;outline:none;">
                                        <option value="">Select</option>
                                        <option>Single SIM</option><option>Dual SIM</option>
                                        <option>Dual SIM + eSIM</option>
                                    </select>
                                </div>
                                <div class="input-group-sell" style="margin:0;" id="editColorWrap">
                                    <label style="font-size:0.82rem;">Color</label>
                                    <input type="text" id="editSpecColor" placeholder="e.g. Midnight Black"
                                        style="border-radius:8px;padding:10px;border:1.5px solid #c8e6c9;width:100%;outline:none;box-sizing:border-box;">
                                </div>

                                <!-- Shared: RAM -->
                                <div class="input-group-sell" style="margin:0;">
                                    <label style="font-size:0.82rem;">RAM</label>
                                    <select id="editSpecRam" style="border-radius:8px;padding:10px;border:1.5px solid #c8e6c9;width:100%;outline:none;">
                                        <option value="">Select</option>
                                        <option>2 GB</option><option>3 GB</option><option>4 GB</option><option>6 GB</option>
                                        <option>8 GB</option><option>12 GB</option><option>16 GB</option>
                                        <option>32 GB</option><option>64 GB</option>
                                    </select>
                                </div>

                                <!-- Shared: Storage -->
                                <div class="input-group-sell" style="margin:0;">
                                    <label style="font-size:0.82rem;">Storage</label>
                                    <select id="editSpecStorage" style="border-radius:8px;padding:10px;border:1.5px solid #c8e6c9;width:100%;outline:none;">
                                        <option value="">Select</option>
                                        <option>32 GB</option><option>64 GB</option><option>128 GB</option>
                                        <option>256 GB</option><option>512 GB</option><option>1 TB</option><option>2 TB</option>
                                    </select>
                                </div>

                                <!-- Shared: Display -->
                                <div class="input-group-sell" style="margin:0;">
                                    <label style="font-size:0.82rem;" id="editDisplayLabel">Display Size</label>
                                    <select id="editSpecDisplay" style="border-radius:8px;padding:10px;border:1.5px solid #c8e6c9;width:100%;outline:none;">
                                        <option value="">Select</option>
                                        <option>5.0"</option><option>5.5"</option><option>6.0"</option>
                                        <option>6.1"</option><option>6.5"</option><option>6.7"</option><option>6.9"</option>
                                        <option>11"</option><option>13"</option><option>14"</option>
                                        <option>15"</option><option>15.6"</option><option>16"</option><option>17"</option>
                                    </select>
                                </div>

                                <!-- Shared: Battery -->
                                <div class="input-group-sell" style="margin:0;">
                                    <label style="font-size:0.82rem;">Battery</label>
                                    <select id="editSpecBattery" style="border-radius:8px;padding:10px;border:1.5px solid #c8e6c9;width:100%;outline:none;">
                                        <option value="">Select</option>
                                        <option>2500 mAh</option><option>3000 mAh</option><option>3500 mAh</option>
                                        <option>4000 mAh</option><option>4500 mAh</option><option>5000 mAh</option>
                                        <option>5500 mAh</option><option>6000 mAh</option>
                                        <option>Up to 6 hrs</option><option>Up to 8 hrs</option>
                                        <option>Up to 10 hrs</option><option>Up to 12 hrs</option><option>Up to 15 hrs</option>
                                    </select>
                                </div>

                                <!-- Shared: OS -->
                                <div class="input-group-sell" style="margin:0;">
                                    <label style="font-size:0.82rem;">Operating System</label>
                                    <select id="editSpecOs" style="border-radius:8px;padding:10px;border:1.5px solid #c8e6c9;width:100%;outline:none;">
                                        <option value="">Select</option>
                                        <option>Android 11</option><option>Android 12</option><option>Android 13</option><option>Android 14</option>
                                        <option>iOS 15</option><option>iOS 16</option><option>iOS 17</option><option>iOS 18</option>
                                        <option>Windows 10</option><option>Windows 11</option>
                                        <option>macOS Ventura</option><option>macOS Sonoma</option>
                                        <option>Ubuntu Linux</option><option>Chrome OS</option><option>No OS</option>
                                    </select>
                                </div>

                                <!-- Shared: Warranty -->
                                <div class="input-group-sell" style="margin:0;">
                                    <label style="font-size:0.82rem;">Warranty</label>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) {
                alert("Please sign in to view your items.");
                window.location.href = 'index.html';
                return;
            }
            loadMyItems(user.id);
            loadEditCategories(); // load dynamic cats for edit modal
        });

        // ── Dynamic categories for edit modal ─────────────────────
        let _editCats = [];

        async function loadEditCategories() {
            const sel = document.getElementById('editCategory');
            try {
                const { data: cats, error } = await _supabase
                    .from('categories')
                    .select('id, name, subcategories(id, name)')
                    .order('sort_order', { ascending: true });

                if (error || !cats || cats.length === 0) {
                    _injectDefaultEditCats(sel); return;
                }
                _editCats = cats;
                sel.innerHTML = '';
                cats.forEach(c => { sel.innerHTML += `<option value="${c.name}">${c.name}</option>`; });
                sel.innerHTML += '<option value="Other">Other</option>';
            } catch(e) {
                _injectDefaultEditCats(sel);
            }
        }

        function _injectDefaultEditCats(sel) {
            sel.innerHTML = `
                <option value="Electronics">Electronics</option>
                <option value="Furniture">Furniture</option>
                <option value="Fashion">Fashion</option>
                <option value="Vehicles">Vehicles</option>
                <option value="Property">Property</option>
                <option value="Home Supplies">Home Supplies</option>
                <option value="Services">Services</option>
                <option value="Jobs">Jobs</option>
                <option value="Other">Other</option>`;
        }

        function loadEditSubcategories(catName, selectedSub) {
            const cat     = _editCats.find(c => c.name === catName);
            const wrapper = document.getElementById('editSubCatWrapper');
            const chips   = document.getElementById('editSubCatChips');
            const hidden  = document.getElementById('editSubcategory');
            const subs    = cat?.subcategories || [];

            hidden.value   = selectedSub || '';
            chips.innerHTML = '';

            if (subs.length === 0) { wrapper.style.display = 'none'; return; }

            subs.forEach(sub => {
                const chip = document.createElement('button');
                chip.type      = 'button';
                chip.className = 'sell-subcat-chip' + (sub.name === selectedSub ? ' active' : '');
                chip.textContent = sub.name;
                chip.addEventListener('click', function () {
                    chips.querySelectorAll('.sell-subcat-chip').forEach(c => c.classList.remove('active'));
                    if (hidden.value === sub.name) {
                        hidden.value = '';
                        showEditElectronicsSpec('');
                    } else {
                        this.classList.add('active');
                        hidden.value = sub.name;
                        showEditElectronicsSpec(sub.name);
                    }
                });
                chips.appendChild(chip);
            });

            wrapper.style.display = 'block';
            showEditElectronicsSpec(selectedSub || '');
        }

        async function loadMyItems(userId) {
            const grid = document.getElementById('myItemsGrid');
            const { data: items, error } = await _supabase
                .from('products')
                .select('*')
                .eq('user_id', userId)
                .order('created_at', { ascending: false });

            if (error || !items || items.length === 0) {
                grid.innerHTML = `
                <div class="empty-state" style="text-align:center; padding: 50px; grid-column: 1/-1;">
                    <i class="fas fa-box-open fa-3x" style="color: #ccc; margin-bottom: 15px;"></i>
                    <h3 style="margin:0;">No items found</h3>
                    <p style="color: #888;">You haven't posted any items yet.</p>
                    <a href="sell.html" class="contact-btn" style="display:inline-block; margin-top:15px; background:#F5A623; color:#1a1a1a; padding:10px 20px; border-radius:8px; text-decoration:none;">Sell an Item</a>
                </div>`;
                return;
            }

            grid.innerHTML = items.map(item => {
                const isJob     = item.category === 'Jobs';
                const isService = item.category === 'Services';

                const reasonNote = item.rejection_reason && item.status === 'rejected' ? 
                    `<div style="background: #fff0f0; border-left: 3px solid #ff4757; padding: 8px; margin-top: 10px; border-radius: 4px;">
                        <span style="color: #ff4757; font-size: 0.8rem; font-weight: bold;">REASON FOR REJECTION:</span>
                        <p style="color: #d63031; font-size: 0.85rem; margin: 2px 0 0 0;">${item.rejection_reason}</p>
                    </div>` : '';

                // Price line: salary for jobs, rate for services, price for products
                const priceHtml = isJob
                    ? `<p class="product-price" style="color:#0088cc;">${item.price ? item.price.toLocaleString() + ' ETB/mo' : 'Salary: Negotiable'}</p>`
                    : isService
                        ? `<p class="product-price" style="color:#2ed573;">${item.price ? item.price.toLocaleString() + ' ETB' : 'Rate: Negotiable'}</p>`
                        : `<p class="product-price">${item.price ? item.price.toLocaleString() + ' ETB' : 'Negotiable'}</p>`;

                // Availability badge — only stock badge for products
                const badgeHtml = isJob
                    ? `<div style="display:inline-flex;align-items:center;gap:5px;background:#e8f4ff;border:1px solid #0088cc;border-radius:20px;padding:3px 10px;font-size:0.75rem;font-weight:700;color:#0088cc;margin-bottom:6px;">
                           <i class="fas fa-briefcase"></i> OPEN VACANCY
                       </div>`
                    : isService
                        ? `<div style="display:inline-flex;align-items:center;gap:5px;background:#e8fdf5;border:1px solid #2ed573;border-radius:20px;padding:3px 10px;font-size:0.75rem;font-weight:700;color:#2ed573;margin-bottom:6px;">
                               <i class="fas fa-concierge-bell"></i> AVAILABLE NOW
                           </div>`
                        : getStockBadge(item.stock_status, item.quantity);

                return `
                    <div class="product-card" id="item-${item.id}">
                        <div class="card-img-container">
                            <span class="status-tag" style="background:${getStatusColor(item.status)};">
                                ${item.status}
                            </span>
                            <img src="${item.image}" alt="${item.name}">
                        </div>
                        
                        <div class="product-info">
                            <h3 class="product-title">${item.name}</h3>
                            ${item.subcategory ? `<p style="font-size:0.75rem;color:#0A291A;font-weight:600;margin:2px 0 4px;"><i class="fas fa-sitemap" style="font-size:10px;"></i> ${item.subcategory}</p>` : ''}
                            ${priceHtml}
                            ${badgeHtml}
                            ${reasonNote}
                            
                            <div class="action-buttons">
                                <button onclick="openEditModal('${item.id}')" class="edit-btn"><i class="fas fa-edit"></i> Edit</button>
                                ${item.status === 'rejected' ? `
                                    <button onclick="contactAdmin('${item.name}')" class="why-btn">
                                        <i class="fas fa-headset"></i> Support
                                    </button>
                                ` : ''}
                                <button onclick="deleteItem('${item.id}')" class="delete-btn" title="Delete Item"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getStatusColor(status) {
            switch(status) {
                case 'approved': return '#25D366';
                case 'rejected': return '#ff4757';
                case 'sold': return '#6b7280';
                default: return '#f1c40f';
            }
        }

        function getStockBadge(stockStatus, quantity) {
            // Never show a stock badge if there's no stock_status (Jobs / Services)
            if (!stockStatus) return '';
            if (stockStatus === 'in_stock') {
                const qtyText = quantity ? ` · ${quantity} left` : '';
                return `<div style="display:inline-flex;align-items:center;gap:5px;background:#e8fdf5;border:1px solid #2ed573;border-radius:20px;padding:3px 10px;font-size:0.75rem;font-weight:700;color:#2ed573;margin-bottom:6px;">
                    <i class="fas fa-check-circle"></i> In Stock${qtyText}
                </div>`;
            } else if (stockStatus === 'out_of_stock') {
                return `<div style="display:inline-flex;align-items:center;gap:5px;background:#fff0f0;border:1px solid #ff4757;border-radius:20px;padding:3px 10px;font-size:0.75rem;font-weight:700;color:#ff4757;margin-bottom:6px;">
                    <i class="fas fa-times-circle"></i> Out of Stock
                </div>`;
            } else if (stockStatus === 'limited') {
                const qtyText = quantity ? ` · Only ${quantity} left` : '';
                return `<div style="display:inline-flex;align-items:center;gap:5px;background:#fff8e1;border:1px solid #fdcb6e;border-radius:20px;padding:3px 10px;font-size:0.75rem;font-weight:700;color:#e67e22;margin-bottom:6px;">
                    <i class="fas fa-exclamation-triangle"></i> Limited Stock${qtyText}
                </div>`;
            }
            return '';
        }

        function toggleQtyField(val) {
            const wrapper = document.getElementById('qtyWrapper');
            const preview = document.getElementById('stockPreview');
            if (val === 'out_of_stock') {
                wrapper.style.opacity = '0.4';
                wrapper.style.pointerEvents = 'none';
                document.getElementById('editQuantity').value = '';
                preview.innerHTML = '<span style="font-size:0.8rem;color:#ff4757;font-weight:700;"><i class="fas fa-times-circle"></i> This item will show as Out of Stock to buyers.</span>';
            } else if (val === 'limited') {
                wrapper.style.opacity = '1';
                wrapper.style.pointerEvents = 'all';
                preview.innerHTML = '<span style="font-size:0.8rem;color:#e67e22;font-weight:700;"><i class="fas fa-exclamation-triangle"></i> Enter remaining quantity above.</span>';
            } else {
                wrapper.style.opacity = '1';
                wrapper.style.pointerEvents = 'all';
                preview.innerHTML = '<span style="font-size:0.8rem;color:#2ed573;font-weight:700;"><i class="fas fa-check-circle"></i> Item will show as In Stock to buyers.</span>';
            }
        }

        // Handle Edit Image Preview
        document.getElementById('editFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const preview = document.getElementById('editImagePreview');
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    alert('Image is too large! Please select an image smaller than 5MB.');
                    this.value = '';
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) { preview.src = e.target.result; }
                reader.readAsDataURL(file);
            }
        });

        // Toggle Districts
        window.toggleEditDistricts = function(region) {
            const wrapper = document.getElementById('editDistrictWrapper');
            const districtSelect = document.getElementById('editDistrict');
            if (region === 'Addis Ababa') {
                wrapper.style.display = 'block';
                districtSelect.required = true;
            } else {
                wrapper.style.display = 'none';
                districtSelect.required = false;
                districtSelect.value = ""; 
            }
        };

        // Helper: parse spec value from description text
        function parseSpec(desc, key) {
            if (!desc) return '';
            const rx = new RegExp(key + '[:\s]+([^\n]+)', 'i');
            const m = desc.match(rx);
            return m ? m[1].trim() : '';
        }

        // Reshape the edit form based on category
        // ── Electronics subcategory name sets ──
        const PHONE_SUBS    = ['Mobile Phones','Mobile Phone','Phone','Smartphone'];
        const COMPUTER_SUBS = ['Computers & Laptops','Computer','Laptop','Laptops','Desktop Computer','Desktop Computers','Tablet','Tablets'];
        const ELEC_SUBS     = [...PHONE_SUBS, ...COMPUTER_SUBS];

        function showEditElectronicsSpec(subName) {
            const wrap = document.getElementById('editElectronicsFields');
            if (!subName || !ELEC_SUBS.includes(subName)) { wrap.style.display = 'none'; return; }
            const isMob = PHONE_SUBS.includes(subName);
            wrap.style.display = 'block';

            // Label + icon
            document.getElementById('editElecLabel').textContent = isMob ? ' Mobile Phone Specifications' : ' Computer / Laptop Specifications';
            document.getElementById('editElecIcon').className = isMob ? 'fas fa-mobile-alt' : 'fas fa-laptop';

            // Phone-only fields
            ['editCameraWrap','editNetworkWrap','editSimWrap','editColorWrap'].forEach(id =>
                document.getElementById(id).style.display = isMob ? 'block' : 'none');
            // Computer-only fields
            ['editCpuWrap','editGpuWrap'].forEach(id =>
                document.getElementById(id).style.display = isMob ? 'none' : 'block');
        }

        window.reshapeEditForm = function(cat) {
            const isJob = cat === 'Jobs';
            const isService = cat === 'Services';
            const isProduct = !isJob && !isService;

            document.getElementById('editProductFields').style.display = isProduct ? 'block' : 'none';
            document.getElementById('editJobFields').style.display = isJob ? 'block' : 'none';
            document.getElementById('editServiceFields').style.display = isService ? 'block' : 'none';

            document.getElementById('editCondition').required = isProduct;
            document.getElementById('editPrice').required = isProduct;

            document.getElementById('editNameLabel').innerHTML = isJob
                ? '<i class="fas fa-briefcase"></i> Job Title'
                : isService ? '<i class="fas fa-concierge-bell"></i> Service Name'
                : '<i class="fas fa-tag"></i> Item Name';

            document.getElementById('editDescLabel').innerHTML = isJob
                ? '<i class="fas fa-align-left"></i> Job Description & Requirements'
                : isService ? '<i class="fas fa-align-left"></i> Service Description'
                : '<i class="fas fa-align-left"></i> Description';

            document.getElementById('editCategoryType').value = isJob ? 'job' : isService ? 'service' : 'product';
        };

        window.openEditModal = async function(id) {
            const { data: item } = await _supabase.from('products').select('*').eq('id', id).single();
            if (!item) return;

            document.getElementById('editId').value = item.id;
            document.getElementById('editName').value = item.name;
            document.getElementById('editDesc').value = item.description || '';
            document.getElementById('editPhone').value = item.seller_phone || '';
            document.getElementById('editImagePreview').src = item.image || '';
            document.getElementById('editFile').value = '';

            // Set category first — this reshapes the form
            document.getElementById('editCategory').value = item.category || 'Other';
            reshapeEditForm(item.category || 'Other');
            // Load subcategory chips and pre-select saved value
            loadEditSubcategories(item.category || 'Other', item.subcategory || '');

            const isJob = item.category === 'Jobs';
            const isService = item.category === 'Services';

            if (!isJob && !isService) {
                // Product fields
                document.getElementById('editCondition').value = item.status_condition || 'Used';
                document.getElementById('editPrice').value = item.price || '';
                const stockStatus = item.stock_status || 'in_stock';
                document.getElementById('editStockStatus').value = stockStatus;
                document.getElementById('editQuantity').value = item.quantity || '';
                toggleQtyField(stockStatus);

                // Pre-fill electronics spec fields
                const sub = item.subcategory || '';
                showEditElectronicsSpec(sub);
                if (ELEC_SUBS.includes(sub)) {
                    const isMob = PHONE_SUBS.includes(sub);
                    const selOpt = (id, val) => {
                        if (!val) return;
                        const s = document.getElementById(id);
                        for (let o of s.options) { if (o.value === val || o.text === val) { s.value = o.value; break; } }
                    };
                    // Brand + Model
                    const brandEl = document.getElementById('editSpecBrand');
                    const brandVal = parseSpec(item.description, 'brand');
                    for (let o of brandEl.options) { if (o.text === brandVal) { brandEl.value = o.value; break; } }
                    document.getElementById('editSpecModel').value = parseSpec(item.description, 'model') || '';

                    // Shared
                    selOpt('editSpecRam',     parseSpec(item.description, 'ram') || parseSpec(item.description, 'memory'));
                    selOpt('editSpecStorage', parseSpec(item.description, 'storage'));
                    selOpt('editSpecDisplay', parseSpec(item.description, 'display') || parseSpec(item.description, 'screen size'));
                    selOpt('editSpecBattery', parseSpec(item.description, 'battery life') || parseSpec(item.description, 'battery'));
                    selOpt('editSpecOs',      parseSpec(item.description, 'operating system') || parseSpec(item.description, 'os'));
                    selOpt('editSpecWarranty',parseSpec(item.description, 'warranty'));

                    if (isMob) {
                        selOpt('editSpecCamera',  parseSpec(item.description, 'camera') || parseSpec(item.description, 'main camera'));
                        selOpt('editSpecNetwork', parseSpec(item.description, 'network') || parseSpec(item.description, 'connectivity'));
                        selOpt('editSpecSim',     parseSpec(item.description, 'sim slots') || parseSpec(item.description, 'sim'));
                        document.getElementById('editSpecColor').value = parseSpec(item.description, 'color') || parseSpec(item.description, 'colour') || '';
                    } else {
                        document.getElementById('editSpecProcessor').value = parseSpec(item.description, 'processor') || parseSpec(item.description, 'cpu') || '';
                        document.getElementById('editSpecGpu').value       = parseSpec(item.description, 'graphics') || parseSpec(item.description, 'gpu') || '';
                    }
                }
            } else if (isJob) {
                // Job fields — parse from description or direct columns
                document.getElementById('editSalary').value = item.price || '';
                document.getElementById('editJobType').value = parseSpec(item.description, 'job type') || 'Full Time';
                document.getElementById('editExperience').value = parseSpec(item.description, 'experience') || 'No Experience';
                document.getElementById('editPositions').value = parseSpec(item.description, 'positions available') || '';
                document.getElementById('editDeadline').value = parseSpec(item.description, 'deadline') || '';
            } else if (isService) {
                // Service fields
                document.getElementById('editServiceRate').value = item.price || '';
                document.getElementById('editAvailability').value = parseSpec(item.description, 'availability') || 'Available Now';
                document.getElementById('editServiceArea').value = parseSpec(item.description, 'service area') || '';
            }

            // Location
            if (item.location) {
                const locParts = item.location.split(', ');
                if (locParts.length > 1) {
                    document.getElementById('editRegion').value = locParts[1];
                    toggleEditDistricts(locParts[1]);
                    document.getElementById('editDistrict').value = locParts[0];
                } else {
                    document.getElementById('editRegion').value = locParts[0];
                    toggleEditDistricts(locParts[0]);
                }
            }

            document.getElementById('editModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        };

        window.closeEditModal = () => {
            document.getElementById('editModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        };


        // ── WATERMARK FUNCTION ──
        async function applyWatermark(file) {
            return new Promise((resolve) => {
                const img = new Image();
                const url = URL.createObjectURL(file);
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width  = img.naturalWidth;
                    canvas.height = img.naturalHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);

                    const text     = 'wanagebya.com';
                    const padding  = 14;
                    const fontSize = Math.max(16, Math.round(canvas.width * 0.038));
                    ctx.font       = `bold ${fontSize}px Arial, sans-serif`;
                    ctx.textBaseline = 'bottom';
                    const textW = ctx.measureText(text).width;
                    const boxH  = fontSize + padding;
                    const boxW  = textW + padding * 2;
                    const x     = canvas.width  - boxW - 16;
                    const y     = canvas.height - boxH - 16;

                    ctx.globalAlpha = 0.62;
                    ctx.fillStyle   = '#1a1a1a';
                    const r = 8;
                    ctx.beginPath();
                    ctx.moveTo(x + r, y);
                    ctx.lineTo(x + boxW - r, y);
                    ctx.quadraticCurveTo(x + boxW, y, x + boxW, y + r);
                    ctx.lineTo(x + boxW, y + boxH - r);
                    ctx.quadraticCurveTo(x + boxW, y + boxH, x + boxW - r, y + boxH);
                    ctx.lineTo(x + r, y + boxH);
                    ctx.quadraticCurveTo(x, y + boxH, x, y + boxH - r);
                    ctx.lineTo(x, y + r);
                    ctx.quadraticCurveTo(x, y, x + r, y);
                    ctx.closePath();
                    ctx.fill();

                    ctx.globalAlpha = 0.92;
                    ctx.fillStyle   = '#ffffff';
                    ctx.fillText(text, x + padding, y + boxH - padding / 2);

                    ctx.globalAlpha = 1;
                    ctx.fillStyle   = '#0A291A';
                    ctx.beginPath();
                    ctx.arc(x + padding - 6, y + boxH / 2, 4, 0, Math.PI * 2);
                    ctx.fill();

                    URL.revokeObjectURL(url);
                    canvas.toBlob(resolve, 'image/jpeg', 0.88);
                };
                img.src = url;
            });
        }

        window.saveChanges = async function(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const btn = document.getElementById('submitEditBtn');
            const fileInput = document.getElementById('editFile');
            
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) return alert("Session expired.");

            btn.innerText = "Uploading & Updating...";
            btn.disabled = true;

            try {
                let imageUrl = document.getElementById('editImagePreview').src;

                // 1. Upload new image with watermark if selected
                const rawFile = fileInput.files[0];
                if (rawFile) {
                    btn.innerText = "Adding watermark...";
                    const watermarkedBlob = await applyWatermark(rawFile);
                    const file = new File([watermarkedBlob], rawFile.name, { type: 'image/jpeg' });
                    btn.innerText = "Uploading...";
                    const fileName = `${user.id}/${Date.now()}.jpg`;
                    const { error: uploadError } = await _supabase.storage.from('product-images').upload(fileName, file);
                    if (uploadError) throw uploadError;
                    const { data } = _supabase.storage.from('product-images').getPublicUrl(fileName);
                    imageUrl = data.publicUrl;
                }

                // 2. Build final location
                const region = document.getElementById('editRegion').value;
                const districtSelect = document.getElementById('editDistrict');
                const district = districtSelect ? districtSelect.value : "";
                const finalLocation = district && region === 'Addis Ababa' ? `${district}, ${region}` : region;

                // 3. Build updated data based on category type
                const cat = document.getElementById('editCategory').value;
                const isJob = cat === 'Jobs';
                const isService = cat === 'Services';
                let updatedData = {
                    name: document.getElementById('editName').value,
                    category: cat,
                    subcategory: document.getElementById('editSubcategory')?.value || null,
                    description: document.getElementById('editDesc').value,
                    seller_phone: document.getElementById('editPhone').value,
                    location: finalLocation,
                    image: imageUrl,
                    status: 'pending',
                    rejection_reason: null
                };

                if (!isJob && !isService) {
                    // Product-specific fields
                    const stockStatus = document.getElementById('editStockStatus').value;
                    const qty = document.getElementById('editQuantity').value;
                    updatedData.price = parseFloat(document.getElementById('editPrice').value);
                    updatedData.status_condition = document.getElementById('editCondition').value;
                    updatedData.stock_status = stockStatus;
                    updatedData.quantity = qty ? parseInt(qty) : null;

                    // Rebuild description with spec block for electronics
                    const editSub = document.getElementById('editSubcategory')?.value || '';
                    if (ELEC_SUBS.includes(editSub)) {
                        const isMob = PHONE_SUBS.includes(editSub);
                        const baseDesc = updatedData.description.split('\n--- Specs ---')[0].trim();
                        const g = id => document.getElementById(id)?.value || '';
                        let spec = '\n--- Specs ---';
                        const brandVal = g('editSpecBrand');
                        const modelVal = g('editSpecModel');
                        if (brandVal)  spec += '\nBrand: ' + brandVal;
                        if (modelVal)  spec += '\nModel: ' + modelVal;
                        if (isMob) {
                            if (g('editSpecCamera'))  spec += '\nCamera: ' + g('editSpecCamera');
                            if (g('editSpecNetwork')) spec += '\nNetwork: ' + g('editSpecNetwork');
                            if (g('editSpecSim'))     spec += '\nSIM Slots: ' + g('editSpecSim');
                            if (g('editSpecColor'))   spec += '\nColor: ' + g('editSpecColor');
                        } else {
                            if (g('editSpecProcessor')) spec += '\nProcessor: ' + g('editSpecProcessor');
                            if (g('editSpecGpu'))       spec += '\nGraphics: ' + g('editSpecGpu');
                        }
                        if (g('editSpecRam'))     spec += '\nRAM: ' + g('editSpecRam');
                        if (g('editSpecStorage')) spec += '\nStorage: ' + g('editSpecStorage');
                        if (g('editSpecDisplay')) spec += '\nDisplay: ' + g('editSpecDisplay');
                        if (g('editSpecBattery')) spec += '\nBattery Life: ' + g('editSpecBattery');
                        if (g('editSpecOs'))      spec += '\nOperating System: ' + g('editSpecOs');
                        if (g('editSpecWarranty'))spec += '\nWarranty: ' + g('editSpecWarranty');
                        updatedData.description = baseDesc + spec;
                    }
                } else if (isJob) {
                    // Job-specific fields — append specs to description
                    const jobType = document.getElementById('editJobType').value;
                    const exp = document.getElementById('editExperience').value;
                    const pos = document.getElementById('editPositions').value;
                    const deadline = document.getElementById('editDeadline').value;
                    const salary = document.getElementById('editSalary').value;
                    updatedData.price = salary ? parseFloat(salary) : null;
                    updatedData.status_condition = 'Full Time';
                    const baseDesc = document.getElementById('editDesc').value.split('\n--- Job Specs ---')[0].trim();
                    updatedData.description = baseDesc
                        + '\n--- Job Specs ---'
                        + '\nJob Type: ' + jobType
                        + '\nExperience: ' + exp
                        + (pos ? '\nPositions Available: ' + pos : '')
                        + (deadline ? '\nDeadline: ' + deadline : '');
                } else if (isService) {
                    // Service-specific fields
                    const rate = document.getElementById('editServiceRate').value;
                    const avail = document.getElementById('editAvailability').value;
                    const area = document.getElementById('editServiceArea').value;
                    updatedData.price = rate ? parseFloat(rate) : null;
                    updatedData.status_condition = 'Service';
                    const baseDesc = document.getElementById('editDesc').value.split('\n--- Service Specs ---')[0].trim();
                    updatedData.description = baseDesc
                        + '\n--- Service Specs ---'
                        + '\nAvailability: ' + avail
                        + (area ? '\nService Area: ' + area : '');
                }

                const { error } = await _supabase.from('products').update(updatedData).eq('id', id);
                
                if (error) throw error;

                alert("Successfully Updated! Your item is back in review.");
                location.reload();

            } catch (err) {
                alert("Error updating item: " + err.message);
                btn.innerText = "Update & Resubmit";
                btn.disabled = false;
            }
        };

        window.deleteItem = async function(id) {
            if(confirm("Are you sure you want to permanently delete this listing?")) {
                const { error } = await _supabase.from('products').delete().eq('id', id);
                if(!error) {
                    const itemCard = document.getElementById(`item-${id}`);
                    itemCard.style.transform = "scale(0)";
                    setTimeout(() => itemCard.remove(), 300);
                } else {
                    alert("Error deleting item: " + error.message);
                }
            }
        };

        window.contactAdmin = function(itemName) {
            const adminTelegram = "allInOneEthiopia1"; 
            const message = encodeURIComponent(`Hello Admin, I have a question about my rejected item on WanaGebya: "${itemName}"`);
            window.open(`https://t.me/${adminTelegram}?text=${message}`, '_blank');
        };

        window.handleSignOut = async function() {
            await _supabase.auth.signOut();
            window.location.href = 'index.html';
        };
    </script>

    <script>
    (function() {
        const lang = localStorage.getItem('wg_lang');
        if (lang === 'am') {
            document.addEventListener('DOMContentLoaded', function() {
                document.querySelectorAll('[data-am]').forEach(el => {
                    const cur = el.innerText.trim();
                    const am = el.getAttribute('data-am');
                    if (am) { el.innerText = am; el.setAttribute('data-am', cur); }
                });
                document.querySelectorAll('[data-am-placeholder]').forEach(el => {
                    el.setAttribute('data-en-placeholder', el.placeholder);
                    el.placeholder = el.getAttribute('data-am-placeholder');
                });
                document.documentElement.lang = 'am';
            });
        }
    })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - Golem Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .dashboard-container { max-width: 1000px; margin: 30px auto; padding: 20px; }
        .section-title { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        /* Product Card Updates */
        .product-card { position: relative; transition: all 0.3s ease; }
        .btn-delete { 
            position: absolute; top: 10px; left: 10px; background: rgba(220, 53, 69, 0.9); 
            color: white; border: none; width: 30px; height: 30px; border-radius: 50%; 
            cursor: pointer; z-index: 10; font-weight: bold;
        }
        .btn-delete:hover { background: #c82333; transform: scale(1.1); }
        
        .status-badge { position: absolute; top: 10px; right: 10px; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; color: white; text-transform: uppercase; }
        .status-badge.pending { background: #ffc107; color: #000; }
        .status-badge.approved { background: #28a745; }
        .status-badge.rejected { background: #dc3545; }
        .status-badge.sold { background: #000; }

        .btn-sold { width: 100%; padding: 8px; margin-top: 10px; background: #6c757d; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .btn-sold:hover { background: #5a6268; }

        /* Order Leads Styling */
        .order-card { background: #fff; border-left: 5px solid #28a745; padding: 15px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .order-card p { margin: 5px 0; font-size: 0.9rem; }
        .whatsapp-link { color: #25D366; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>
    <nav>
        <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">GOLEM</div>
        <button onclick="location.href='index.html'" class="nav-link">Back to Shop</button>
    </nav>

    <div class="dashboard-container">
        <div class="admin-section">
            <h2 class="section-title">📦 My Listed Items</h2>
            <div id="myProductsGrid" class="product-grid">
                <p>Loading your listings...</p>
            </div>
        </div>

        <div class="admin-section" style="margin-top: 50px;">
            <h2 class="section-title">🔔 Sales Leads (Customer Requests)</h2>
            <div id="orderList">
                <p>No customer requests yet.</p>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        async function loadDashboard() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            // 1. Fetch User's Products
            const { data: products, error: pError } = await _supabase
                .from('products')
                .select('*')
                .eq('user_id', user.id)
                .order('created_at', { ascending: false });

            const grid = document.getElementById('myProductsGrid');
            if (products && products.length > 0) {
                grid.innerHTML = products.map(p => `
                    <div class="product-card" style="opacity: ${p.status === 'sold' ? '0.6' : '1'}">
                        <button class="btn-delete" onclick="deleteItem('${p.id}')">✕</button>
                        <div class="status-badge ${p.status}">${p.status}</div>
                        <img src="${p.image}" style="width:100%; height:180px; object-fit:cover; border-radius:8px;">
                        <div class="product-info">
                            <h3>${p.name}</h3>
                            <p class="price">${p.price} ETB</p>
                            ${p.status === 'approved' ? `<button onclick="markAsSold('${p.id}')" class="btn-sold">Mark as Sold</button>` : ''}
                        </div>
                    </div>
                `).join('');
            } else {
                grid.innerHTML = "<p>You haven't posted any items yet.</p>";
            }

            // 2. Fetch Orders for this Seller
            const { data: orders, error: oError } = await _supabase
                .from('orders')
                .select('*')
                .eq('seller_id', user.id)
                .order('created_at', { ascending: false });

            const orderList = document.getElementById('orderList');
            if (orders && orders.length > 0) {
                orderList.innerHTML = orders.map(o => `
                    <div class="order-card">
                        <p><strong>Item Requested:</strong> ${o.product_name}</p>
                        <p><strong>Customer:</strong> ${o.buyer_name}</p>
                        <p><strong>Contact:</strong> <a href="tel:${o.buyer_phone}" class="whatsapp-link">${o.buyer_phone}</a></p>
                        <p><small>Requested on: ${new Date(o.created_at).toLocaleDateString()}</small></p>
                    </div>
                `).join('');
            } else {
                orderList.innerHTML = "<p>No orders yet. Your leads will appear here when customers click 'Buy'.</p>";
            }
        }

        // --- ACTION FUNCTIONS ---

        async function markAsSold(id) {
            if (!confirm("Is this item sold? It will be hidden from the shop.")) return;
            const { error } = await _supabase.from('products').update({ status: 'sold' }).eq('id', id);
            if (error) alert(error.message);
            else loadDashboard();
        }

        async function deleteItem(id) {
            if (!confirm("Permanently delete this item? This cannot be undone.")) return;
            const { error } = await _supabase.from('products').delete().eq('id', id);
            if (error) alert(error.message);
            else loadDashboard();
        }

        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Items - Golem</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav>
        <div class="logo" onclick="location.href='index.html'">GOLEM</div>
        <div id="userMenu"></div>
    </nav>

    <div class="container">
        <h2 style="padding: 20px;">My Listings</h2>
        <div id="myProductGrid" class="product-grid">
            </div>
    </div>

    <script src="config.js"></script>
    <script>
        async function loadMyItems() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) {
                window.location.href = "index.html";
                return;
            }

            // Fetch only items belonging to THIS user
            const { data, error } = await _supabase
                .from('products')
                .select('*')
                .eq('user_id', user.id);

            if (error) return console.error(error);

            const grid = document.getElementById('myProductGrid');
            grid.innerHTML = data.map(p => `
                <div class="product-card">
                    <img src="${p.image}">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p class="price">$${p.price}</p>
                        <p class="status-badge ${p.status}">Status: ${p.status.toUpperCase()}</p>
                        <div style="display:flex; gap:5px; margin-top:10px;">
                            <button onclick="markAsSold('${p.id}')" style="background:orange; font-size:0.7rem;">Sold</button>
                            <button onclick="deleteItem('${p.id}')" style="background:red; font-size:0.7rem;">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function markAsSold(id) {
            const { error } = await _supabase.from('products').update({ status: 'sold' }).eq('id', id);
            if (!error) location.reload();
        }

        async function deleteItem(id) {
            if(confirm("Are you sure you want to delete this listing?")) {
                const { error } = await _supabase.from('products').delete().eq('id', id);
                if (!error) location.reload();
            }
        }

        document.addEventListener('DOMContentLoaded', loadMyItems);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Application | የብድር ማመልከቻ</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        .loan-card { max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input, select, textarea { width: 100%; padding: 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 1rem; }
        .btn-submit { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { background: #219150; }
        #statusMsg { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body style="background: #f8f9fa;">

<div class="loan-card">
    <h2 style="text-align: center; color: #2c3e50;">Loan Application</h2>
    <p style="text-align: center; color: #7f8c8d; margin-bottom: 25px;">የብድር ማመልከቻ ቅፅ</p>

    <form id="loanForm">
        <div class="form-group">
            <label>Requested Amount (ETB) / የብድር መጠን</label>
            <input type="number" id="amount" placeholder="e.g. 50000" required min="1000">
        </div>

        <div class="form-group">
            <label>Loan Purpose / የብድሩ ዓላማ</label>
            <select id="purpose" required>
                <option value="">Select Purpose...</option>
                <option value="Business">Small Business / ንግድ</option>
                <option value="Agriculture">Agriculture / እርሻ</option>
                <option value="Personal">Personal / ለግል ጉዳይ</option>
                <option value="Emergency">Emergency / ድንገተኛ</option>
            </select>
        </div>

        <div class="form-group">
            <label>Upload ID (Kebele/Passport) / መታወቂያ</label>
            <input type="file" id="kycFile" accept="image/*,.pdf" required>
            <small style="color: #999;">Clear photo or PDF scanned copy</small>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Submit Application</button>
        <div id="statusMsg"></div>
    </form>
</div>

<script>
    const form = document.getElementById('loanForm');
    const statusMsg = document.getElementById('statusMsg');

    form.onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerText = "Uploading Photos...";

    try {
        // --- BYPASSING AUTH FOR TESTING ---
        // const { data: { user } } = await _supabase.auth.getUser();
        // if (!user) throw new Error("Please log in first.");
        const tempUserId = "guest_test_001"; 

        // Upload all 4 photos using the temp ID
        const [natFront, natBack, empFront, empBack] = await Promise.all([
            uploadDoc(document.getElementById('natIdFront').files[0], 'nat_front', tempUserId),
            uploadDoc(document.getElementById('natIdBack').files[0], 'nat_back', tempUserId),
            uploadDoc(document.getElementById('empIdFront').files[0], 'emp_front', tempUserId),
            uploadDoc(document.getElementById('empIdBack').files[0], 'emp_back', tempUserId)
        ]);

        // Save to database
        const { error: dbError } = await _supabase.from('loan_applications').insert([{
            user_id: null, // Set to null or a UUID string for testing
            first_name: document.getElementById('firstName').value,
            father_name: document.getElementById('fatherName').value,
            grandfather_name: document.getElementById('grandFatherName').value,
            mother_name: document.getElementById('motherName').value,
            gender: document.getElementById('gender').value,
            birthday: document.getElementById('birthday').value,
            phone_number: document.getElementById('phoneNumber').value,
            phone_number_2: document.getElementById('phoneNumber2').value,
            org_name: document.getElementById('orgName').value,
            monthly_salary: document.getElementById('monthlySalary').value,
            loan_amount: document.getElementById('loanAmount').value,
            org_phone: document.getElementById('orgPhone').value,
            org_address: document.getElementById('orgAddress').value,
            loan_duration: document.getElementById('loanDuration').value,
            national_id_number: document.getElementById('nationalIDNum').value,
            total_repayable: parseFloat(document.getElementById('summaryTotal').innerText.replace(/,/g, '')),
            interest_applied: document.getElementById('loanDuration').value,
            nat_id_front: natFront,
            nat_id_back: natBack,
            emp_id_front: empFront,
            emp_id_back: empBack,
            status: 'pending'
        }]);

        if (dbError) throw dbError;

        statusMsg.style.display = "block";
        statusMsg.style.backgroundColor = "#dcfce7";
        statusMsg.style.color = "#166534";
        statusMsg.innerText = "Test Success! Application inserted without login.";
        form.reset();

    } catch (err) {
        statusMsg.style.display = "block";
        statusMsg.style.backgroundColor = "#fee2e2";
        statusMsg.style.color = "#991b1b";
        statusMsg.innerText = "Error: " + err.message;
    } finally {
        btn.disabled = false;
        btn.innerText = "Submit Loan Request";
    }
};
</script>

</body>
</html>

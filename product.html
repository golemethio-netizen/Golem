<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Golem Furniture</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-page-container { max-width: 1000px; margin: 50px auto; padding: 20px; }
        .product-display { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .product-display img { width: 100%; border-radius: 10px; object-fit: cover; max-height: 500px; }
        
        /* Seller Profile Card Style */
        .seller-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            margin: 20px 0;
            border: 1px solid #eee;
        }
        .seller-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #6c5ce7; }
        .seller-info h4 { margin: 0; font-size: 1rem; color: #333; }
        .seller-info p { margin: 0; font-size: 0.8rem; color: #777; }

        .details-side { display: flex; flex-direction: column; gap: 10px; }
        .price-tag { font-size: 1.8rem; color: #2ed573; font-weight: bold; }
        .order-buttons { display: grid; gap: 10px; margin-top: 10px; }
        .order-buttons a { text-align: center; padding: 15px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .tg-btn { background: #0088cc; }
        .wa-btn { background: #25d366; }
        .call-btn { background: #333; }
        .verified-badge { color: #0088cc; font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body style="background: #f4f7f6;">

    <div class="product-page-container">
        <a href="index.html" style="text-decoration: none; color: #666; font-weight: 600; display: inline-block; margin-bottom: 20px;">
            <i class="fas fa-arrow-left"></i> Back to Catalog
        </a>
        
        <div id="productContent" class="product-display">
            <p>Loading furniture details...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
       async function loadSingleProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (!productId) {
                window.location.href = 'index.html';
                return;
            }

            // JOIN LOGIC: We select '*' from products and the matching 'profiles' 
            // Note: This assumes your products table has a 'user_id' column linked to 'profiles'
            const { data: p, error } = await _supabase
                .from('products')
                .select(`
                    *,
                    profiles (
                        full_name,
                        avatar_url,
                        is_verified,
                        phone
                    )
                `) 
                .eq('id', productId)
                .single();
            
            if (error || !p) {
                document.getElementById('productContent').innerHTML = `<h3>Item Not Found</h3>`;
                return;
            }

            // Fallback for Seller Info
            const sellerName = p.profiles?.full_name || "Private Seller";
            const sellerAvatar = p.profiles?.avatar_url || `https://ui-avatars.com/api/?name=${sellerName}`;
            const isVerified = p.profiles?.is_verified;

            // Clean Phone for Links
            const rawPhone = (p.profiles?.phone || p.seller_phone || "").replace(/\D/g, '');
            const cleanPhone = rawPhone.startsWith('0') ? '251' + rawPhone.substring(1) : rawPhone;
            const tgUser = (p.telegram_username || "").replace('@', '');

            document.getElementById('productContent').innerHTML = `
                <div class="image-side">
                    <img src="${p.image}" alt="${p.name}">
                </div>
                <div class="details-side">
                    <span style="color:#888; text-transform:uppercase; font-size:0.8rem; font-weight:bold;">${p.category || 'General'}</span>
                    <h1 style="margin:5px 0;">${p.name}</h1>
                    <p class="price-tag">${p.price.toLocaleString()} ETB</p>
                    
                    <!-- MATCHED PROFILE SECTION -->
                    <div class="seller-card">
                        <img src="${sellerAvatar}" class="seller-avatar">
                        <div class="seller-info">
                            <h4>${sellerName} ${isVerified ? '<i class="fas fa-check-circle" style="color:#0088cc;"></i>' : ''}</h4>
                            <p>${isVerified ? 'Verified Merchant' : 'Member'}</p>
                        </div>
                    </div>

                    <p style="color:#555; line-height:1.6; min-height:100px;">${p.description || 'No description provided.'}</p>
                    
                    <div class="order-buttons">
                        <a href="tel:+${cleanPhone}" class="call-btn">
                            <i class="fas fa-phone"></i> Call Seller
                        </a>
                        <a href="https://t.me/${tgUser || '+'+cleanPhone}" target="_blank" class="tg-btn">
                            <i class="fab fa-telegram-plane"></i> Telegram
                        </a>
                        <a href="https://wa.me/${cleanPhone}?text=Interested in ${p.name}" target="_blank" class="wa-btn">
                            <i class="fab fa-whatsapp"></i> WhatsApp
                        </a>
                    </div>
                </div>
            `;
        }

        window.onload = loadSingleProduct;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/9422/9422566.png">
    <title>My Profile | Golem Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #f4f7f6;">

    <!-- HEADER -->
    <header class="golem-header">
        <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">GOLEM</div>
        <div class="nav-container-horizontal">
            <a href="index.html" class="nav-item-box">
                <i class="fas fa-home"></i>
                <p>Shop</p>
            </a>
            <a href="my-items.html" class="nav-item-box">
                <i class="fas fa-box-open"></i>
                <p>My Items</p>
            </a>
            <button onclick="window.handleSignOut()" class="signout-btn" style="margin-left: 15px;">
                <i class="fas fa-sign-out-alt"></i> Sign Out
            </button>
        </div>
    </header>

    <!-- MAIN PROFILE CARD -->
    <main class="container" style="max-width: 600px; padding: 20px; margin-top: 40px;">
        <section class="profile-header" style="background: white; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
            
            <img id="profileAvatar" src="https://via.placeholder.com/150" style="width:120px; height:120px; border-radius:50%; object-fit:cover; margin-bottom:15px; border: 4px solid #6c5ce7;">
            
            <h1 id="profileName" style="margin-bottom: 5px;">Loading...</h1>
            <p id="profileEmail" style="color: #666; margin-bottom: 15px;"></p>
            
            <div id="verificationBadge" class="badge" style="display: inline-block; margin-bottom: 25px; padding: 5px 15px; border-radius: 20px; background: #eee; color: #555;">
                Checking Status...
            </div>
            
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button onclick="window.openEditModal()" class="auth-submit" style="background: #6c5ce7;">
                    <i class="fas fa-edit"></i> Edit Profile
                </button>
                <button onclick="location.href='my-items.html'" class="auth-submit" style="background: #333;">
                    <i class="fas fa-box"></i> Manage Items
                </button>
            </div>

        </section>
    </main>

    <!-- EDIT PROFILE MODAL -->
    <div id="editProfileModal" class="modal-overlay" style="display:none;" onclick="if(event.target == this) window.closeEditModal()">
        <div class="modal-content" style="max-width: 400px;">
            <button type="button" class="close-modal-btn" onclick="window.closeEditModal()">&times;</button>
            <h2 style="margin-bottom: 20px;">Edit Profile</h2>
            
            <!-- FIXED: Form now wraps ALL inputs and the submit button -->
            <form onsubmit="window.updateProfileInfo(event)">
                
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="editFullName" placeholder="Full Name" required>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-phone"></i>
                    <input type="text" id="editPhone" placeholder="Phone Number (e.g., 0911...)" required>
                </div>
                
                <div class="input-group" style="flex-direction: column; align-items: flex-start; padding: 15px;">
                    <label style="font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #666;">Profile Picture (Optional)</label>
                    <input type="file" id="editAvatar" accept="image/*" style="width: 100%; border: none; padding: 0; outline: none;">
                </div>
                
                <button type="submit" class="auth-submit" style="width: 100%; margin-top: 15px;">Save Changes</button>
            </form>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
    <script>
        // Open Modal logic
        window.openEditModal = function() {
            const modal = document.getElementById('editProfileModal');
            
            // Pre-fill the name input with the name currently shown on the screen
            const currentName = document.getElementById('profileName').innerText;
            if(currentName !== 'Loading...' && currentName !== 'Member') {
                document.getElementById('editFullName').value = currentName;
            }
            
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Stop background scrolling
        };

        // Close Modal logic
        window.closeEditModal = function() {
            document.getElementById('editProfileModal').style.display = 'none';
            document.body.style.overflow = 'auto'; // Restore background scrolling
        };

        // Initialize page on load
        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Auth Guard - Check if user is logged in
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) {
                alert("Please log in to view your profile.");
                window.location.href = "index.html";
                return; // Stop execution
            }

            // 2. Load the profile data via script.js
            if (typeof window.loadUserProfile === 'function') {
                window.loadUserProfile();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>My Profile | Golem Furniture</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <div class="logo" onclick="location.href='index.html'">GOLEM</div>
        <nav>
            <button onclick="location.href='index.html'" class="filter-btn">Back to Shop</button>
            <button onclick="window.handleSignOut()" class="signout-btn">Sign Out</button>
        </nav>
    </header>

    <main class="container" style="margin-top: 100px;">
        <section class="profile-header">
            <div class="user-info-card">
                <h1 id="profileName">Loading...</h1>
                <p id="profileEmail"></p>
                <img id="profileAvatar" src="https://via.placeholder.com/150" style="width:100px; height:100px; border-radius:50%; object-fit:cover; margin-bottom:15px; border: 3px solid #6c5ce7;">
    <h1 id="profileName">Loading...</h1>
                <div id="verificationBadge" class="badge">Checking Status...</div>
                
                <div style="margin-top: 20px;">
                    <button onclick="window.openEditModal()" class="filter-btn">
                        <i class="fas fa-edit"></i> Edit Profile
                    </button>
                </div>
            </div>
        </section>

        <hr>

     
    </main>

    <div id="editProfileModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="document.getElementById('editProfileModal').style.display='none'">&times;</span>
            <h2>Edit Profile</h2>
            <form onsubmit="window.updateProfileInfo(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="editFullName" placeholder="Enter full name" required>
                </div>
                <div class="form-group">
                    <label>Phone Number (Addis/Local)</label>
                    <input type="text" id="editPhone" placeholder="09..." required>
                </div>
                <button type="submit" class="buy-btn">Save Changes</button>
            </form>
<div class="form-group">
    <label>Profile Picture</label>
    <input type="file" id="editAvatar" accept="image/*" class="modal-input">
</div>
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            window.loadUserProfile();
            window.loadUserListings();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Golem Furniture</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <div class="logo" onclick="location.href='index.html'">GOLEM</div>
        <nav>
            <button onclick="location.href='index.html'" class="filter-btn">Back to Shop</button>
        </nav>
    </header>


<button onclick="document.getElementById('editProfileModal').style.display='flex'" class="filter-btn">
    <i class="fas fa-edit"></i> Edit Profile
    <div id="editProfileModal" class="modal" style="display:none;">
    <div class="modal-content">
        <span class="close" onclick="document.getElementById('editProfileModal').style.display='none'">&times;</span>
        <h2>Edit Profile</h2>
        <form onsubmit="window.updateProfileInfo(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="editFullName" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="editPhone" required>
            </div>
            <button type="submit" class="buy-btn">Save Changes</button>
        </form>
    </div>
</div>
</button>
    <main class="container" style="margin-top: 100px;">
        <section class="profile-header">
            <div class="user-info-card">
                <h1 id="profileName">Loading...</h1>
                <p id="profileEmail"></p>
                <div id="verificationBadge" class="badge">Checking Status...</div>
            </div>
        </section>

        <hr>

        <section class="my-listings">
            <h2>Your Furniture Listings</h2>
            <div id="myProductGrid" class="product-grid">
                </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            window.loadUserProfile();
            window.loadUserListings();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golem Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>



    <div id="cartModal" class="modal" style="display:none;">
    <div class="auth-card">
        <span class="close-btn" onclick="toggleCart()">&times;</span>
        <h2>Your Cart</h2>
        <div id="cartItemsList">
            </div>
        <hr>
        <div style="display:flex; justify-content:space-between; font-weight:bold; margin: 15px 0;">
            <span>Total:</span>
            <span><span id="cartTotal">0.00</span> ETB</span>
        </div>
        
        <div id="checkoutFields">
            <input type="text" id="buyerName" placeholder="Your Name" style="width:100%; margin-bottom:10px;">
            <input type="tel" id="buyerPhone" placeholder="Your Phone (251...)" style="width:100%; margin-bottom:10px;">
            <button onclick="checkout()" style="width:100%; background:var(--success); color:white;">Confirm Order (WhatsApp)</button>
        </div>
    </div>
</div>


<div class="nav-item" onclick="toggleCart()">
    🛒<span id="cartCount" class="nav-badge" style="margin-left:-5px;">0</span>
    <p>Cart</p>
</div>
    
</head>
<body>
   <nav>
    <div class="logo" onclick="location.href='index.html'">GOLEM</div>
    <div id="userMenu">
        <button onclick="openAuthModal()" class="login-btn">Sign In</button>
    </div>
</nav>

    <div class="controls">
        <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="Search items...">
        <div class="category-filters">
            <button onclick="filterByCategory('All')" class="active">All</button>
            <button onclick="filterByCategory('Electronics')">Electronics</button>
            <button onclick="filterByCategory('Clothing')">Clothing</button>
            <button onclick="filterByCategory('Art')">Art</button>
        </div>
    </div>

    <div id="productGrid" class="product-grid"></div>

    <div class="mobile-nav">
        <div class="nav-item" onclick="location.href='index.html'">🏠<p>Home</p></div>
       <div class="nav-item" onclick="checkAuthToSell()">
    <i class="fas fa-plus-circle"></i>
    <p>Sell</p>
</div>
        <div class="nav-item" onclick="location.href='my-items.html'" id="mobileMyItems">📦<p>My Items</p></div>
        <div class="nav-item" onclick="toggleCart()">🛒<p>Cart</p></div>
    </div>

   

    <script src="config.js"></script>
<script src="script.js"></script>
<script>
// Inside your admin.html loadPending() function:
grid.innerHTML = data.map(p => `
    <div class="product-card">
        <span class="badge-pending">PENDING APPROVAL</span>
        <img src="${p.image}" style="width:100%; height:200px; object-fit:cover; border-radius:8px;">
        <div class="product-info">
            <h3>${p.name}</h3>
            <p><strong>Price:</strong> ${p.price} ETB</p>
            <p><strong>Category:</strong> ${p.category}</p>
            <p><small>Seller Contact: ${p.seller_contact}</small></p>
            
            <div class="admin-actions">
                <button class="btn-approve" onclick="updateStatus('${p.id}', 'approved')">Approve</button>
                <button class="btn-reject" onclick="updateStatus('${p.id}', 'rejected')">Reject</button>
            </div>
        </div>
    </div>
`).join('');
</script>
<div id="authModal" class="modal">
    <div class="auth-card">
        <span class="close-btn" onclick="closeAuth()">&times;</span>
        <h2 id="authTitle">Login</h2>
        
        <input type="email" id="authEmail" placeholder="Email">
        <input type="password" id="authPassword" placeholder="Password">
        
        <p id="forgotPasswordLink" style="text-align: right; margin-top: -10px;">
            <a href="#" onclick="handleForgotPassword()" style="font-size: 0.8rem; color: var(--primary);">Forgot Password?</a>
        </p>

        <button onclick="handleAuth()" class="main-btn" id="authBtn">Sign In</button>
        <p onclick="toggleAuthMode()" id="toggleText" style="cursor:pointer; text-align:center; margin-top:15px;">
            Don't have an account? Sign Up
        </p>
    </div>
</div>
    
</body>
</html>

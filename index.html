<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golem Marketplace | Buy & Sell</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
</head>
<body>

    <header class="golem-header">
        <div class="logo">GOLEM</div>
        

    <div class="#">
        <div class="nav-item" onclick="location.href='index.html'">🏠<p>Home</p>
        <div class="nav-item" onclick="checkAuthToSell()">➕<p>Sell</p>
        <div class="nav-item" onclick="location.href='my-items.html'">📦<p>My Items</p></div>
    </div>


        <div class="auth-buttons">
            <button class="lang-toggle">አማ</button>
            <a href="#" class="signin-btn">Sign In</a>
        </div>
    </header>

<div class="sort-container" style="padding: 10px 15px; display: flex; justify-content: flex-end;">
    <select id="sortSelect" onchange="fetchProducts()" style="padding: 8px; border-radius: 8px; border: 1px solid #ddd; outline: none; background: #fff;">
        <option value="newest">🆕 Newest First</option>
        <option value="price_low">💰 Price: Low to High</option>
        <option value="price_high">💎 Price: High to Low</option>
        <option value="popular">🔥 Most Viewed</option>
    </select>
</div>

<div style="display: flex; gap: 10px; justify-content: center; padding: 0 15px 15px;">
    <input type="number" id="minPrice" placeholder="Min Price" style="width: 100px; padding: 5px; border-radius: 5px; border: 1px solid #ddd;">
    <input type="number" id="maxPrice" placeholder="Max Price" style="width: 100px; padding: 5px; border-radius: 5px; border: 1px solid #ddd;">
    
    <button onclick="applyPriceFilter()" class="filter-btn" style="padding: 5px 15px;">Apply</button>
</div>

        
</div>

    <div class="filter-bar">
     <button class="filter-btn active" onclick="filterCategory('All', this)">All</button>
<button class="filter-btn" onclick="filterCategory('Electronics')">Electronics</button>
        <button class="filter-btn" onclick="filterCategory('Computer & Phone')">Computer & Phone</button>
        <button class="filter-btn" onclick="filterCategory('Fashion')">Fashion</button>
        <button class="filter-btn" onclick="filterCategory('home & Furniture')">home & Furniture</button>
        <button class="filter-btn" onclick="filterCategory('Vehicls')">Vehicls</button>
        <button class="filter-btn" onclick="filterCategory('Jobes')">Jobes</button>
        <button class="filter-btn" onclick="filterCategory('Services')">Services</button>
       
          </div>
    <div id="productGrid" class="product-grid"></div>









    
    <main class="container">
        <div class="masonry-wrapper">
            
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=400&q=80" alt="Watch" loading="lazy">
                <div class="product-info">
                    <div class="product-title">Smart Watch Pro</div>
                    <span class="product-price">$120</span>
                    <span class="view-count"><i class="far fa-eye"></i> 154</span>
                </div>
            </div>

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=400&q=120" alt="Headphones" loading="lazy">
                <div class="product-info">
                    <div class="product-title">Premium Wireless Headphones</div>
                    <span class="product-price">$85</span>
                    <span class="view-count"><i class="far fa-eye"></i> 89</span>
                </div>
            </div>

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=400&h=600&q=80" alt="Shoes" loading="lazy">
                <div class="product-info">
                    <div class="product-title">Red Sport Sneakers</div>
                    <span class="product-price">$65</span>
                    <span class="view-count"><i class="far fa-eye"></i> 210</span>
                </div>
            </div>

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1585333127302-c2c98184b83c?auto=format&fit=crop&w=400&q=80" alt="Camera" loading="lazy">
                <div class="product-info">
                    <div class="product-title">Vintage Camera</div>
                    <span class="product-price">$450</span>
                    <span class="view-count"><i class="far fa-eye"></i> 42</span>
                </div>
            </div>

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?auto=format&fit=crop&w=400&h=500&q=80" alt="Shoes" loading="lazy">
                <div class="product-info">
                    <div class="product-title">Classic Yellow Vans</div>
                    <span class="product-price">$55</span>
                    <span class="view-count"><i class="far fa-eye"></i> 302</span>
                </div>
            </div>

        </div>
    </main>

    <script>
        // Placeholder for language toggle functionality
        const langBtn = document.querySelector('.lang-toggle');
        langBtn.addEventListener('click', () => {
            alert('Switching to Amharic logic will go here!');
        });
    </script>





<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="config.js"></script>

<script src="script.js"></script>

    
</body>
</html>

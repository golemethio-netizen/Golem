<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golem Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav>
        <div class="logo" onclick="location.reload()">GOLEM</div>
        <div id="userMenu">
           <button onclick="openAuthModal()" id="loginNavBtn">Sign In</button>
        </div>
    </nav>

    <div class="controls">
        <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="Search items...">
        <div class="category-filters">
            <button onclick="filterByCategory('All')" class="active">All</button>
            <button onclick="filterByCategory('Electronics')">Electronics</button>
            <button onclick="filterByCategory('Clothing')">Clothing</button>
            <button onclick="filterByCategory('Art')">Art</button>
        </div>
    </div>

    <div id="productGrid" class="product-grid"></div>

    <div class="mobile-nav">
        <div class="nav-item" onclick="location.href='index.html'">🏠<p>Home</p></div>
        <div class="nav-item" onclick="checkAuthToSell()">➕<p>Sell</p></div>
        <div class="nav-item" onclick="location.href='my-items.html'" id="mobileMyItems">📦<p>My Items</p></div>
        <div class="nav-item" onclick="toggleCart()">🛒<p>Cart</p></div>
    </div>

    <div id="authModal" class="modal" style="display:none;">
        <div class="auth-card">
            <span class="close-btn" onclick="closeAuth()">&times;</span>
            <h2 id="authTitle">Login to Golem</h2>
            <div id="registerFields" style="display:none;">
                <input type="text" id="regName" placeholder="Full Name">
                <input type="tel" id="regPhone" placeholder="Phone (251...)">
            </div>
            <input type="email" id="authEmail" placeholder="Email">
            <input type="password" id="authPassword" placeholder="Password">
            <button id="authBtn" onclick="handleAuth()">Sign In</button>
            <p id="toggleText" onclick="toggleAuthMode()">Don't have an account? Register</p>
        </div>
    </div>

    <script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>

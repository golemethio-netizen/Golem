<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golem Marketplace | Buy & Sell</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
</head>
<body>

  <header class="golem-header">
    <div class="logo">GOLEM</div>

    <div class="search-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="headerSearch" placeholder="Search for items..." onkeyup="handleSearch(event)">
    </div>

    <div class="nav-container-horizontal">
        <div class="nav-item-box bg-home" onclick="location.href='index.html'">
            <i class="fas fa-home"></i>
            <p>Home</p>
        </div>
        
        <div class="nav-item-box bg-sell" onclick="checkAuthToSell()">
            <i class="fas fa-plus-circle"></i>
            <p>Sell</p>
        </div>
        
        <div class="nav-item-box bg-items" onclick="location.href='my-items.html'">
            <i class="fas fa-box-open"></i>
            <p>My Items</p>
        </div>
    </div>

    <div class="auth-buttons">
        <button class="lang-toggle">አማ</button>
        <a href="#" class="signin-btn">Sign In</a>
    </div>
</header>

    <div class="filter-controls" style="padding: 20px 0; background: #fff;">
        <div class="sort-container" style="display: flex; justify-content: flex-end; padding: 0 5%;">
            <select id="sortSelect" onchange="fetchProducts()" style="padding: 8px; border-radius: 8px; border: 1px solid #ddd;">
                <option value="newest">🆕 Newest First</option>
                <option value="price_low">💰 Price: Low to High</option>
                <option value="price_high">💎 Price: High to Low</option>
                <option value="popular">🔥 Most Viewed</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px; justify-content: center; padding: 15px;">
            <input type="number" id="minPrice" placeholder="Min Price" style="width: 100px; padding: 8px; border-radius: 5px; border: 1px solid #ddd;">
            <input type="number" id="maxPrice" placeholder="Max Price" style="width: 100px; padding: 8px; border-radius: 5px; border: 1px solid #ddd;">
            <button onclick="applyPriceFilter()" class="filter-btn" style="padding: 8px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">Apply</button>
        </div>
    </div>

    <div class="filter-bar" style="display: flex; gap: 10px; overflow-x: auto; padding: 10px 5%; white-space: nowrap;">
        <button class="filter-btn active" onclick="filterCategory('All', this)">All</button>
        <button class="filter-btn" onclick="filterCategory('Electronics')">Electronics</button>
        <button class="filter-btn" onclick="filterCategory('Computer & Phone')">Computer & Phone</button>
        <button class="filter-btn" onclick="filterCategory('Fashion')">Fashion</button>
        <button class="filter-btn" onclick="filterCategory('home & Furniture')">Home & Furniture</button>
        <button class="filter-btn" onclick="filterCategory('Vehicls')">Vehicles</button>
        <button class="filter-btn" onclick="filterCategory('Jobes')">Jobs</button>
        <button class="filter-btn" onclick="filterCategory('Services')">Services</button>
    </div>

    




<div id="authModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" onclick="toggleModal()">&times;</span>
        <h2 id="modalTitle">Welcome Back</h2>
        <p style="color: #666; margin-bottom: 20px;">Please enter your details</p>
        
        <form id="authForm">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Password" required>
            </div>
            <button type="submit" class="auth-submit">Sign In</button>
        </form>

        <div class="modal-footer">
            <p>Don't have an account? <a href="#" onclick="toggleAuthMode()">Sign Up</a></p>
        </div>
    </div>
</div>



    
    

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
   
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golem Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    
</head>
<body>
    <nav>
        <div class="logo">GOLEM</div>
        <div class="nav-right" id="userMenu">
            </div>
    </nav>

    <div class="search-container" style="padding: 15px; max-width: 800px; margin: 0 auto;">
    <div style="position: relative; display: flex; align-items: center;">
        <span style="position: absolute; left: 15px; color: #888;">🔍</span>
        <input type="text" id="searchInput" placeholder="Search for items (e.g. iPhone, Sofa...)" 
               style="width: 100%; padding: 12px 12px 12px 40px; border-radius: 25px; border: 1px solid #ddd; outline: none; font-size: 1rem;">
    </div>
</div>

    <div class="filter-bar">
     <button class="filter-btn active" onclick="filterCategory('All')">All</button>
<button class="filter-btn" onclick="filterCategory('Electronics')">Electronics</button>
<button class="filter-btn" onclick="filterCategory('Clothing')">Clothing</button>
    </div>



    <div id="productGrid" class="product-grid"></div>

    <div class="footer-nav">
        <div class="nav-item" onclick="location.href='index.html'">🏠<p>Home</p></div>
        <div class="nav-item" onclick="checkAuthToSell()">➕<p>Sell</p></div>
        <div class="nav-item" onclick="location.href='my-items.html'">📦<p>My Items</p></div>
    </div>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="./config.js"></script>

<script src="./script.js"></script>


</body>
</html>

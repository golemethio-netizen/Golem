<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golem Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav>
        <div class="logo" onclick="location.href='index.html'">GOLEM</div>
        <div id="userMenu">
            <button onclick="openAuthModal()">Sign In</button>
        </div>
        <div class="cart-icon" onclick="toggleCart()">
            🛒<span id="cartCount">0</span>
        </div>
    </nav>

    <div class="filter-bar">
        <button onclick="filterCategory('all')">All</button>
        <button onclick="filterCategory('Electronics')">Electronics</button>
        <button onclick="filterCategory('Clothing')">Clothing</button>
    </div>

    <div id="productGrid" class="product-grid"></div>

   <div id="cartModal" class="modal">
    <div class="modal-content" style="max-width: 400px; padding: 25px;">
        <span class="close" onclick="toggleCart()">&times;</span>
        <h2 style="margin-bottom: 15px;">🛒 Your Cart</h2>
        
        <div id="cartItems"></div>
        
        <div class="buyer-info" style="border-top: 1px solid #eee; padding-top: 15px;">
            <p style="font-size: 0.9rem; color: #555; margin-bottom: 10px;">Enter details to notify seller:</p>
            <input type="text" id="buyerName" placeholder="Full Name">
            <input type="text" id="buyerPhone" placeholder="Phone Number (e.g. 0911...)">
        </div>

        <div class="checkout-btns">
            <button onclick="checkout('whatsapp')" class="wa-btn">
                <span>💬</span> Order via WhatsApp
            </button>
            <button onclick="checkout('telegram')" class="tg-btn">
                <span>✈️</span> Order via Telegram
            </button>
        </div>
    </div>
</div>

    <div id="authModal" class="modal">
        <div class="auth-card">
            <h2 id="authTitle">Login</h2>
            <input type="email" id="authEmail" placeholder="Email">
            <input type="password" id="authPassword" placeholder="Password">
            <div id="forgotPasswordLink"><a href="#" onclick="handleForgotPassword()">Forgot Password?</a></div>
            <button onclick="handleAuth()" id="authBtn">Proceed</button>
            <p onclick="toggleAuthMode()" id="toggleText" style="cursor:pointer;">New here? Sign Up</p>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>

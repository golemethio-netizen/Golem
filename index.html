<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golem Marketplace | Buy & Sell</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="golem-header">
        <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">GOLEM</div>
        <div class="search-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="headerSearch" placeholder="Search for electronics, furniture...">
        </div>
        <nav class="nav-container-horizontal">
            <a href="index.html" class="nav-item-box bg-home">
                <i class="fas fa-home"></i>
                <p>Home</p>
            </a>
            <button class="sell-btn" onclick="window.checkAuthToSell()">
    <i class="fas fa-plus"></i> Sell Item
</button>
            
            <a href="my-items.html" class="nav-item-box bg-items">
                <i class="fas fa-box-open"></i>
                <p>My Items</p>
            </a>
        </nav>
       <button class="nav-item-box" onclick="location.href='cart.html'">
    <div style="position: relative; display: inline-block;">
        <i class="fas fa-heart"></i>
        <span id="navCartCount" style="display:none; position: absolute; top: -8px; right: -10px; background: #ff4757; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; border: 2px solid white;">0</span>
    </div>
    <p>Saved</p>
</button>
        
    </header>

    <section class="filter-controls">
        <div class="sort-container">
            <select id="sortSelect" onchange="fetchProducts()">
                <option value="newest">🆕 Newest First</option>
                <option value="price_low">💰 Price: Low to High</option>
                <option value="price_high">💎 Price: High to Low</option>
            </select>
        </div>
        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterCategory('All', this)">All</button>
            <button class="filter-btn" onclick="filterCategory('Electronics', this)">Electronics</button>
            <button class="filter-btn" onclick="filterCategory('Home & Furniture', this)">Furniture</button>
            <button class="filter-btn" onclick="filterCategory('Fashion', this)">Fashion</button>
        </div>
    </section>

    <main class="container">
        <div id="productGrid" class="masonry-wrapper">
            <div class="loading-spinner"><i class="fas fa-circle-notch fa-spin"></i> Loading items...</div>
        </div>

        <div class="invite-container">
            <i class="fas fa-users"></i>
            <h3>Help Golem Grow!</h3>
            <p>Know someone selling something? Invite them to Golem.</p>
            <div class="invite-btns">
                <button onclick="shareToTelegram()" class="tg-btn" style="background:#0088cc;"><i class="fab fa-telegram-plane"></i> Telegram</button>
                <button onclick="shareToWhatsApp()" class="tg-btn" style="background:#25d366;"><i class="fab fa-whatsapp"></i> WhatsApp</button>
            </div>
        </div>
    </main>

   <div id="authModal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <span class="close-modal" onclick="toggleModal()">&times;</span>
        <h2 id="modalTitle">Welcome Back</h2>
        <p id="modalSubtitle">Sign in to manage your listings</p>
        
        <form id="authForm" onsubmit="handleAuth(event)">
            <div id="registerFields" style="display: none;">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="regName" placeholder="Full Name">
                </div>
                <div class="input-group">
                    <i class="fas fa-phone"></i>
                    <input type="text" id="regPhone" placeholder="Phone (09...)">
                </div>
            </div>

            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="authEmail" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="authPassword" placeholder="Password" required>
            </div>

            <button type="submit" id="authSubmitBtn" class="auth-submit">Sign In</button>
        </form>

        <div class="modal-footer">
            <p id="toggleText">Don't have an account? <a href="#" onclick="toggleAuthMode()">Sign Up</a></p>
        </div>
    </div>
</div>

    
    </div>

    <div id="productModal" class="modal-overlay" onclick="if(event.target == this) closeProductModal()">
    <div class="modal-content">
        <button onclick="closeProductModal()" style="position: absolute; top: 15px; right: 20px; background: none; border: none; font-size: 1.5rem; cursor: pointer; z-index: 10;">&times;</button>
        
        <div class="modal-body">
            <div class="details-img-container">
                <img id="modalProductImg" src="" alt="Product Image">
            </div>

            <div class="details-scrollable-content">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;">
                    <span id="modalCondition" class="condition-badge"></span>
                </div>
                
                <h2 id="modalProductTitle" style="margin-bottom: 10px; font-size: 1.5rem;"></h2>
                <h3 id="modalProductPrice" style="color: var(--primary-color); margin-bottom: 20px;"></h3>
                
                <p style="font-weight: 600; margin-bottom: 5px;">Description</p>
                <p id="modalProductDesc" style="color: #666; font-size: 0.95rem; margin-bottom: 30px; white-space: pre-wrap;"></p>

                <div class="fixed-bottom-actions">
                    <a id="callContact" href="#" class="contact-btn call-btn">
                        <i class="fas fa-phone"></i> Call
                    </a>
                    <a id="whatsappOrder" href="#" target="_blank" class="contact-btn wa-btn">
                        <i class="fab fa-whatsapp"></i> WhatsApp
                    </a>
                    <a id="telegramOrder" href="#" target="_blank" class="contact-btn tg-btn">
                        <i class="fab fa-telegram-plane"></i> Telegram
                    </a>
                    <button class="contact-btn main-btn" onclick="addToCartFromModal()">
                        <i class="fas fa-heart"></i> Save to List
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>

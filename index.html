<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golem Marketplace | Buy & Sell</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="golem-header">
        <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">GOLEM</div>

        <div class="search-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="headerSearch" placeholder="Search for electronics, fashion...">
        </div>

        <nav class="nav-container-horizontal">
            <a href="index.html" class="nav-item-box bg-home">
                <i class="fas fa-home"></i>
                <p>Home</p>
            </a>
            
            <div class="nav-item-box bg-sell" onclick="checkAuthToSell()" style="cursor:pointer;">
                <i class="fas fa-plus-circle"></i>
                <p>Sell</p>
            </div>
            
            <a href="my-items.html" class="nav-item-box bg-items">
                <i class="fas fa-box-open"></i>
                <p>My Items</p>
            </a>
        </nav>

        <div class="auth-buttons">
            <button class="lang-toggle">አማ</button>
            <button class="signin-btn" onclick="toggleModal()">Sign In</button>
        </div>
    </header>

    <section class="filter-controls">
        <div class="sort-container">
            <select id="sortSelect" onchange="fetchProducts()">
                <option value="newest">🆕 Newest First</option>
                <option value="price_low">💰 Price: Low to High</option>
                <option value="price_high">💎 Price: High to Low</option>
                <option value="popular">🔥 Most Viewed</option>
            </select>
        </div>

        <div class="price-filter-wrapper">
            <input type="number" id="minPrice" placeholder="Min ETB">
            <input type="number" id="maxPrice" placeholder="Max ETB">
            <button onclick="applyPriceFilter()" class="apply-btn">Apply</button>
        </div>
    </section>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="filterCategory('All', this)">All</button>
        
        <button class="filter-btn fav-filter-btn" onclick="filterFavorites(this)">
            <i class="fas fa-heart"></i> My Favorites
        </button>

        <button class="filter-btn" onclick="filterCategory('Electronics', this)">Electronics</button>
        <button class="filter-btn" onclick="filterCategory('Computer & Phone', this)">Computer & Phone</button>
        <button class="filter-btn" onclick="filterCategory('Fashion', this)">Fashion</button>
        <button class="filter-btn" onclick="filterCategory('Home & Furniture', this)">Home & Furniture</button>
        <button class="filter-btn" onclick="filterCategory('Vehicles', this)">Vehicles</button>
        <button class="filter-btn" onclick="filterCategory('Jobs', this)">Jobs</button>
        <button class="filter-btn" onclick="filterCategory('Services', this)">Services</button>
    </div>

    <main class="container">
        <div id="productGrid" class="masonry-wrapper">
            </div>
    </main>

    <div id="authModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleModal()">&times;</span>
            <h2 id="modalTitle">Welcome Back</h2>
            <p id="modalSubtitle">Please enter your details to continue</p>
            
            <form id="authForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Password" required>
                </div>

                <div class="forgot-link">
                    <a href="#" onclick="handleForgotPassword(event)">Forgot Password?</a>
                </div>

                <button type="submit" class="auth-submit">Sign In</button>
            </form>

            <div class="modal-footer">
                <p>Don't have an account? <a href="#" onclick="toggleAuthMode()">Sign Up</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>

</body>
</html>

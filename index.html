<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Golem Marketplace | Ethiopia</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo" onclick="location.href='index.html'">GOLEM</div>
        <div id="userMenu">
            </div>
    </nav>

    <div class="container">
        <div class="search-container">
            <div class="search-box">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="Search items...">
            </div>
        </div>

        <div class="action-bar">
            <div class="filter-container" id="categoryFilters">
                </div>
            <select id="sortSelect" onchange="fetchProducts()">
                <option value="newest">🆕 Newest</option>
                <option value="price_low">💰 Price: Low</option>
                <option value="price_high">💎 Price: High</option>
                <option value="popular">🔥 Popular</option>
            </select>
        </div>

        <div id="productGrid" class="product-grid">
            <p class="loading">Loading marketplace...</p>
        </div>
    </div>

    <button class="fab-sell" onclick="checkAuthToSell()">➕ Sell</button>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>

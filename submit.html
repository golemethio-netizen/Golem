<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Sell - Golem</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <h2>List an Item</h2>
        <form id="productForm">
            <input type="text" id="name" placeholder="Item Name" required>
            <input type="number" id="price" placeholder="Price" required>
            <input type="text" id="sellerContact" placeholder="251..." required>
            <input type="file" id="imageInput" accept="image/*" required>
            <button type="submit" id="submitBtn">Post Item</button>
        </form>
    </div>

    <script src="config.js"></script>
    <script>
        document.getElementById('productForm').onsubmit = async (e) => {
            e.preventDefault();
            const { data: { user } } = await _supabase.auth.getUser();
            const file = document.getElementById('imageInput').files[0];
            const fileName = `${Date.now()}_${file.name}`;

            // Upload Image
            await _supabase.storage.from('product-images').upload(fileName, file);
            const { data: { publicUrl } } = _supabase.storage.from('product-images').getPublicUrl(fileName);

            // Insert Product
            await _supabase.from('products').insert([{
                name: document.getElementById('name').value,
                price: document.getElementById('price').value,
                seller_contact: document.getElementById('sellerContact').value,
                image: publicUrl,
                user_id: user.id,
                status: 'pending'
            }]);

            alert("Posted! Waiting for Admin approval.");
            location.href = 'index.html';
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sell Item - Golem</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<form id="uploadForm">
    <input type="text" id="pName" placeholder="Product Name" required>
    <input type="number" id="pPrice" placeholder="Price (ETB)" required>
    <input type="text" id="pImg" placeholder="Image URL" required>
    <select id="pCat"><option>Electronics</option><option>Clothing</option></select>
    <button type="submit" class="main-btn">Post Item</button>
</form>

</html>

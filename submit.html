<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Item | Golem</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav>
        <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">GOLEM</div>
    </nav>

    <div class="container" style="padding: 20px; max-width: 500px; margin: auto;">
        <h2 style="text-align: center;">Sell Your Item</h2>
        <form id="uploadForm">
            <input type="text" id="pName" placeholder="Product Name (e.g. iPhone 13)" required>
            <input type="number" id="pPrice" placeholder="Price in ETB" required>
            <input type="text" id="pImg" placeholder="Image URL (Paste link here)" required>
            
            <select id="pCat">
                <option value="Electronics">Electronics</option>
                <option value="Clothing">Clothing</option>
                <option value="Home">Home</option>
                <option value="Other">Other</option>
            </select>

            <div style="margin-top: 15px; padding: 15px; background: #f9f9f9; border-radius: 8px; border: 1px solid #ddd;">
    <p style="font-size: 0.85rem; font-weight: bold; color: #333; margin-bottom: 10px;">Contact Info (Required for Buyers)</p>
    
    <label style="font-size: 0.75rem; color: #666;">Phone Number for Calls</label>
    <input type="tel" id="pPhone" placeholder="e.g. 0911223344" required style="margin-bottom: 10px;">
    
    <label style="font-size: 0.75rem; color: #666;">WhatsApp Number</label>
    <input type="tel" id="pWhatsApp" placeholder="e.g. 251911223344" required>
</div>

            <button type="submit" class="main-btn" style="margin-top: 20px;">Post for Approval</button>
        </form>
    </div>

    <script src="config.js"></script>
    <script src="submit.js"></script>
</body>
</html>

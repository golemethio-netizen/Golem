<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Approval | Golem</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav>
        <div class="logo" onclick="location.href='index.html'">GOLEM ADMIN</div>
        <button onclick="location.href='index.html'" class="filter-btn">Exit Admin</button>
    </nav>
    
<div class="admin-card">
    <h3>Manage Categories</h3>
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <input type="text" id="newCatInput" placeholder="New Category Name (e.g. Shoes)" 
               style="flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
        <button onclick="addCategory()" class="approve-btn">Add Category</button>
    </div>
    <div class="admin-card" style="margin-top: 20px;">
    <h3>Active Categories</h3>
    <div id="adminCategoryList" style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
        <p style="color: #888;">Loading categories...</p>
    </div>
</div>
</div>
    
    <div class="container">
        <h2 style="margin-bottom: 20px;">Pending Approvals</h2>
        <div id="adminGrid" class="product-grid">
            <p>Checking for new items...</p>
        </div>
    </div>
<div id="adminGrid" class="product-grid">
    </div>

<style>
    /* Add this directly in admin.html to force the buttons to show */
    .admin-actions-container {
        display: flex;
        gap: 10px;
        margin-top: 15px;
    }
    .approve-btn {
        background-color: #28a745;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 5px;
        flex: 1;
        cursor: pointer;
    }
    .reject-btn {
        background-color: #dc3545 !important; /* Force Red */
        color: white !important;
        border: none;
        padding: 10px;
        border-radius: 5px;
        flex: 1;
        cursor: pointer;
        display: inline-block !important; /* Force visibility */
    }
</style>
    <script src="config.js"></script>
    <script src="admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/9422/9422566.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Approval | Golem</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background: #f0f2f5;">

    <header class="golem-header">
        <div class="logo">GOLEM ADMIN</div>
        <button class="signin-btn" onclick="location.href='index.html'">View Site</button>
    </header>

    <div class="container" style="padding: 20px;">
        <div class="admin-tabs" style="display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid #ddd; padding-bottom: 10px;">
            <button onclick="switchTab('pending', this)" class="tab-btn active">Pending</button>
            <button onclick="switchTab('approved', this)" class="tab-btn">Approved (Live)</button>
            <button onclick="switchTab('rejected', this)" class="tab-btn">Rejected/Deleted</button>
        </div>

        <div class="admin-search-bar" style="margin-bottom: 20px; display: flex; gap: 10px;">
            <div style="position: relative; flex: 1;">
                <i class="fas fa-search" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #888;"></i>
                <input type="text" id="adminSearchInput" placeholder="Search by name or phone number..." 
                       style="width: 100%; padding: 12px 12px 12px 40px; border-radius: 8px; border: 1px solid #ddd; outline: none;">
            </div>
        </div>
         
        <div class="stats-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
            <div class="stat-card"><i class="fas fa-box"></i><div><h4 id="totalItems">0</h4><p>Total Items</p></div></div>
            <div class="stat-card"><i class="fas fa-users"></i><div><h4 id="totalUsers">0</h4><p>Active Sellers</p></div></div>
            <div class="stat-card"><i class="fas fa-hand-holding-usd"></i><div><h4 id="totalValue">0 ETB</h4><p>Market Value</p></div></div>
            <div class="stat-card" onclick="location.href='#ticketsSection'" style="cursor:pointer; border: 1px solid #ff4d4d;">
                <i class="fas fa-headset" style="color: #ff4d4d; background: #fff5f5;"></i>
                <div><h4 id="pendingTickets">0</h4><p>Support Tickets</p></div>
            </div>
        </div>

        <main>
            <h2 id="viewTitle" style="margin-bottom: 20px;">Pending Approval</h2>
            <div id="adminGrid" class="masonry-wrapper"></div>
        </main>

        <section id="ticketsSection" style="margin-top: 50px; border-top: 2px solid #ddd; padding-top: 30px;">
            <h2><i class="fas fa-envelope-open-text"></i> Support Messages</h2>
            <div id="ticketList" style="display: grid; gap: 15px; margin-top: 20px;"></div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        let currentView = 'pending';

        // --- AUTH CHECK ---
        async function checkAdmin() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user || user.email !== 'yohannes.surafel@gmail.com') {
                alert("Access Denied");
                window.location.href = 'index.html';
            }
        }

        // --- TABS ---
        async function switchTab(status, btn) {
            currentView = status;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('viewTitle').innerText = status.charAt(0).toUpperCase() + status.slice(1) + " Items";
            loadItems(status);
        }

        // --- LOAD PRODUCTS ---
        async function loadItems(status = 'pending') {
            const grid = document.getElementById('adminGrid');
            grid.innerHTML = "<p>Loading...</p>";
            const { data: items, error } = await _supabase.from('products').select('*').eq('status', status).order('created_at', { ascending: false });

            if (error || !items || items.length === 0) {
                grid.innerHTML = `<p style="padding:20px;">No items found in ${status}.</p>`;
                return;
            }

            grid.innerHTML = items.map(item => `
                <div class="product-card ${item.is_featured ? 'featured' : ''}" id="card-${item.id}">
                    ${item.is_featured ? '<span class="vip-badge">⭐ FEATURED</span>' : ''}
                    <img src="${item.image}" style="width:100%; height:180px; object-fit:cover;">
                    <div class="product-info">
                        <h3>${item.name}</h3>
                        <p><strong>Price:</strong> ${item.price} ETB</p>
                        <p><strong>Seller:</strong> ${item.seller_phone}</p>
                        <div class="admin-actions" style="margin-top: 10px;">
                            ${status === 'pending' ? `
                                <button onclick="updateStatus('${item.id}', 'approved')" class="btn-approve">Approve</button>
                                <button onclick="updateStatus('${item.id}', 'rejected')" class="btn-reject">Reject</button>
                            ` : ''}
                           ${status === 'approved' ? `
    <div class="sponsor-controls" style="background: #fdf9f3; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ffeaa7;">
        <label style="font-size: 0.75rem; font-weight: bold; color: #d35400;">💎 SPONSORSHIP</label>
        <div style="display: flex; gap: 5px; margin-top: 5px;">
            <select id="days-${item.id}" style="flex: 1; padding: 5px; border-radius: 4px; border: 1px solid #ddd;">
                <option value="3">3 Days</option>
                <option value="7">7 Days</option>
                <option value="30">30 Days</option>
            </select>
            <button onclick="activateSponsor('${item.id}')" style="background: #f1c40f; color: #000; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold;">Set</button>
        </div>
        ${item.is_sponsored ? `
            <p style="font-size: 0.7rem; color: #27ae60; margin-top: 5px;">
                <i class="fas fa-check-circle"></i> Active until: ${new Date(item.sponsored_until).toLocaleDateString()}
                <br><a href="#" onclick="cancelSponsor('${item.id}')" style="color: #c0392b;">Stop Sponsor</a>
            </p>
        ` : ''}
    </div>
    
    <button onclick="updateStatus('${item.id}', 'rejected')" class="btn-reject" style="width: 100%;">Remove Item</button>
` : ''}
        }

        // --- LOAD TICKETS ---
        async function loadTickets() {
            const list = document.getElementById('ticketList');
            list.innerHTML = "<p>Loading tickets...</p>";
            const { data: tickets, error } = await _supabase.from('support_tickets').select('*').eq('is_resolved', false).order('created_at', { ascending: false });

            if (error || !tickets || tickets.length === 0) {
                list.innerHTML = "<p style='color: #888;'>All caught up! No pending tickets.</p>";
                return;
            }

            list.innerHTML = tickets.map(t => `
                <div style="border: 1px solid #ddd; padding: 15px; border-radius: 8px; background: white; border-left: 5px solid #ff4d4d;">
                    <div style="display: flex; justify-content: space-between;">
                        <strong>${t.subject}</strong>
                        <small>${new Date(t.created_at).toLocaleDateString()}</small>
                    </div>
                    <p style="margin: 10px 0; background: #f9f9f9; padding: 10px; border-radius: 4px;">${t.message}</p>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 0.8rem; color: #007bff;">From: ${t.user_email}</span>
                        <button onclick="resolveTicket('${t.id}')" style="background: #28a745; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer;">Mark Resolved</button>
                    </div>
                </div>
            `).join('');
        }

        async function resolveTicket(id) {
            const { error } = await _supabase.from('support_tickets').update({ is_resolved: true }).eq('id', id);
            if (!error) { loadTickets(); loadStats(); }
        }

        // --- STATS ---
        async function loadStats() {
            const { count: itemsCount } = await _supabase.from('products').select('*', { count: 'exact', head: true });
            const { data: userData } = await _supabase.from('products').select('user_id');
            const uniqueSellers = new Set(userData?.map(item => item.user_id)).size;
            const { data: priceData } = await _supabase.from('products').select('price');
            const totalValue = priceData?.reduce((sum, item) => sum + (item.price || 0), 0) || 0;
            const { count: ticketCount } = await _supabase.from('support_tickets').select('*', { count: 'exact', head: true }).eq('is_resolved', false);

            document.getElementById('totalItems').innerText = itemsCount || 0;
            document.getElementById('totalUsers').innerText = uniqueSellers || 0;
            document.getElementById('totalValue').innerText = totalValue.toLocaleString() + " ETB";
            document.getElementById('pendingTickets').innerText = ticketCount || 0;
        }

        // --- ACTIONS ---
        async function updateStatus(id, newStatus) {
            const { error } = await _supabase.from('products').update({ status: newStatus }).eq('id', id);
            if (!error) { document.getElementById(`card-${id}`)?.remove(); loadStats(); }
        }

        window.permanentlyDelete = async function(id) {
            if (confirm("⚠️ Permanent Delete?")) {
                const { error } = await _supabase.from('products').delete().eq('id', id);
                if (!error) { document.getElementById(`card-${id}`)?.remove(); loadStats(); }
            }
        };

        // --- INITIALIZE ---
        window.onload = async () => {
            await checkAdmin();
            await loadStats();
            await loadItems('pending');
            await loadTickets();
        };

        // Search Filter
        document.getElementById('adminSearchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.product-card').forEach(card => {
                const text = card.innerText.toLowerCase();
                card.style.display = text.includes(term) ? 'block' : 'none';
            });
        });


// --- NEW: SPONSORSHIP MANAGEMENT ---

async function activateSponsor(id) {
    const days = parseInt(document.getElementById(`days-${id}`).value);
    const expiryDate = new Date();
    expiryDate.setDate(expiryDate.getDate() + days);

    const { error } = await _supabase
        .from('products')
        .update({ 
            is_sponsored: true, 
            sponsored_until: expiryDate.toISOString() 
        })
        .eq('id', id);

    if (!error) {
        alert(`🚀 Item is now Sponsored for ${days} days!`);
        loadItems('approved'); // Refresh view
    } else {
        alert("Error: " + error.message);
    }
}

async function cancelSponsor(id) {
    if (!confirm("Stop sponsorship for this item?")) return;

    const { error } = await _supabase
        .from('products')
        .update({ 
            is_sponsored: false, 
            sponsored_until: null 
        })
        .eq('id', id);

    if (!error) {
        loadItems('approved');
    }
}

// Ensure loadStats also counts sponsored items
async function loadStats() {
    // ... your existing code ...
    const { count: sponsoredCount } = await _supabase
        .from('products')
        .select('*', { count: 'exact', head: true })
        .eq('is_sponsored', true);
    
    // You could add a stat card for this if you want
    console.log("Active Sponsors:", sponsoredCount);
}


        
    </script>
</body>
</html>

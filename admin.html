<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/9422/9422566.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golem Admin | Control Center</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-actions button { margin-top: 5px; width: 100%; cursor: pointer; border-radius: 5px; border: none; padding: 10px; font-weight: 600; }
        .btn-approve { background: #2ed573; color: white; }
        .btn-reject { background: #ff4757; color: white; }
        .btn-feature { background: #f1c40f; color: #000; }
        .sponsor-controls { background: #fff9e6; border: 1px solid #f1c40f; padding: 12px; border-radius: 8px; margin-top: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: #eee; cursor: pointer; border-radius: 5px; font-weight: 600; }
        .tab-btn.active { background: #333; color: white; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-card i { font-size: 2rem; color: #333; opacity: 0.2; }

        /* Expiring Soon Pulse Effect */
        .expiring-soon { border: 2px solid #ff4757 !important; animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 71, 87, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }
    </style>
</head>
<body style="background: #f4f7f6;">

    <header class="golem-header">
        <div class="logo">GOLEM ADMIN</div>
        <div style="display: flex; gap: 10px;">
            <button class="signin-btn" onclick="location.href='index.html'" style="background:#666;">View Site</button>
            <button class="signin-btn" onclick="_supabase.auth.signOut().then(() => location.reload())">Sign Out</button>
        </div>
    </header>

    <div class="container" style="padding: 20px;">
        <div class="admin-tabs" style="display: flex; gap: 10px; margin-bottom: 25px;">
            <button onclick="switchTab('pending', this)" class="tab-btn active">Pending Approval</button>
            <button onclick="switchTab('approved', this)" class="tab-btn">Live Items</button>
            <button onclick="switchTab('rejected', this)" class="tab-btn">Rejected</button>
            <button onclick="generateSponsorReport()" style="background: #6c5ce7; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;">
                <i class="fas fa-file-invoice"></i> View Expiry Report (Next 24h)
            </button>

            <button onclick="switchTab('users', this)" class="tab-btn">Registered Users</button>

<div class="stat-card">
    <i class="fas fa-users" style="color:#3498db; opacity:1;"></i>
    <div><h4 id="totalUsers">0</h4><p>Total Users</p></div>
</div>

<section id="usersSection" style="display: none; margin-top: 20px;">
    <h2 style="margin-bottom: 20px;">REGISTERED ACCOUNTS</h2>
    <div id="userList" style="display: grid; gap: 10px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        </div>
</section>
        </div>

        <div class="admin-search-bar" style="margin-bottom: 25px;">
            <input type="text" id="adminSearchInput" placeholder="Search by name, phone, or category..." 
                   style="width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #ddd; outline: none; font-size: 1rem;">
        </div>
         
        <div class="stats-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px;">
            <div class="stat-card"><i class="fas fa-boxes"></i><div><h4 id="totalItems">0</h4><p>Total Items</p></div></div>
            <div class="stat-card"><i class="fas fa-star" style="color:#f1c40f; opacity:1;"></i><div><h4 id="activeSponsors">0</h4><p>Active Sponsors</p></div></div>
            <div class="stat-card"><i class="fas fa-wallet"></i><div><h4 id="totalValue">0 ETB</h4><p>Market Value (Live)</p></div></div>
            <div class="stat-card" style="border-left: 5px solid #ff4757;">
                <i class="fas fa-headset" style="opacity: 0.5; color: #ff4757;"></i>
                <div><h4 id="pendingTickets">0</h4><p>Help Requests</p></div>
            </div>
        </div>

        <main>
            <h2 id="viewTitle" style="margin-bottom: 20px;">PENDING ITEMS</h2>
            <div id="adminGrid" class="masonry-wrapper"></div>
        </main>

        <section id="ticketsSection" style="margin-top: 60px; padding-top: 30px; border-top: 2px dashed #ccc;">
            <h2 style="margin-bottom: 20px;"><i class="fas fa-envelope-open-text"></i> Support Tickets</h2>
            <div id="ticketList" style="display: grid; gap: 15px;"></div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
       <script>
   let currentView = 'pending';

        // 1. Check if user is an Admin
        async function checkAdmin() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            const { data: profile } = await _supabase.from('profiles').select('is_admin').eq('id', user.id).single();
            if (!profile?.is_admin) {
                alert("Restricted Access: Admin Only.");
                window.location.href = 'index.html';
            }
        }

        // 2. Tab Switching Logic
        async function switchTab(status, btn) {
            currentView = status;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const adminGrid = document.getElementById('adminGrid');
            const usersSection = document.getElementById('usersSection');
            const viewTitle = document.getElementById('viewTitle');

            if (status === 'users') {
                adminGrid.style.display = 'none';
                viewTitle.style.display = 'none';
                usersSection.style.display = 'block';
                loadUsers();
            } else {
                adminGrid.style.display = 'grid';
                viewTitle.style.display = 'block';
                usersSection.style.display = 'none';
                viewTitle.innerText = status.toUpperCase() + " ITEMS";
                loadItems(status);
            }
        }

        // 3. LOAD REGISTERED USERS (The missing piece)
        async function loadUsers() {
            const list = document.getElementById('userList');
            list.innerHTML = "<p>Loading users...</p>";

            const { data: users, error } = await _supabase
                .from('profiles')
                .select('*')
                .order('created_at', { ascending: false });

            if (error || !users) {
                list.innerHTML = `<p style="color:red;">Error: ${error?.message || 'No profiles found'}</p>`;
                return;
            }

            list.innerHTML = `
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <tr style="border-bottom: 2px solid #eee; height: 40px;">
                        <th>Name</th>
                        <th>Email</th>
                        <th>Joined</th>
                        <th>Admin?</th>
                    </tr>
                    ${users.map(u => `
                        <tr style="border-bottom: 1px solid #f9f9f9; height: 50px;">
                            <td>${u.full_name || 'No Name'}</td>
                            <td>${u.email}</td>
                            <td>${new Date(u.created_at).toLocaleDateString()}</td>
                            <td>${u.is_admin ? '✅' : '❌'}</td>
                        </tr>
                    `).join('')}
                </table>`;
        }

        // 4. Load Global Stats
        async function loadStats() {
            const { count: total } = await _supabase.from('products').select('*', { count: 'exact', head: true });
            const { count: sponsors } = await _supabase.from('products').select('*', { count: 'exact', head: true }).eq('is_sponsored', true).gt('sponsored_until', new Date().toISOString());
            const { data: priceData } = await _supabase.from('products').select('price').eq('status', 'approved');
            const { count: tickets } = await _supabase.from('support_tickets').select('*', { count: 'exact', head: true }).eq('is_resolved', false);
            
            // FIX: Fetch the count from your profiles table
            const { count: userCount } = await _supabase.from('profiles').select('*', { count: 'exact', head: true });

            const marketValue = priceData?.reduce((sum, item) => sum + (item.price || 0), 0) || 0;
            
            document.getElementById('totalItems').innerText = total || 0;
            document.getElementById('activeSponsors').innerText = sponsors || 0;
            document.getElementById('totalValue').innerText = marketValue.toLocaleString() + " ETB";
            document.getElementById('pendingTickets').innerText = tickets || 0;
            
            // Update the User Stat Card
            document.getElementById('totalUsers').innerText = userCount || 0;
        }

        // --- Other functions (loadItems, updateStatus, etc.) ---
        // ... Keep your existing loadItems, updateStatus, and resolveTicket functions here ...

        window.onload = async () => { 
            await checkAdmin(); 
            loadStats(); 
            loadItems('pending'); 
            loadTickets(); 
        };
       </script>
</body>
</html>

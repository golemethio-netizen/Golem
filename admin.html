<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Approval | Golem</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background: #f0f2f5;">

    <header class="golem-header">
        <div class="logo">GOLEM ADMIN</div>
        <button class="signin-btn" onclick="location.href='index.html'">View Site</button>
    </header>

    <main class="container" style="padding: 20px;">
        <h2 style="margin-bottom: 20px;">Pending Approval</h2>
        <div id="adminGrid" class="masonry-wrapper">
            </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        async function loadPending() {
            const grid = document.getElementById('adminGrid');
            
            // 1. Fetch only pending items
            const { data: items, error } = await _supabase
                .from('products')
                .select('*')
                .eq('status', 'pending');

            if (error || items.length === 0) {
                grid.innerHTML = "<p>No items waiting for approval.</p>";
                return;
            }

            grid.innerHTML = items.map(item => `
                <div class="product-card" id="card-${item.id}">
                    <img src="${item.image}" style="width:100%">
                    <div class="product-info">
                        <h3>${item.name}</h3>
                        <p><strong>Price:</strong> ${item.price} ETB</p>
                        <p><strong>Phone:</strong> ${item.seller_phone}</p>
                        <p>${item.description}</p>
                        
                        <div style="display: flex; gap: 10px; margin-top: 15px;">
                            <button onclick="approveItem('${item.id}')" 
                                style="flex:1; background:#28a745; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">
                                Approve
                            </button>
                            <button onclick="rejectItem('${item.id}')" 
                                style="flex:1; background:#dc3545; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">
                                Reject
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function approveItem(id) {
            const { error } = await _supabase
                .from('products')
                .update({ status: 'approved' })
                .eq('id', id);

            if (!error) {
                document.getElementById(`card-${id}`).remove();
                alert("Item Approved!");
            }
        }

        async function rejectItem(id) {
            if (confirm("Delete this listing permanently?")) {
                const { error } = await _supabase
                    .from('products')
                    .delete()
                    .eq('id', id);

                if (!error) document.getElementById(`card-${id}`).remove();
            }
        }

        // Run on load
        loadPending();
    </script>
</body>
</html>

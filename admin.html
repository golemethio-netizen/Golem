<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Golem</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="admin-body">

    <nav>
        <div class="logo">GOLEM ADMIN</div>
        <div class="nav-right">
            <button onclick="location.href='index.html'" class="filter-btn">View Shop</button>
            <button onclick="handleSignOut()" class="login-btn">Logout</button>
        </div>
    </nav>

    <div class="admin-container" style="max-width: 1200px; margin: auto; padding: 20px;">
        <div class="stats-bar" style="display: flex; gap: 20px; margin-bottom: 30px;">
            <div class="stat-card" style="background: white; padding: 20px; border-radius: 10px; flex: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                <h4 style="margin:0; color: #666;">Pending Items</h4>
                <h2 id="pendingCount" style="margin: 5px 0 0; color: #ff4b2b;">0</h2>
            </div>
            <div class="stat-card" style="background: white; padding: 20px; border-radius: 10px; flex: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                <h4 style="margin:0; color: #666;">Total Approved</h4>
                <h2 id="approvedCount" style="margin: 5px 0 0; color: #28a745;">0</h2>
            </div>
        </div>

        <h3>Queue: Pending Approvals</h3>
        <hr style="border: 0; border-top: 1px solid #ddd; margin-bottom: 20px;">
        
        <div id="adminGrid" class="product-grid">
            </div>
    </div>

    <script src="config.js"></script>
    <script src="admin.js"></script>
</body>
</html>

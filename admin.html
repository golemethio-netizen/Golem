<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Admin - Golem</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Admin Approval Queue</h2>
    <div id="adminGrid" class="product-grid"></div>
    <script src="config.js"></script>
    <script>
        async function loadAdmin() {
            const { data: prods } = await _supabase.from('products').select('*').eq('status', 'pending');
            document.getElementById('adminGrid').innerHTML = prods.map(p => `
                <div class="product-card">
                    <img src="${p.image}">
                    <h3>${p.name}</h3>
                    <button onclick="setStatus('${p.id}', 'approved')" style="background:green">Approve</button>
                    <button onclick="setStatus('${p.id}', 'rejected')" style="background:red">Reject</button>
                </div>
            `).join('');
        }
        async function setStatus(id, s) {
            await _supabase.from('products').update({status: s}).eq('id', id);
            location.reload();
        }
        loadAdmin();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | WanaGebya</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f0f4f2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        /* ── Page wrapper ── */
        .auth-wrapper {
            width: 100%;
            max-width: 440px;
        }

        /* ── Card ── */
        .auth-card {
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.04), 0 20px 40px rgba(0,0,0,0.08);
        }

        /* ── Header / brand strip ── */
        .auth-header {
            background: #0A291A;
            padding: 32px 36px 28px;
            text-align: center;
        }
        .auth-logo {
            font-size: 26px;
            font-weight: 700;
            color: #F5A623;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
        }
        .auth-tagline {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.5px;
        }

        /* ── Tabs ── */
        .auth-tabs {
            display: flex;
            border-bottom: 1px solid #eef0ed;
        }
        .auth-tab {
            flex: 1;
            padding: 15px 10px;
            font-size: 13.5px;
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            cursor: pointer;
            border: none;
            background: transparent;
            color: #9ca3af;
            border-bottom: 2.5px solid transparent;
            transition: all 0.2s ease;
            outline: none;
        }
        .auth-tab:hover { color: #0A291A; }
        .auth-tab.active {
            color: #0A291A;
            border-bottom-color: #F5A623;
        }

        /* ── Body ── */
        .auth-body { padding: 28px 32px 32px; }

        /* ── Google button ── */
        .btn-google {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 11px 16px;
            background: #ffffff;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            color: #374151;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 20px;
        }
        .btn-google:hover {
            background: #f9fafb;
            border-color: #d1d5db;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .btn-google svg { flex-shrink: 0; }

        /* ── Divider ── */
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #eef0ed;
        }
        .auth-divider span {
            font-size: 12px;
            color: #9ca3af;
            white-space: nowrap;
        }

        /* ── Form fields ── */
        .form-field { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 11.5px;
            font-weight: 600;
            color: #6b7280;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 7px;
        }
        .form-input {
            width: 100%;
            padding: 11px 14px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            background: #fafafa;
            color: #111827;
            outline: none;
            transition: all 0.2s ease;
        }
        .form-input::placeholder { color: #c0c4cc; }
        .form-input:focus {
            border-color: #0A291A;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(10,41,26,0.07);
        }

        /* Password wrapper */
        .input-wrapper { position: relative; }
        .toggle-pw {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #9ca3af;
            padding: 4px;
            display: flex;
            align-items: center;
        }
        .toggle-pw:hover { color: #0A291A; }

        /* ── Forgot link ── */
        .forgot-row {
            text-align: right;
            margin-bottom: 20px;
            margin-top: -8px;
        }
        .forgot-link {
            font-size: 12.5px;
            color: #0A291A;
            text-decoration: none;
            opacity: 0.65;
        }
        .forgot-link:hover { opacity: 1; text-decoration: underline; }

        /* ── Primary button ── */
        .btn-primary {
            width: 100%;
            padding: 13px;
            background: #F5A623;
            color: #0A291A;
            border: none;
            border-radius: 10px;
            font-size: 14.5px;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 0.2px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-primary:hover { background: #e8971a; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Footer note ── */
        .auth-note {
            font-size: 12px;
            color: #9ca3af;
            text-align: center;
            margin-top: 18px;
            line-height: 1.7;
        }
        .auth-note a { color: #0A291A; opacity: 0.7; text-decoration: underline; }
        .auth-note a:hover { opacity: 1; }

        /* ── Toast notification ── */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: #0A291A;
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 13.5px;
            font-weight: 500;
            z-index: 9999;
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
            white-space: nowrap;
            max-width: 90vw;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { background: #dc2626; }
        .toast.success { background: #16a34a; }

        /* ── Loading spinner on button ── */
        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(10,41,26,0.3);
            border-top-color: #0A291A;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Slide animation for panel switch ── */
        .auth-panel {
            animation: fadeUp 0.25s ease forwards;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Back to site link ── */
        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 12.5px;
        }
        .back-link a {
            color: #0A291A;
            opacity: 0.55;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .back-link a:hover { opacity: 1; }

        /* ── Mobile ── */
        @media (max-width: 480px) {
            .auth-header { padding: 26px 24px 22px; }
            .auth-body   { padding: 22px 20px 26px; }
            .auth-logo   { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">

        <!-- Brand Header -->
        <div class="auth-header">
            <div class="auth-logo">WanaGebya</div>
            <div class="auth-tagline">Ethiopia's trusted marketplace</div>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
            <button class="auth-tab active" id="tabLogin"  onclick="switchTab('login')">Sign In</button>
            <button class="auth-tab"        id="tabSignup" onclick="switchTab('signup')">Create Account</button>
        </div>

        <div class="auth-body">

            <!-- Google OAuth button (shared, always visible) -->
            <button class="btn-google" id="googleBtn" onclick="signInWithGoogle()">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
                    <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
                    <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
                    <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.96L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </button>

            <div class="auth-divider"><span>or continue with email</span></div>

            <!-- ── LOGIN PANEL ── -->
            <div id="loginPanel" class="auth-panel">
                <div class="form-field">
                    <label class="form-label">Email Address</label>
                    <input class="form-input" type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-field">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper">
                        <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" style="padding-right:42px">
                        <button class="toggle-pw" onclick="togglePw('loginPassword', this)" tabindex="-1" aria-label="Show password">
                            <svg id="eyeLogin" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        </button>
                    </div>
                </div>
                <div class="forgot-row">
                    <a href="reset-password.html" class="forgot-link">Forgot password?</a>
                </div>
                <button class="btn-primary" id="loginBtn" onclick="handleLogin()">Sign In to WanaGebya</button>
                <p class="auth-note">
                    By signing in you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                </p>
            </div>

            <!-- ── SIGNUP PANEL ── -->
            <div id="signupPanel" class="auth-panel" style="display:none">
                <div class="form-field">
                    <label class="form-label">Full Name</label>
                    <input class="form-input" type="text" id="signupName" placeholder="Abebe Bekele" autocomplete="name">
                </div>
                <div class="form-field">
                    <label class="form-label">Email Address</label>
                    <input class="form-input" type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-field">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper">
                        <input class="form-input" type="password" id="signupPassword" placeholder="Minimum 6 characters" autocomplete="new-password" style="padding-right:42px">
                        <button class="toggle-pw" onclick="togglePw('signupPassword', this)" tabindex="-1" aria-label="Show password">
                            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        </button>
                    </div>
                </div>
                <button class="btn-primary" id="signupBtn" onclick="handleSignup()">Create My Account</button>
                <p class="auth-note">
                    A confirmation link will be sent to your email.<br>
                    Already have an account? <a href="#" onclick="switchTab('login'); return false;">Sign in here</a>
                </p>
            </div>

        </div><!-- /auth-body -->
    </div><!-- /auth-card -->

    <div class="back-link">
        <a href="index.html">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            Back to WanaGebya
        </a>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
    /* ── Tab switching ── */
    function switchTab(mode) {
        const isLogin = mode === 'login';
        document.getElementById('tabLogin').classList.toggle('active', isLogin);
        document.getElementById('tabSignup').classList.toggle('active', !isLogin);
        document.getElementById('loginPanel').style.display  = isLogin ? 'block' : 'none';
        document.getElementById('signupPanel').style.display = isLogin ? 'none'  : 'block';
        // re-trigger animation
        const panel = isLogin ? loginPanel : signupPanel;
        panel.style.animation = 'none';
        requestAnimationFrame(() => { panel.style.animation = ''; });
    }

    /* ── Password visibility toggle ── */
    function togglePw(inputId, btn) {
        const input = document.getElementById(inputId);
        const isText = input.type === 'text';
        input.type = isText ? 'password' : 'text';
        btn.innerHTML = isText
            ? `<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>`
            : `<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>`;
    }

    /* ── Toast helper ── */
    let toastTimer;
    function showToast(msg, type = 'default') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast ${type} show`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { t.classList.remove('show'); }, 3500);
    }

    /* ── Set button loading state ── */
    function setLoading(btnId, loading, label) {
        const btn = document.getElementById(btnId);
        btn.disabled = loading;
        btn.innerHTML = loading ? `<span class="spinner"></span> Please wait…` : label;
    }

    /* ── Google Sign In ── */
    async function signInWithGoogle() {
        const btn = document.getElementById('googleBtn');
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner" style="border-color:rgba(0,0,0,0.15);border-top-color:#374151"></span> Connecting…`;
        const { error } = await _supabase.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin + '/index.html' }
        });
        if (error) {
            showToast(error.message, 'error');
            btn.disabled = false;
            btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.96L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg> Continue with Google`;
        }
    }

    /* ── Email / Password Login ── */
    async function handleLogin() {
        const email    = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!email || !password) { showToast('Please fill in all fields', 'error'); return; }

        setLoading('loginBtn', true, '');
        const { error } = await _supabase.auth.signInWithPassword({ email, password });
        setLoading('loginBtn', false, 'Sign In to WanaGebya');

        if (error) {
            showToast(error.message, 'error');
        } else {
            showToast('Welcome back! Redirecting…', 'success');
            setTimeout(() => { window.location.href = 'index.html'; }, 1000);
        }
    }

    /* ── Sign Up ── */
    async function handleSignup() {
        const name     = document.getElementById('signupName').value.trim();
        const email    = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;

        if (!name || !email || !password) { showToast('Please fill in all fields', 'error'); return; }
        if (password.length < 6)          { showToast('Password must be at least 6 characters', 'error'); return; }

        setLoading('signupBtn', true, '');
        const { error } = await _supabase.auth.signUp({
            email,
            password,
            options: { data: { full_name: name } }
        });
        setLoading('signupBtn', false, 'Create My Account');

        if (error) {
            showToast(error.message, 'error');
        } else {
            showToast('✓ Check your email for a confirmation link!', 'success');
        }
    }

    /* ── Enter key support ── */
    document.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        const loginVisible = document.getElementById('loginPanel').style.display !== 'none';
        if (loginVisible) handleLogin();
        else handleSignup();
    });

    /* ── Redirect if already logged in ── */
    _supabase.auth.getSession().then(({ data: { session } }) => {
        if (session) window.location.href = 'index.html';
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Golem</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh; background: #f4f7f6;">

    <div class="auth-card" style="background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px;">
        <h2 id="authTitle" style="text-align: center; color: #ff4b2b;">Sign In</h2>
        
        <form id="authForm">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="submitBtn" class="main-btn">Login</button>
        </form>

        <div style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
            <p id="toggleText">Don't have an account? <a href="#" onclick="toggleAuth()">Sign Up</a></p>
            <p><a href="reset-password.html" style="color: #666;">Forgot Password?</a></p>
        </div>
    </div>
    <script src="config.js"></script>
    <script>
        let isLogin = true;

        function toggleAuth() {
            isLogin = !isLogin;
            document.getElementById('authTitle').innerText = isLogin ? 'Sign In' : 'Create Account';
            document.getElementById('submitBtn').innerText = isLogin ? 'Login' : 'Join Golem';
            document.getElementById('toggleText').innerHTML = isLogin ? 
                'Don\'t have an account? <a href="#" onclick="toggleAuth()">Sign Up</a>' : 
                'Already have an account? <a href="#" onclick="toggleAuth()">Sign In</a>';
        }

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (isLogin) {
                const { error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) alert(error.message);
                else window.location.href = 'index.html';
            } else {
                const { error } = await _supabase.auth.signUp({ email, password });
                if (error) alert(error.message);
                else alert("Check your email for the confirmation link!");
            }
        };
    </script>
</body>
</html>

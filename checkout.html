<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout | Golem</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav><div class="logo" onclick="location.href='index.html'">GOLEM</div></nav>
    
    <div class="container" style="padding: 20px; text-align: center;">
        <div id="itemDetail" class="product-card" style="max-width: 500px; margin: auto; float: none;">
            </div>
    </div>

    <script src="config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        async function loadDetail() {
            const { data: p } = await _supabase.from('products').select('*').eq('id', productId).single();
            if (!p) return;

            document.getElementById('itemDetail').innerHTML = `
                <img src="${p.image}" style="height: 300px;">
                <div class="product-info">
                    <h2>${p.name}</h2>
                    <p style="font-size: 1.5rem; color: #ff4b2b;">${p.price} ETB</p>
                    <hr>
                    <p>Contact Seller to Buy:</p>
                    <div class="checkout-btns">
                        <a href="https://wa.me/${p.whatsapp_number}?text=I am interested in ${p.name}" class="wa-btn" style="display:block; text-decoration:none; margin-bottom:10px;">Message on WhatsApp</a>
                        <a href="https://t.me/${p.telegram_username.replace('@','')}" class="tg-btn" style="display:block; text-decoration:none;">Message on Telegram</a>
                    </div>
                </div>
            `;
        }
        loadDetail();
    </script>
</body>
</html>

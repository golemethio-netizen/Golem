<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Golem</title>
    <link rel="stylesheet" href="style.css">


<meta property="og:title" content="Golem Marketplace">
<meta property="og:description" content="Buy and sell items easily on Golem.">
<meta property="og:image" content="https://grand-sawine-a63bc3.netlify.app/logo.png">
<meta property="og:type" content="website">

    
   
</head>
<body>
    <nav>
        <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">GOLEM</div>
    </nav>
    
    <div class="container" style="padding: 20px; text-align: center;">
        <div id="checkoutDetails" class="product-card" style="max-width: 500px; margin: auto;">
            <p>Gathering item details...</p>
        </div>
    </div>

   
    <script>
        async function loadProductDetails() {
            const display = document.getElementById('checkoutDetails');
            
            // 1. Get ID from the URL bar (e.g., checkout.html?id=123)
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');

            if (!productId) {
                display.innerHTML = "<h3>Product not found.</h3><a href='index.html'>Back to Shop</a>";
                return;
            }

            // 2. Fetch specific product from Supabase
            const { data: p, error } = await _supabase
                .from('products')
                .select('*')
                .eq('id', productId)
                .single();

            if (error || !p) {
                display.innerHTML = "<h3>Error loading product.</h3>";
                return;
            }

            // 3. Display the data
           // Inside your loadProductDetails function in checkout.html
// The final render part of loadProductDetails
display.innerHTML = `
    <img src="${p.image}" class="detail-img">
    <div class="product-info">
        <h2>${p.name}</h2>
        <p class="price-large">${p.price} ETB</p>
        
        <div class="contact-grid">
            <a href="tel:${p.phone_number}" class="btn-call">📞 Call Seller</a>
            <a href="https://wa.me/${p.whatsapp_number}" class="btn-wa">💬 WhatsApp</a>
        </div>

        <div class="safety-box">
            <h4>🛡️ Golem Safety Tips</h4>
            <ul>
                <li>Meet in a safe, public location.</li>
                <li>Verify the item's condition in person.</li>
                <li>Avoid advance payments at all costs.</li>
            </ul>
        </div>
        
        <div class="share-row">
            <button onclick="window.open('https://t.me/share/url?url='+encodeURIComponent(window.location.href))">Share to Telegram</button>
        </div>
    </div>
`;

                // Add this inside the innerHTML template in checkout.html
<div class="share-section" style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee;">
    <p style="font-size: 0.8rem; color: #666; margin-bottom: 10px;">Share this item:</p>
    <div style="display: flex; justify-content: center; gap: 15px;">
        <a href="https://t.me/share/url?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent('Check out this ' + p.name + ' on Golem!')}" 
           target="_blank" style="text-decoration: none;">
           <div style="background: #0088cc; color: white; padding: 10px 15px; border-radius: 5px; font-size: 0.9rem;">
              ✈️ Telegram
           </div>
        </a>

        <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}" 
           target="_blank" style="text-decoration: none;">
           <div style="background: #3b5998; color: white; padding: 10px 15px; border-radius: 5px; font-size: 0.9rem;">
              🔵 Facebook
           </div>
        </a>
    </div>
</div>
            `;
        }

        // Run the function when the page loads
        document.addEventListener('DOMContentLoaded', loadProductDetails);
    
    </script>

     <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="./config.js"></script>

<script src="./script.js"></script>
</body>
</html>

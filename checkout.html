    <div class="container" style="padding: 20px; text-align: center;">

    <script>
        async function loadProductDetails() {
            const display = document.getElementById('checkoutDetails');
            
            // 1. Get ID from the URL bar (e.g., checkout.html?id=123)
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');

            if (!productId) {
                display.innerHTML = "<h3>Product not found.</h3><a href='index.html'>Back to Shop</a>";
                return;
            }

            // 2. Fetch specific product from Supabase
            const { data: p, error } = await _supabase
                .from('products')
                .select('*')
                .eq('id', productId)
                .single();

            if (error || !p) {
                display.innerHTML = "<h3>Error loading product.</h3>";
                return;
            }


function shareToTelegram() {
    const text = encodeURIComponent(`Check this out on Golem: ${window.location.href}`);
    window.open(`https://t.me/share/url?url=${window.location.href}&text=${text}`, '_blank');
}

function shareToWhatsApp() {
    const text = encodeURIComponent(`Check this out on Golem: ${window.location.href}`);
    window.open(`https://wa.me/?text=${text}`, '_blank');
}

async function incrementViews(productId, currentViews) {
    await _supabase
        .from('products')
        .update({ views: currentViews + 1 })
        .eq('id', productId);
}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Africa Village Loan Form | የብድር መጠየቂያ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        :root { --primary-color: #2563eb; --bg-color: #f8fafc; --card-bg: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .form-container { background: var(--card-bg); width: 100%; max-width: 800px; padding: 40px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        h2 { color: #1e293b; border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; }
        .section-title { font-size: 1.1rem; font-weight: bold; color: var(--primary-color); margin: 25px 0 15px 0; text-transform: uppercase; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: #475569; }
        input, select { padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; }
        .full-width { grid-column: 1 / -1; }
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #f1f5f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .btn-submit { margin-top: 30px; padding: 15px; width: 100%; background-color: var(--primary-color); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-submit:disabled { background-color: #94a3b8; }
        .status-msg { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; text-align: center; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Loan Registration Form</h2>
    
    <form id="loanForm">
        <div class="section-title">Personal Information</div>
        <div class="form-grid">
            <div class="form-group"><label>First Name</label><input type="text" id="firstName" required></div>
            <div class="form-group"><label>Father's Name</label><input type="text" id="fatherName" required></div>
            <div class="form-group"><label>Grandfather's Name</label><input type="text" id="grandFatherName" required></div>
            <div class="form-group"><label>Mother's Name</label><input type="text" id="motherName" required></div>
            <div class="form-group">
                <label>Gender</label>
                <select id="gender" required>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="section-title">Employment Information</div>
        <div class="form-grid">
             <div class="form-group full-width"><label>Nationality</label><input type="text" id="orgAddress" required></div>
            <div class="form-group"><label>address</label><input type="text" id="orgName" required></div>
            <div class="form-group"><label>Monthly Net Salary (ETB)</label><input type="number" id="monthlySalary" required></div>
            <div class="form-group"><label>Region</label><input type="tel" id="orgPhone" required></div>
            <div class="form-group"><label> City</label><input type="text" id="pensionNumber" required></div>
            <div class="form-group full-width"><label>Sub City</label><input type="text" id="orgAddress" required></div>
            <div class="form-group"><label> Woreda</label><input type="text" id="pensionNumber" required></div>
            <div class="form-group full-width"><label>House Number</label><input type="text" id="orgAddress" required></div>
        
            <div class="form-group"><label>Birthday</label><input type="date" id="birthday" required></div>
            <div class="form-group"><label>Personal active  Phone number</label><input type="tel" id="phoneNumber" required></div>
            <div class="form-group"><label>Phone Number 2</label><input type="tel" id="phoneNumber2" required></div>
             <div class="form-group"><label>Digital Sig</label><input type="file" id="natIdFront" accept="image/*" required></div>
            <div class="form-group"><label>Pesonal Photo</label><input type="file" id="natIdFront" accept="image/*" required></div>
        </div>
<div class="section-title">Personal Information</div>
        <div class="form-grid">
            <div class="form-group"><label>Full  Name</label><input type="text" id="firstName" required></div>
            <div class="form-group"><label>Adders</label><input type="text" id="fatherName" required></div>
            <div class="form-group"><label> Phone number</label><input type="text" id="grandFatherName" required></div>
            iv class="form-group"><label> ID </label><input type="file" id="empIdFront" accept="image/*" required></div>
            <div class="form-group">
                <label>Gender</label>
                <select id="gender" required>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
        <div class="section-title">Loan Details</div>
        <div class="form-grid">
            <div class="form-group">
                <label>Requested Loan Amount (ETB)</label>
                <input type="number" id="loanAmount" placeholder="e.g. 10000" required min="500" oninput="calculateRepayment()">
            </div>
            <div class="form-group">
                <label>Loan Duration (Days)</label>
                <select id="loanDuration" required onchange="calculateRepayment()">
                    <option value="7">7 Days</option>
                    <option value="30">30 Days</option>
                    <option value="60">60 Days</option>
                    <option value="90">90 Days</option>
                </select>
            </div>
        </div>

        <div id="repaymentSummary" style="margin-top: 15px; padding: 15px; background: #f0fdf4; border-radius: 8px; border: 1px solid #bbf7d0; display: none;">
            <h4 style="margin: 0 0 10px 0; color: #166534; font-size: 0.9rem;">Repayment Summary</h4>
            <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 5px;">
                <span>Principal:</span> <span id="summaryPrincipal" style="font-weight: 600;">0.00 ETB</span>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 5px;">
                <span>Fees & Interest:</span> <span id="summaryFees" style="font-weight: 600; color: #dc2626;">0.00 ETB</span>
            </div>
            <hr style="border: 0; border-top: 1px solid #bbf7d0; margin: 10px 0;">
            <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1rem;">
                <span>Total Repayable:</span> <span id="summaryTotal">0.00 ETB</span>
            </div>
        </div>

        <div class="section-title">Employment Information</div>
        <div class="form-grid">
            <div class="form-group"><label>Organization Name</label><input type="text" id="orgName" required></div>
              <div class="form-group"><label>Job title</label><input type="text" id="orgName" required></div>
              <div class="form-group"><label>Employment Type</label><input type="text" id="orgName" required></div>
            <div class="form-group"><label>Growth salary (ETB)</label><input type="number" id="monthlySalary" required></div>
            <div class="form-group"><label>Monthly Net Salary (ETB)</label><input type="number" id="monthlySalary" required></div>
            <div class="form-group"><label>Organization Phone</label><input type="tel" id="orgPhone" required></div>
            <div class="form-group"><label>Pension Number</label><input type="text" id="pensionNumber" required></div>
            <div class="form-group full-width"><label>Organization Address</label><input type="text" id="orgAddress" required></div>
        </div>

        <div class="section-title">Required Documents</div>
        
        <label>ID Cards (Front & Back)</label>
        <div class="upload-grid">
            <div class="form-group"><label>National ID (FID)</label><input type="text" id="nationalIDNum" required></div>
            <div class="form-group"><label>National ID Front</label><input type="file" id="natIdFront" accept="image/*" required></div>
            <div class="form-group"><label>National ID Back</label><input type="file" id="natIdBack" accept="image/*" required></div>
            <div class="form-group"><label>Employee ID Front</label><input type="file" id="empIdFront" accept="image/*" required></div>
            <div class="form-group"><label>Employee ID Back</label><input type="file" id="empIdBack" accept="image/*" required></div>
        </div>

        <label>Employment Documents</label>
        <div class="upload-grid">
            <div class="form-group"><label>Employment Letter</label><input type="file" id="empLetter" accept="image/*,application/pdf" required></div>
            <div class="form-group"><label>Personal Photo</label><input type="file" id="userPhoto" accept="image/*" required></div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Submit Loan Request</button>
        <div id="statusMsg" class="status-msg"></div>
    </form>
</div>

<script>
    const form = document.getElementById('loanForm');
    const statusMsg = document.getElementById('statusMsg');

    async function uploadDoc(file, folder, userId) {
        if (!file || !file.name) return null;
        const fileExt = file.name.split('.').pop();
        const fileName = `${userId}/${folder}-${Date.now()}.${fileExt}`;
        const { data, error } = await _supabase.storage.from('kyc-docs').upload(fileName, file);
        if (error) throw error;
        return data.path;
    }

    function calculateRepayment() {
        const amount = parseFloat(document.getElementById('loanAmount').value);
        const duration = document.getElementById('loanDuration').value;
        const summaryBox = document.getElementById('repaymentSummary');
        if (isNaN(amount) || amount <= 0) { summaryBox.style.display = "none"; return; }

        let interestRate = 0.17;
        if (duration === '30') interestRate = 0.00;
        else if (duration === '60') interestRate = 0.18;
        else if (duration === '90') interestRate = 0.18;

        const fees = amount * (interestRate + 0.06); // +6% for infra/other
        const total = amount + fees;

        summaryBox.style.display = "block";
        document.getElementById('summaryPrincipal').innerText = amount.toLocaleString() + " ETB";
        document.getElementById('summaryFees').innerText = fees.toLocaleString() + " ETB";
        document.getElementById('summaryTotal').innerText = total.toLocaleString() + " ETB";
    }

    form.onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Uploading documents...";

        try {
            // For testing purposes, we'll use a placeholder if not logged in
            let userId = "anonymous_test";
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) userId = user.id;

            // Upload 6 documents now
            const [natF, natB, empF, empB, letter, photo] = await Promise.all([
                uploadDoc(document.getElementById('natIdFront').files[0], 'nat_front', userId),
                uploadDoc(document.getElementById('natIdBack').files[0], 'nat_back', userId),
                uploadDoc(document.getElementById('empIdFront').files[0], 'emp_front', userId),
                uploadDoc(document.getElementById('empIdBack').files[0], 'emp_back', userId),
                uploadDoc(document.getElementById('empLetter').files[0], 'employment_letter', userId),
                uploadDoc(document.getElementById('userPhoto').files[0], 'passport_photo', userId)
            ]);

            const { error: dbError } = await _supabase.from('loan_applications').insert([{
                user_id: user ? user.id : null,
                first_name: document.getElementById('firstName').value,
                father_name: document.getElementById('fatherName').value,
                grandfather_name: document.getElementById('grandFatherName').value,
                mother_name: document.getElementById('motherName').value,
                gender: document.getElementById('gender').value,
                birthday: document.getElementById('birthday').value,
                phone_number: document.getElementById('phoneNumber').value,
                phone_number_2: document.getElementById('phoneNumber2').value,
                loan_amount: document.getElementById('loanAmount').value,
               
                org_name: document.getElementById('orgName').value,
                monthly_salary: document.getElementById('monthlySalary').value,
                pension_number: document.getElementById('pensionNumber').value,
                org_phone: document.getElementById('orgPhone').value,
                org_address: document.getElementById('orgAddress').value,
                national_id_number: document.getElementById('nationalIDNum').value,
                total_repayable: parseFloat(document.getElementById('summaryTotal').innerText.replace(/,/g, '')),
                nat_id_front: natF, nat_id_back: natB,
                emp_id_front: empF, emp_id_back: empB,
                employment_letter: letter,
                personal_photo: photo,
                status: 'pending'
            }]);

            if (dbError) throw dbError;

            statusMsg.style.display = "block";
            statusMsg.style.backgroundColor = "#dcfce7";
            statusMsg.innerText = "Application Submitted Successfully!";
            form.reset();
            document.getElementById('repaymentSummary').style.display = "none";

        } catch (err) {
            statusMsg.style.display = "block";
            statusMsg.style.backgroundColor = "#fee2e2";
            statusMsg.innerText = "Error: " + err.message;
        } finally {
            btn.disabled = false;
            btn.innerText = "Submit Loan Request";
        }
    };
</script>
</body>
</html>

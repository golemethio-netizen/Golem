<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Africa Village | Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --text: #1e293b; --success: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 12px; border-bottom: 2px solid #e2e8f0; font-size: 0.85rem; color: #64748b; text-transform: uppercase; }
        td { padding: 15px 12px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; text-transform: capitalize; }
        .pending { background: #fef3c7; color: #92400e; }
        
        /* Modal Detail Layout */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 95%; max-width: 900px; margin: 30px auto; padding: 30px; border-radius: 12px; max-height: 90vh; overflow-y: auto; position: relative; }
        
        .info-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 25px; border-bottom: 1px solid #e2e8f0; padding-bottom: 20px; }
        .info-group h4 { margin: 0 0 10px 0; color: var(--primary); font-size: 0.9rem; text-transform: uppercase; }
        .info-item { margin-bottom: 8px; font-size: 0.9rem; }
        .info-item span { font-weight: bold; color: #64748b; }

        .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 15px; }
        .doc-item { border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; text-align: center; background: #f8fafc; }
        .doc-item img { width: 100%; height: 120px; object-fit: contain; background: white; border-radius: 4px; margin-bottom: 8px; }
        
        .btn { padding: 10px 20px; border-radius: 6px; cursor: pointer; border: none; font-weight: 600; text-decoration: none; display: inline-block; transition: 0.2s; }
        .btn-view { background: var(--primary); color: white; }
        .btn-download { background: var(--success); color: white; width: 100%; font-size: 0.8rem; box-sizing: border-box; }
        .close-modal { position: absolute; right: 20px; top: 20px; cursor: pointer; font-size: 1.8rem; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Loan Administration</h1>
        <button onclick="fetchApplications()" class="btn btn-view">Refresh Data</button>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Applicant</th>
                    <th>Loan Amount</th>
                    <th>Duration</th>
                    <th>Repayable</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="appTableBody"></tbody>
        </table>
    </div>
</div>

<div id="detailsModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h2 style="margin-top:0">Application Review</h2>
        
        <div id="modalBody">
            </div>

        <h3>Required Documents</h3>
        <div class="doc-grid" id="modalDocs"></div>
    </div>
</div>

<script>
    async function fetchApplications() {
        const { data, error } = await _supabase
            .from('loan_applications')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) return alert("Error: " + error.message);

        document.getElementById('appTableBody').innerHTML = data.map(app => `
            <tr>
                <td><strong>${app.first_name} ${app.father_name}</strong></td>
                <td>${Number(app.loan_amount).toLocaleString()} ETB</td>
                <td>${app.loan_duration} Days</td>
                <td><span style="color:#dc2626; font-weight:bold">${Number(app.total_repayable).toLocaleString()} ETB</span></td>
                <td><span class="status-badge ${app.status}">${app.status}</span></td>
                <td><button onclick='viewDetails(${JSON.stringify(app)})' class="btn btn-view">Preview All</button></td>
            </tr>
        `).join('');
    }

    async function viewDetails(app) {
        const modalBody = document.getElementById('modalBody');
        const modalDocs = document.getElementById('modalDocs');
        
        // 1. Fill Text Information
        modalBody.innerHTML = `
            <div class="info-section">
                <div class="info-group">
                    <h4>Personal Information</h4>
                    <div class="info-item"><span>Full Name:</span> ${app.first_name} ${app.father_name} ${app.grandfather_name}</div>
                    <div class="info-item"><span>Mother's Name:</span> ${app.mother_name}</div>
                    <div class="info-item"><span>Gender:</span> ${app.gender} | <span>DOB:</span> ${app.birthday}</div>
                    <div class="info-item"><span>Phones:</span> ${app.phone_number}, ${app.phone_number_2}</div>
                </div>
                <div class="info-group">
                    <h4>Employment Info</h4>
                    <div class="info-item"><span>Company:</span> ${app.org_name}</div>
                    <div class="info-item"><span>Net Salary:</span> ${Number(app.monthly_salary).toLocaleString()} ETB</div>
                    <div class="info-item"><span>Pension No:</span> ${app.pension_number || 'N/A'}</div>
                    <div class="info-item"><span>Work Phone:</span> ${app.org_phone}</div>
                </div>
                <div class="info-group">
                    <h4>Loan Request</h4>
                    <div class="info-item"><span>Principal:</span> ${Number(app.loan_amount).toLocaleString()} ETB</div>
                    <div class="info-item"><span>Duration:</span> ${app.loan_duration} Days</div>
                    <div class="info-item"><span>Total Due:</span> ${Number(app.total_repayable).toLocaleString()} ETB</div>
                    <div class="info-item"><span>National ID:</span> ${app.national_id_number}</div>
                </div>
            </div>
        `;

        // 2. Fetch Signed URLs for Documents
        const docList = [
            { label: 'National ID (Front)', path: app.nat_id_front },
            { label: 'National ID (Back)', path: app.nat_id_back },
            { label: 'Employee ID (Front)', path: app.emp_id_front },
            { label: 'Employee ID (Back)', path: app.emp_id_back },
            { label: 'Employment Letter', path: app.employment_letter },
            { label: 'Personal Photo', path: app.personal_photo }
        ];

        modalDocs.innerHTML = "Generating secure previews...";

        const docCards = await Promise.all(docList.map(async (doc) => {
            if (!doc.path) return '';
            
            // Get secure 5-minute link
            const { data, error } = await _supabase.storage
                .from('kyc-docs')
                .createSignedUrl(doc.path, 300);

            const url = error ? '#' : data.signedUrl;
            return `
                <div class="doc-item">
                    <p style="font-size:0.75rem; margin-top:0"><strong>${doc.label}</strong></p>
                    <img src="${url}" onerror="this.src='https://via.placeholder.com/150?text=No+Preview'">
                    <a href="${url}" target="_blank" class="btn btn-download">Open File</a>
                </div>
            `;
        }));

        modalDocs.innerHTML = docCards.join('');
        document.getElementById('detailsModal').style.display = "block";
    }

    function closeModal() {
        document.getElementById('detailsModal').style.display = "none";
    }

    window.onclick = (event) => {
        if (event.target == document.getElementById('detailsModal')) closeModal();
    }

    fetchApplications();
</script>

</body>
</html>

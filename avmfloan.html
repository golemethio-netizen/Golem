<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Registration Form | የብድር መጠየቂያ ቅፅ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .form-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 800px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h2 { color: #1e293b; border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; }

        .section-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 25px 0 15px 0;
            text-transform: uppercase;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: #475569; }
        input, select { padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; }
        .full-width { grid-column: 1 / -1; }

        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
        }

        .btn-submit {
            margin-top: 30px;
            padding: 15px;
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-submit:disabled { background-color: #94a3b8; }

        .status-msg {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Loan Registration Form</h2>
    
    <form id="loanForm">
        <div class="section-title">Personal Information</div>
        <div class="form-grid">
            <div class="form-group"><label>First Name</label><input type="text" id="firstName" required></div>
            <div class="form-group"><label>Father's Name</label><input type="text" id="fatherName" required></div>
            <div class="form-group"><label>Grandfather's Name</label><input type="text" id="grandFatherName" required></div>
            <div class="form-group"><label>Mother's Name</label><input type="text" id="motherName" required></div>
            <div class="form-group">
                <label>Gender</label>
                <select id="gender" required>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="form-group"><label>Birthday</label><input type="date" id="birthday" required></div>
            <div class="form-group"><label>Phone Number 1</label><input type="tel" id="phoneNumber" required></div>
            <div class="form-group"><label>Phone Number 2</label><input type="tel" id="phoneNumber2" required></div>


 <div class="form-grid" style="margin-top: 20px;">
    <div class="form-group">
        <label>Requested Loan Amount (ETB)</label>
        <input type="number" id="loanAmount" placeholder="e.g. 10000" required min="500" oninput="calculateRepayment()">
    </div>
    <div class="form-group">
        <label>Loan Duration (Days)</label>
        <select id="loanDuration" required onchange="calculateRepayment()">
            <option value="7">7 Days</option>
            <option value="30">30 Days</option>
            <option value="60">60 Days</option>
            <option value="90">90 Days</option>
        </select>
    </div>
</div>

<div id="repaymentSummary" style="margin-top: 15px; padding: 15px; background: #f0fdf4; border-radius: 8px; border: 1px solid #bbf7d0; display: none;">
    <h4 style="margin: 0 0 10px 0; color: #166534; font-size: 0.9rem;">Africa Village Repayment Summary</h4>
    
    <div style="display: flex; justify-content: space-between; font-size: 0.85rem; color: #374151; margin-bottom: 5px;">
        <span>Principal Amount:</span> 
        <span id="summaryPrincipal" style="font-weight: 600;">0.00 ETB</span>
    </div>
    
    <div style="display: flex; justify-content: space-between; font-size: 0.85rem; color: #374151; margin-bottom: 5px;">
        <span>Interest & Service Fees:</span> 
        <span id="summaryFees" style="font-weight: 600; color: #dc2626;">0.00 ETB</span>
    </div>

    <hr style="border: 0; border-top: 1px solid #bbf7d0; margin: 10px 0;">
    
    <div style="display: flex; justify-content: space-between; font-weight: bold; color: #111827; font-size: 1rem;">
        <span>Total Repayable:</span> 
        <span id="summaryTotal">0.00 ETB</span>
    </div>
    
    <p style="font-size: 0.7rem; color: #6b7280; margin-top: 10px; font-style: italic;">
        *Includes Interest, 2% Infrastructure, and 2% Admin fees.
    </p>
</div>
            
        </div>

        <div class="section-title">Employment Information</div>
        <div class="form-grid">
            <div class="form-group"><label>Organization Name</label><input type="text" id="orgName" required></div>
            <div class="form-group"><label>Monthly Net Salary (ETB)</label><input type="number" id="monthlySalary" required></div>
            <div class="form-group"><label>Organization Phone</label><input type="tel" id="orgPhone" required></div>
            <div class="form-group full-width"><label>Organization Address</label><input type="text" id="orgAddress" required></div>
        </div>

        <div class="section-title">Identification Documents (Photos)</div>
        
        <label>National ID Photos (Front & Back)</label>
        <div class="upload-grid" style="margin-bottom: 20px;">
            <div class="form-group"><label>National ID Number</label><input type="text" id="nationalIDNum" required></div>
            <div class="form-group"><label>National ID Front</label><input type="file" id="natIdFront" accept="image/*" required></div>
            <div class="form-group"><label>National ID Back</label><input type="file" id="natIdBack" accept="image/*" required></div>
        </div>

        <label>Employee ID Photos (Front & Back)</label>
        <div class="upload-grid">
            <div class="form-group"><label>Employee ID Front</label><input type="file" id="empIdFront" accept="image/*" required></div>
            <div class="form-group"><label>Employee ID Back</label><input type="file" id="empIdBack" accept="image/*" required></div>
        </div>

       

        <button type="submit" class="btn-submit" id="submitBtn">Submit Loan Request</button>
        <div id="statusMsg" class="status-msg"></div>
    </form>
</div>

<script>
    const form = document.getElementById('loanForm');
    const statusMsg = document.getElementById('statusMsg');

    // Helper function to upload files
    async function uploadDoc(file, folder, userId) {
        if (!file || !file.name) return null;
        const fileExt = file.name.split('.').pop();
        const fileName = `${userId}/${folder}-${Date.now()}.${fileExt}`;
        const { data, error } = await _supabase.storage.from('kyc-docs').upload(fileName, file);
        if (error) throw error;
        return data.path;
    }

    // Function to calculate interest on the fly
    function calculateRepayment() {
        const amount = parseFloat(document.getElementById('loanAmount').value);
        const duration = document.getElementById('loanDuration').value;
        const summaryBox = document.getElementById('repaymentSummary');
        
        if (isNaN(amount) || amount <= 0) {
            summaryBox.style.display = "none";
            return;
        }

        // Fixed Rates (Infrastructure 2% + Other 2%)
        const fixedFeesRate = 0.04; 
        let interestRate = 0;

        switch (duration) {
            case '7':   interestRate = 0.17; break;
            case '30':  interestRate = 0.20; break;
            case '60':  interestRate = 0.24; break;
            case '90':  interestRate = 0.27; break;
            default:    interestRate = 0.17;
        }

        const totalRate = interestRate + fixedFeesRate;
        const fees = amount * totalRate;
        const totalRepay = amount + fees;

        summaryBox.style.display = "block";
        document.getElementById('summaryPrincipal').innerText = amount.toLocaleString() + " ETB";
        document.getElementById('summaryFees').innerText = fees.toLocaleString() + " ETB";
        document.getElementById('summaryTotal').innerText = totalRepay.toLocaleString() + " ETB";
    }

    form.onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Uploading Photos...";

        try {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) throw new Error("Please log in first.");

            // Upload all 4 photos
            const [natFront, natBack, empFront, empBack] = await Promise.all([
                uploadDoc(document.getElementById('natIdFront').files[0], 'nat_front', user.id),
                uploadDoc(document.getElementById('natIdBack').files[0], 'nat_back', user.id),
                uploadDoc(document.getElementById('empIdFront').files[0], 'emp_front', user.id),
                uploadDoc(document.getElementById('empIdBack').files[0], 'emp_back', user.id)
            ]);

            // Save to database
            const { error: dbError } = await _supabase.from('loan_applications').insert([{
                user_id: user.id,
                first_name: document.getElementById('firstName').value,
                father_name: document.getElementById('fatherName').value,
                grandfather_name: document.getElementById('grandFatherName').value,
                mother_name: document.getElementById('motherName').value,
                gender: document.getElementById('gender').value,
                birthday: document.getElementById('birthday').value,
                phone_number: document.getElementById('phoneNumber').value,
                phone_number_2: document.getElementById('phoneNumber2').value,
                org_name: document.getElementById('orgName').value,
                monthly_salary: document.getElementById('monthlySalary').value,
                loan_amount: document.getElementById('loanAmount').value,
                org_phone: document.getElementById('orgPhone').value,
                org_address: document.getElementById('orgAddress').value,
                loan_duration: document.getElementById('loanDuration').value,
                national_id_number: document.getElementById('nationalIDNum').value,
                total_repayable: parseFloat(document.getElementById('summaryTotal').innerText.replace(/,/g, '')),
                interest_applied: document.getElementById('loanDuration').value,
                nat_id_front: natFront,
                nat_id_back: natBack,
                emp_id_front: empFront,
                emp_id_back: empBack,
                status: 'pending'
            }]);

            if (dbError) throw dbError;

            statusMsg.style.display = "block";
            statusMsg.style.backgroundColor = "#dcfce7";
            statusMsg.style.color = "#166534";
            statusMsg.innerText = "Application Submitted Successfully!";
            form.reset();
            document.getElementById('repaymentSummary').style.display = "none";

        } catch (err) {
            statusMsg.style.display = "block";
            statusMsg.style.backgroundColor = "#fee2e2";
            statusMsg.style.color = "#991b1b";
            statusMsg.innerText = "Error: " + err.message;
        } finally {
            btn.disabled = false;
            btn.innerText = "Submit Loan Request";
        }
    };
</script>
</body>
</html>

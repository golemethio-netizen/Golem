
<div class="kyc-container" style="padding: 20px;">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2>🏦 LOAN & KYC CONTROL CENTER</h2>
        <div class="kyc-stats" style="display: flex; gap: 20px;">
            <div class="stat-box"><strong>Pending Apps:</strong> <span id="pendingLoans">0</span></div>
            <div class="stat-box"><strong>Total Disbursed:</strong> <span id="disbursedAmount">0 ETB</span></div>
        </div>
    </header>

    <div class="filter-tabs" style="margin-bottom: 20px;">
        <button onclick="loadLoans('pending')" class="tab-btn active">New Applications</button>
        <button onclick="loadLoans('under_review')">Under Credit Review</button>
        <button onclick="loadLoans('approved')">Approved Loans</button>
    </div>

    <div id="kycTableWrapper" style="background: white; border-radius: 12px; overflow-x: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        <table style="width: 100%; border-collapse: collapse; min-width: 800px;">
            <thead style="background: #f8f9fa; border-bottom: 2px solid #eee;">
                <tr>
                    <th style="padding: 15px; text-align: left;">Borrower</th>
                    <th>Requested Amount</th>
                    <th>ID Document</th>
                    <th>Risk Level</th>
                    <th style="text-align: right; padding-right: 15px;">Actions</th>
                </tr>
            </thead>
            <tbody id="loanList">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>
    // --- 1. SECURITY CHECK (Run immediately) ---
    async function checkKYCPermissions() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) {
            window.location.href = 'login.html';
            return;
        }

        const { data: profile } = await _supabase
            .from('profiles')
            .select('role')
            .eq('id', user.id)
            .single();

        // If not a KYC officer or Super Admin, kick them out
        if (profile?.role !== 'kyc_officer' && profile?.role !== 'super_admin') {
            alert("Unauthorized Access!");
            window.location.href = 'admin-market.html'; 
        }
    }

    // --- 2. DATA LOADING FUNCTION ---
    async function loadLoans(status = 'pending') {
        const list = document.getElementById('loanList');
        list.innerHTML = "<tr><td colspan='5'>Loading applications...</td></tr>";

        const { data: loans, error } = await _supabase
            .from('loan_applications')
            .select(`
                *,
                profiles:user_id (full_name, phone, email)
            `)
            .eq('status', status)
            .order('created_at', { ascending: false });

        if (error) {
            console.error(error);
            return;
        }

        list.innerHTML = loans.map(loan => `
            <tr>
                <td style="padding:15px;">
                    <strong>${loan.profiles?.full_name || 'Unknown'}</strong><br>
                    <small>${loan.profiles?.phone || 'No Phone'}</small>
                </td>
                <td>${loan.amount.toLocaleString()} ETB</td>
                <td>
                    <button onclick="viewSecureID('${loan.kyc_url}')" style="cursor:pointer;">
                        View Document
                    </button>
                </td>
                <td><span class="status-pill">${loan.status}</span></td>
                <td style="text-align:right;">
                    <button onclick="updateLoanStatus('${loan.id}', 'approved')" class="btn-approve">Approve</button>
                    <button onclick="updateLoanStatus('${loan.id}', 'rejected')" class="btn-reject">Reject</button>
                </td>
            </tr>
        `).join('');
    }

    // --- 3. SECURE VIEW FUNCTION ---
    // This generates a temporary link so the ID isn't public forever
    async function viewSecureID(path) {
        const { data, error } = await _supabase.storage
            .from('kyc-docs')
            .createSignedUrl(path, 60); // Link expires in 60 seconds

        if (data) window.open(data.signedUrl, '_blank');
    }

    // --- 4. INITIALIZE PAGE ---
    window.onload = async () => {
        await checkKYCPermissions();
        loadLoans('pending'); // Default view
    };
</script>

                
                </tbody>
        </table>
    </div>
</div>

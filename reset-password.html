<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Golem</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container" style="max-width:400px; margin-top:100px; text-align:center;">
        <h2>Set New Password</h2>
        <input type="password" id="newPassword" placeholder="Enter new password" style="width:100%; padding:10px; margin:10px 0;">
        <button onclick="updatePassword()" class="main-btn" style="width:100%;">Update Password</button>
    </div>

    <script src="config.js"></script>
    <script>
        async function updatePassword() {
            const newPassword = document.getElementById('newPassword').value;
            if (newPassword.length < 6) return alert("Password must be 6+ characters");

            const { error } = await _supabase.auth.updateUser({ password: newPassword });

            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("Password updated successfully! You can now login.");
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>

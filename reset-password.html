<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Golem</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh; background: #f4f7f6; margin: 0;">

    <div class="auth-card" style="background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center;">
        <h2 style="color: #007bff; margin-bottom: 10px;">Forgot Password?</h2>
        <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">Enter your email and we'll send you a link to get back into your account.</p>
        
        <form id="resetForm">
            <input type="email" id="resetEmail" placeholder="Email Address" required 
                   style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
            <button type="submit" class="main-btn" style="width: 100%; background: #007bff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold;">
                Send Reset Link
            </button>
        </form>

        <p style="margin-top: 20px;">
            <a href="index.html" style="text-decoration: none; color: #007bff; font-weight: bold;">← Back to Login</a>
        </p>
    </div>

    <script src="config.js"></script>
    <script>
        document.getElementById('resetForm').onsubmit = async (e) => {
    e.preventDefault();
    const email = document.getElementById('resetEmail').value;
    
    const { error } = await _supabase.auth.resetPasswordForEmail(email, {
        // DO NOT use window.location.origin here because GitHub Pages subfolders are tricky
        redirectTo: 'https://yohannes.github.io/golem/update-password.html',
    });
    
    if (error) {
        alert(error.message);
    } else {
        alert("Success! Please check your email for the recovery link.");
    }
};
    </script>
</body>
</html>

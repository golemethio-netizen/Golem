<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Golem</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh; background: #f4f7f6;">

    <div class="auth-card" style="background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center;">
        <h2 style="color: #ff4b2b;">Reset Password</h2>
        <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">Enter your email and we'll send you a link to get back into your account.</p>
        
        <form id="resetForm">
            <input type="email" id="resetEmail" placeholder="Email Address" required>
            <button type="submit" class="main-btn">Send Reset Link</button>
        </form>

        <p style="margin-top: 20px;"><a href="login.html" style="text-decoration: none; color: #ff4b2b; font-weight: bold;">← Back to Login</a></p>
    </div>

    <script src="config.js"></script>
    <script>
        document.getElementById('resetForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            const { error } = await _supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/update-password.html',
            });
            
            if (error) alert(error.message);
            else alert("Password reset link sent! Please check your inbox.");
        };

        <form id="updateForm">
    <input type="password" id="newPassword" placeholder="Enter New Password" required>
    <button type="submit">Update Password</button>
</form>

<script>
    document.getElementById('updateForm').onsubmit = async (e) => {
        e.preventDefault();
        const newPassword = document.getElementById('newPassword').value;
        const { error } = await _supabase.auth.updateUser({ password: newPassword });
        
        if (error) alert(error.message);
        else {
            alert("Password updated! You can now sign in.");
            window.location.href = 'index.html';
        }
    };
    </script>
</body>
</html>
